<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>React 테스트</title>
  <style>
    body{font-family:sans-serif;padding:40px;}
    #root{border:2px solid #ccc;padding:20px;min-height:200px;}
  </style>
</head>
<body>
  <h1>React 로딩 테스트</h1>
  <div id="root">로딩 중...</div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>

  <script type="text/babel">
    console.log('1. React:', typeof React);
    console.log('2. ReactDOM:', typeof ReactDOM);
    console.log('3. Babel:', typeof Babel);

    const {useState} = React;

    function TestApp() {
      const [count, setCount] = useState(0);

      return (
        <div>
          <h2>✅ React가 작동합니다!</h2>
          <p>카운트: {count}</p>
          <button onClick={() => setCount(count + 1)}>증가</button>
        </div>
      );
    }

    console.log('4. 렌더링 시작...');
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<TestApp/>);
    console.log('5. 렌더링 완료!');
  </script>
</body>
</html>
