<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>누누아누 관리자 - 최소버전</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:sans-serif;background:#f5f5f5;padding:20px;}
    #root{background:white;border-radius:12px;padding:40px;max-width:600px;margin:0 auto;box-shadow:0 4px 6px rgba(0,0,0,0.1);}
    .spinner{width:48px;height:48px;border:4px solid #E5E5E2;border-top:4px solid #18181B;border-radius:50%;animation:spin 1s linear infinite;margin:20px auto;}
    @keyframes spin{to{transform:rotate(360deg);}}
    button{padding:12px 24px;border-radius:8px;border:none;background:#18181B;color:white;cursor:pointer;font-size:16px;font-weight:600;}
    button:hover{background:#3f3f46;}
    input{padding:12px;border-radius:8px;border:1.5px solid #E5E5E2;width:100%;font-size:16px;margin-bottom:16px;}
    .success{color:#22c55e;font-weight:bold;margin:10px 0;}
    .error{color:#ef4444;font-weight:bold;margin:10px 0;}
  </style>
</head>
<body>
  <div id="root">
    <div class="spinner"></div>
    <p style="text-align:center;margin-top:20px;color:#666;">로딩 중...</p>
  </div>

  <script src="https://unpkg.com/react@17/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@17/umd/react-dom.production.min.js"></script>

  <script>
    console.log('🚀 앱 시작');
    console.log('React:', typeof React);
    console.log('ReactDOM:', typeof ReactDOM);

    const {useState, createElement: h} = React;

    // JSX 없이 순수 React.createElement 사용
    function App() {
      const [page, setPage] = useState('login');
      const [password, setPassword] = useState('');

      if (page === 'login') {
        return h('div', {style: {textAlign: 'center'}},
          h('h1', {style: {marginBottom: '20px', color: '#18181B'}}, '🎨 누누아누 관리자'),
          h('div', {className: 'success'}, '✅ React 정상 로드'),
          h('input', {
            type: 'password',
            placeholder: '비밀번호 입력 (nunu1122!)',
            value: password,
            onChange: (e) => setPassword(e.target.value),
            onKeyDown: (e) => {
              if (e.key === 'Enter' && password === 'nunu1122!') {
                setPage('main');
              }
            }
          }),
          h('button', {
            onClick: () => {
              if (password === 'nunu1122!') {
                setPage('main');
              } else {
                alert('비밀번호가 틀립니다');
              }
            }
          }, '로그인')
        );
      }

      return h('div', null,
        h('h2', {style: {color: '#22c55e', marginBottom: '20px'}}, '✅ 로그인 성공!'),
        h('p', {style: {marginBottom: '20px'}}, 'React가 정상적으로 작동하고 있습니다.'),
        h('button', {onClick: () => setPage('login')}, '로그아웃')
      );
    }

    // 렌더링
    setTimeout(() => {
      console.log('🎨 렌더링 시작');
      try {
        ReactDOM.render(h(App), document.getElementById('root'));
        console.log('✅ 렌더링 완료');
      } catch(e) {
        console.error('❌ 렌더링 에러:', e);
        document.getElementById('root').innerHTML = 
          '<div class="error">❌ 렌더링 실패<br>콘솔(F12)을 확인하세요</div>';
      }
    }, 500);
  </script>
</body>
</html>
