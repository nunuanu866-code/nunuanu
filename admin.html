          loadAllPending();
          setToast({title:'처리에 실패했습니다. 다시 시도해주세요.'});
          return;
        }
        await notifyApp({bookingId:b.id,phone:bookingCustomerPhone(b),type:'booking_rejected'});
        await notifyCustomerPush({bookingId:b.id,phone:bookingCustomerPhone(b),type:'booking_rejected'});
        setToast({title:bookingCustomerName(b,'고객')+' 예약 거절'});

        setTimeout(()=>Promise.all([loadAllPending(),reloadSupaBookings(),loadSupaCustomers()]),500);
      }}
      onCancelApprove={async(b)=>{
        setAllPending(prev=>prev.filter(x=>x.id!==b.id));
        const ok=await sbPatch('bookings',b.id,{
          status:'cancelled',
          cancelled_at:new Date().toISOString(),
          customer_memo:withAdminActionMemo(resolveCancelRequestMemo(b.customer_memo,'approved'),'cancel_approved',session)
        });
        if(!ok){
          loadAllPending();
          setToast({title:'취소 승인에 실패했습니다',sub:'다시 시도해주세요'});
          return;
        }
        await notifyApp({bookingId:b.id,phone:bookingCustomerPhone(b),type:'booking_cancelled'});
        setToast({title:bookingCustomerName(b,'고객')+' 취소 확정',sub:'예약 상태가 취소로 변경되었습니다'});
        setTimeout(()=>Promise.all([loadAllPending(),reloadSupaBookings(),loadSupaCustomers()]),500);
      }}
      onCancelReject={async(b)=>{
        setAllPending(prev=>prev.filter(x=>x.id!==b.id));
        const ok=await sbPatch('bookings',b.id,{
          customer_memo:withAdminActionMemo(resolveCancelRequestMemo(b.customer_memo,'rejected'),'cancel_rejected',session)
        });
        if(!ok){
          loadAllPending();
          setToast({title:'취소 요청 거절에 실패했습니다',sub:'다시 시도해주세요'});
          return;
        }
        setToast({title:bookingCustomerName(b,'고객')+' 취소 요청 거절',sub:'예약은 확정 상태로 유지됩니다'});
        setTimeout(()=>Promise.all([loadAllPending(),reloadSupaBookings(),loadSupaCustomers()]),500);
      }}
      onJumpDate={date=>{setSelectedDate(new Date(date));setTab('today');}}
      canEdit={canEdit}
    />}
    {tab==='today'&&<>
      <Header selectedDate={selectedDate} setSelectedDate={setSelectedDate} blockCount={todayBlocks.length} staffCount={visibleStaff.length} loadingBkg={loadingBkg} supaBookings={visibleSupaBookings} staff={visibleStaff} supaCustomers={supaCustomers} setDraft={setDraft} setEditingId={setEditingId} setFlow={setFlow} onCalendarImport={importCalendarFile} onOpenBooking={openBookingFromMini} canEdit={canEdit} staffFilterId={null} staffDayOffs={selectedDateDayOffs} scheduleNotice={selectedScheduleNotice} onSaveScheduleNotice={saveScheduleNotice}/>
      <div style={{flex:1,minHeight:0,display:'flex',flexDirection:'column',overflow:'hidden',position:'relative'}}>
        <Timeline staff={visibleStaff} blocks={todayBlocks} highlightId={highlightId}
          onBlockTap={b=>{if(!flow)setSelectedBlock(b);}}
          onBlockEdit={canEdit?b=>{if(!flow)openEdit(b);}:null}
          onBlockDelete={canEdit?id=>{if(!flow)deleteBlock(id);}:null}
          onBlockMove={canEdit?handleBlockMove:null}
          onEmptyTap={canEdit?openNewAt:null}
          canEdit={canEdit}/>
        {canEdit&&!flow&&!selectedBlock&&<button onClick={openNew} style={{position:'absolute',right:20,bottom:'calc(92px + env(safe-area-inset-bottom,0px))',width:56,height:56,borderRadius:'50%',background:T.accent,color:'#fff',border:'none',fontSize:30,fontWeight:300,boxShadow:'none',cursor:'pointer',zIndex:10,display:'flex',alignItems:'center',justifyContent:'center',animation:'popIn .3s'}}>+</button>}
      </div>
    </>}
    {tab==='staff'&&<StaffScreen staff={staff} setStaff={setStaff} blocks={todayBlocks} canEdit={canManageStaffPermissions} sessionStaffId={isStaffSession?session?.staffId:null} staffDayOffByDate={staffDayOffByDate} onToggleDayOff={saveStaffDayOff}/>}
    {tab==='cust' &&<CustomerScreen supaCustomers={supaCustomers} supaHistory={supaHistory} onRefresh={()=>Promise.all([loadSupaCustomers(),reloadSupaBookings()])} canEdit={canEdit}/>}
    {tab==='me'   &&<SettingsScreen onSignOut={signOut} googleToken={googleToken} setGoogleToken={setGoogleToken} session={session} staff={staff} staffAuthRows={staffAuthRows} onApproveStaffAuth={approveStaffAuth} onRejectStaffAuth={rejectStaffAuth}/>}
    <TabBar active={tab} setActive={v=>{setTab(v);closeFlow();setSelectedBlock(null);}} pendingCount={allPending.length} staffAuthPendingCount={canManageStaffPermissions?staffAuthRows.filter(r=>r.status==='pending').length:0}/>
    {selectedBlock&&<BlockSheet block={selectedBlock} staff={visibleStaff} onClose={()=>setSelectedBlock(null)} onEdit={()=>openEdit(selectedBlock)} onDelete={()=>deleteBlock(selectedBlock.id)} onConfirm={confirmBooking} onReject={rejectBooking} canEdit={canEdit}/>}
    {canEdit&&scheduleEdit&&<ScheduleBookingEditSheet
      booking={scheduleEdit.booking}
      staff={staff}
      onClose={()=>setScheduleEdit(null)}
      onDelete={()=>cancelSupabaseBooking(scheduleEdit.booking,scheduleEdit.block,{source:'edit'})}
      onSave={async(updates,meta={})=>{
        const nextCustomerName=String(meta.customerName||'').trim();
        const nextCustomerPhone=String(meta.customerPhone||'').trim();
        const currentCustomerName=String(bookingCustomerName(scheduleEdit.booking,'')).trim();
        const currentCustomerPhone=String(bookingCustomerPhone(scheduleEdit.booking)).trim();
        const customerChanged=nextCustomerName!==currentCustomerName||nextCustomerPhone!==currentCustomerPhone||!scheduleEdit.booking.customer_id||!scheduleEdit.booking.customers;
        let customerResult={ok:true,customerId:scheduleEdit.booking.customer_id,row:scheduleEdit.booking.customers,relinked:false};
        if(customerChanged){
          customerResult=await saveBookingCustomerForScheduleEdit(scheduleEdit.booking,nextCustomerName,nextCustomerPhone);
          if(!customerResult.ok){
            setToast({title:'고객 정보 저장 실패',sub:customerResult.message||'고객 데이터가 일정에 반영되지 않아 예약 저장을 중단했습니다.'});
            return;
          }
        }
        const customerMemoWithOverride=withBookingCustomerOverrideMemo(updates.customer_memo||scheduleEdit.booking.customer_memo||'',{
          name:nextCustomerName||currentCustomerName||customerResult.row?.name||'고객',
          phone:nextCustomerPhone||currentCustomerPhone||customerResult.row?.phone||'',
          customer_id:customerResult.customerId||scheduleEdit.booking.customer_id||null
        });
        const nextUpdates={
          ...updates,
          ...(customerResult.customerId&&customerResult.customerId!==scheduleEdit.booking.customer_id?{customer_id:customerResult.customerId}:{}),
          customer_memo:withAdminActionMemo(customerMemoWithOverride,'edit',session)
        };
        const ok=await sbPatch('bookings',scheduleEdit.booking.id,nextUpdates);
        if(ok){
          const optimisticCustomer={
            ...(scheduleEdit.booking.customers||{}),
            ...(customerResult.row||{}),
            name:nextCustomerName||customerResult.row?.name||bookingCustomerName(scheduleEdit.booking,'고객'),
            phone:nextCustomerPhone||customerResult.row?.phone||bookingCustomerPhone(scheduleEdit.booking)
          };
          setSupaBookings(prev=>prev.map(b=>b.id===scheduleEdit.booking.id?{
            ...b,
            ...nextUpdates,
            customer_id:customerResult.customerId||b.customer_id,
            customers:optimisticCustomer
          }:b));
          setScheduleEdit(null);
          await reloadSupaBookings();
          await loadSupaCustomers();
          await notifyAdminDevices({type:'booking_updated',bookingId:scheduleEdit.booking.id,body:`${optimisticCustomer.name||'고객'} 예약이 수정되었습니다.`,data:{url:'/admin.html',tab:'schedule',date:nextUpdates.booking_date||scheduleEdit.booking.booking_date,start_time:nextUpdates.start_time||scheduleEdit.booking.start_time},eventKey:`booking:${scheduleEdit.booking.id}:edit:${Date.now()}`});
          setToast({title:'예약 수정 완료',sub:`${optimisticCustomer.name} · ${nextUpdates.start_time} - ${nextUpdates.end_time} 저장됨`});
        }else{
          setToast({title:'수정 실패',sub:'다시 시도해주세요'});
        }
      }}
    />}
    {canEdit&&flow==='s1'&&<S1Date
      draft={draft}
      set={setDraft}
      onNext={()=>setFlow('s2')}
      onClose={closeFlow}
      supaCustomers={adminCustomers}
      onCustomerSelect={(customer,date)=>{
        const selectedDateObj=new Date(date);
        setDraft({
          ...draft,
          date:selectedDateObj,
          name:customer.name||'',
          phone:customer.phone||'',
          customer:{
            id:customer.id,
            name:customer.name||'',
            phone:customer.phone||'',
            pin:customer.pin,
            memo:customer.memo||'',
            visits:customer.visits||0,
            color:customer.color||'sky'
          }
        });
        setFlow('s3');
      }}
    />}
    {canEdit&&flow==='s2'&&<S2Customer draft={draft} set={setDraft} customers={adminCustomers} onNext={()=>setFlow('s3')} onBack={()=>setFlow('s1')} onClose={closeFlow}/>}
    {canEdit&&flow==='s3'&&<S3Time draft={draft} set={setDraft} onNext={()=>setFlow('s5')} onBack={()=>setFlow('s2')} onClose={closeFlow}/>}
    {canEdit&&flow==='s5'&&<S5Staff draft={draft} set={setDraft} staff={staff} onNext={()=>setFlow('confirm')} onBack={()=>setFlow('s3')} onClose={closeFlow}/>}
    {canEdit&&(flow==='confirm'||isBusy)&&<ConfirmSheet draft={draft} staff={staff} onSubmit={submit} onBack={()=>setFlow('s5')} onClose={closeFlow} busy={isBusy}/>}
  </div>;
}


class AdminErrorBoundary extends React.Component{
  constructor(props){
    super(props);
    this.state={error:null};
  }
  static getDerivedStateFromError(error){
    return{error};
  }
  componentDidCatch(error,info){
    console.error('[admin render error]',error,info);
  }
  render(){
    if(this.state.error){
      const message=this.state.error?.message||String(this.state.error);
      return <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:T.bg,padding:24}}>
        <div style={{width:'min(420px,100%)',background:T.surface,border:`1px solid ${T.line}`,borderRadius:20,padding:24,boxShadow:'0 12px 36px rgba(0,0,0,.08)'}}>
          <div style={{fontSize:20,fontWeight:900,color:T.ink,marginBottom:8}}>관리자 화면 오류</div>
          <div style={{fontSize:14,color:T.ink2,lineHeight:1.6,marginBottom:14}}>
            화면 렌더 중 오류가 발생했습니다. 아래 버튼으로 즉시 복구할 수 있으며, 오류 내용은 콘솔에 기록됩니다.
          </div>
          <div style={{fontSize:12,color:T.danger,background:'#FEF2F2',border:'1px solid #FECACA',borderRadius:12,padding:12,wordBreak:'break-all',marginBottom:16}}>
            {message}
          </div>
          <div style={{display:'flex',gap:8}}>
            <button onClick={()=>this.setState({error:null})} style={{flex:1,height:44,borderRadius:12,border:`1px solid ${T.line}`,background:T.surface,fontSize:14,fontWeight:800}}>
              다시 시도
            </button>
            <button onClick={()=>location.reload()} style={{flex:1,height:44,borderRadius:12,border:'none',background:T.ink,color:'#fff',fontSize:14,fontWeight:800}}>
              새로고침
            </button>
          </div>
        </div>
      </div>;
    }
    return this.props.children;
  }
}

function App(){
  const[session,setSession]=useState(()=>readAuthSession());

  return <AdminErrorBoundary key={session?`${session.role}:${session.staffId||''}`:'login'}>
    {!session
      ? <LoginScreen onLogin={setSession}/>
      : <AdminApp session={session} onSessionUpdate={setSession} onSignOut={()=>setSession(null)}/>}
  </AdminErrorBoundary>;
}


console.log('App component ready');

  console.log('앱 초기화 시작...');


  if (typeof React === 'undefined' || typeof ReactDOM === 'undefined') {
    console.error('React 라이브러리가 로드되지 않았습니다');
    document.getElementById('root').innerHTML = '<div style="padding:40px;text-align:center;font-family:sans-serif;"><h2 style="color:#EF4444;margin-bottom:16px;">React 로딩 실패</h2><p style="color:#6B7280;margin-bottom:24px;">인터넷 연결을 확인하고 페이지를 새로고침하세요.</p><button onclick="location.reload()" style="padding:10px 20px;border-radius:8px;border:none;background:#18181B;color:#fff;cursor:pointer;">새로고침</button></div>';
    return;
  }

  try {
    console.log('렌더링 시작...');
    ReactDOM.render(<App/>, document.getElementById('root'));
    console.log('렌더링 완료');
  } catch(e) {
    console.error('???뚮뜑留??먮윭:', e);
    document.getElementById('root').innerHTML = '<div style="padding:40px;text-align:center;font-family:sans-serif;"><h2 style="color:#EF4444;margin-bottom:16px;">앱 로딩 실패</h2><p style="color:#6B7280;margin-bottom:24px;">렌더링 에러: '+e.message+'</p><p style="font-size:14px;color:#9CA3AF;">브라우저 콘솔에서 상세 오류를 확인하세요.</p><button onclick="location.reload()" style="padding:10px 20px;border-radius:8px;border:none;background:#18181B;color:#fff;cursor:pointer;margin-top:16px;">새로고침</button></div>';
  }
}


if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', initApp);
} else {
  setTimeout(initApp, 100);
}
