          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:14}}>
            {[['확정 방문',`${c.visitCount}회`],['전체 예약',`${c.totalBk}건`],['최근 방문',c.lastVisit?c.lastVisit.slice(5).replace('-','/'):'없음']].map(([l,v])=>(
              <div key={l} style={{background:T.bg,borderRadius:10,padding:'10px 8px',textAlign:'center'}}>
                <div style={{fontSize:16,fontWeight:800,color:T.ink}}>{v}</div>
                <div style={{fontSize:10,color:T.ink3,marginTop:2,fontWeight:600}}>{l}</div>
              </div>
            ))}
          </div>
          {/* 메모 */}
          <div>
            <div style={{fontSize:12,fontWeight:700,color:T.ink2,marginBottom:6}}>관리자 메모</div>
            <textarea value={memoEdit} onChange={e=>setMemoEdit(e.target.value)} rows={2} placeholder="고객 특이사항, 선호도, 알레르기 등"
              style={{width:'100%',borderRadius:10,border:`1.5px solid ${T.line}`,padding:'8px 12px',fontSize:13,resize:'none',outline:'none',fontFamily:'inherit'}}/>
            <button onClick={()=>saveMemo(c.id)} disabled={savingMemo}
              style={{marginTop:6,width:'100%',height:36,borderRadius:10,border:'none',background:T.ink,color:'#fff',fontSize:13,fontWeight:700,cursor:'pointer',opacity:savingMemo?.6:1}}>
              {savingMemo?'저장 중...':'메모 저장'}
            </button>
          </div>
        </div>

        {/* 예약 이력 */}
        <div style={{fontSize:13,fontWeight:700,color:T.ink2,marginBottom:8}}>예약 이력 ({myBk.length}건)</div>
        {myBk.length===0?(
          <div style={{background:T.surface,borderRadius:14,padding:20,textAlign:'center',color:T.ink3,fontSize:13}}>예약 이력이 없습니다</div>
        ):(
          <div style={{background:T.surface,borderRadius:14,border:`1px solid ${T.line}`,overflow:'hidden'}}>
            {myBk.map((b,i)=>(
              <div key={b.id} style={{padding:'12px 14px',borderBottom:i<myBk.length-1?`1px solid ${T.line2}`:'none'}}>
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:4}}>
                  <div style={{fontSize:13,fontWeight:700,color:T.ink}}>
                    {b.booking_date} · {b.start_time?.slice(0,5)}~{b.end_time?.slice(0,5)}
                  </div>
                  <span style={{fontSize:10,fontWeight:700,padding:'2px 7px',borderRadius:999,background:statusColor[b.status]||'#F4F4F5',color:statusTxt[b.status]||T.ink2}}>
                    {statusLabel[b.status]||b.status}
                  </span>
                </div>
                <div style={{fontSize:12,color:T.ink2}}>{svcMap[b.service_type]||b.service_type}{b.service_detail?` · ${b.service_detail}`:''}</div>
                {b.customer_memo&&<div style={{fontSize:11,color:'#0369A1',marginTop:4,background:'#F0F9FF',padding:'4px 8px',borderRadius:6}}>💬 {b.customer_memo}</div>}
              </div>
            ))}
          </div>
        )}
      </div>
    </div>;
  }

  // 고객 목록
  return <div style={{flex:1,display:'flex',flexDirection:'column',background:T.bg}}>
    <div style={{paddingTop:'calc(env(safe-area-inset-top,0px)+16px)',paddingBottom:10,paddingLeft:16,paddingRight:16,background:T.surface,borderBottom:`1px solid ${T.line}`,flexShrink:0}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
        <div style={{fontSize:20,fontWeight:800}}>고객 관리</div>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <span style={{fontSize:12,color:T.ink3,fontWeight:600}}>{filtered.length}명</span>
          <button onClick={onRefresh} style={{height:36,padding:'0 12px',borderRadius:10,border:`1px solid ${T.line}`,background:T.bg,fontSize:12,fontWeight:700,cursor:'pointer',color:T.ink2}}>🔄 새로고침</button>
        </div>
      </div>
      <div style={{height:44,display:'flex',alignItems:'center',gap:10,padding:'0 12px',borderRadius:12,border:`1px solid ${T.line}`,background:T.bg}}>
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke={T.ink3} strokeWidth="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input value={q} onChange={e=>setQ(e.target.value)} placeholder="이름 또는 전화번호 검색" style={{flex:1,border:'none',outline:'none',background:'transparent',fontSize:15,color:T.ink}}/>
        {q&&<button onClick={()=>setQ('')} style={{width:20,height:20,borderRadius:'50%',border:'none',background:T.line,color:T.ink2,fontSize:10,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer'}}>✕</button>}
      </div>
    </div>
    <div style={{flex:1,overflowY:'auto',padding:'8px 16px 16px'}}>
      {filtered.length===0?(
        <div style={{textAlign:'center',paddingTop:60,color:T.ink3}}>
          <div style={{fontSize:40,marginBottom:12}}>👥</div>
          <div style={{fontSize:14,fontWeight:700}}>{q?'검색 결과가 없습니다':'등록된 고객이 없습니다'}</div>
          <div style={{fontSize:12,marginTop:6}}>고객이 예약 요청을 완료하면 자동 등록됩니다</div>
        </div>
      ):(
        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          {filtered.map((c,i)=>(
            <div key={c.id} style={{background:T.surface,borderRadius:14,border:`1px solid ${T.line}`,padding:'13px 14px',display:'flex',alignItems:'center',gap:12}}>
              <button onClick={()=>{setDetail(c);setMemoEdit(c.memo||'');}}
                style={{display:'flex',alignItems:'center',gap:12,flex:1,border:'none',background:'transparent',cursor:'pointer',textAlign:'left',padding:0}}>
                <div style={{width:42,height:42,borderRadius:'50%',background:c.avatarColor,color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:17,fontWeight:800,flexShrink:0}}>{c.name?.[0]||'?'}</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:'flex',alignItems:'center',gap:6}}>
                    <span style={{fontSize:15,fontWeight:700}}>{c.name}</span>
                    {c.visitCount>=5&&<span style={{fontSize:10,fontWeight:700,background:'#FFEDD5',color:'#9A3412',padding:'1px 6px',borderRadius:999}}>단골</span>}
                    {c.visitCount===0&&c.totalBk>0&&<span style={{fontSize:10,fontWeight:700,background:'#DBEAFE',color:'#1E3A8A',padding:'1px 6px',borderRadius:999}}>신규</span>}
                  </div>
                  <div style={{fontSize:12,color:T.ink2,marginTop:2}}>{c.phone||'연락처 없음'} · 방문 {c.visitCount}회</div>
                </div>
                <div style={{textAlign:'right',flexShrink:0,marginRight:8}}>
                  {c.lastVisit&&<div style={{fontSize:11,color:T.ink3}}>{c.lastVisit.slice(5).replace('-','/')}</div>}
                  <span style={{fontSize:16,color:T.ink3}}>›</span>
                </div>
              </button>
              <div style={{display:'flex',gap:6,flexShrink:0}}>
                <button onClick={()=>setEditForm({customer:c,name:c.name||'',phone:c.phone||''})}
                  style={{height:34,padding:'0 10px',borderRadius:10,border:`1px solid ${T.line}`,background:T.surface,fontSize:13,fontWeight:700,color:T.ink2,cursor:'pointer'}}>
                  수정
                </button>
                <button onClick={()=>setConfirmDelete(c.id)}
                  style={{height:34,padding:'0 10px',borderRadius:10,border:'1px solid #FECACA',background:'#FEF2F2',fontSize:13,fontWeight:700,color:T.danger,cursor:'pointer'}}>
                  삭제
                </button>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>

    {/* 고객 수정 모달 */}
    {editForm&&<>
      <div onClick={()=>setEditForm(null)} style={{position:'fixed',inset:0,background:'rgba(0,0,0,.45)',zIndex:40}}/>
      <div style={{position:'fixed',left:'50%',top:'50%',transform:'translate(-50%,-50%)',background:T.surface,borderRadius:20,padding:24,zIndex:41,width:'min(360px,90vw)',boxShadow:'0 20px 60px rgba(0,0,0,.25)',animation:'popIn .2s'}}>
        <div style={{fontSize:18,fontWeight:800,marginBottom:16}}>고객 정보 수정</div>
        <div style={{marginBottom:12}}>
          <label style={{fontSize:12,fontWeight:700,color:T.ink2,display:'block',marginBottom:6}}>이름 *</label>
          <input className="inp" value={editForm.name} onChange={e=>setEditForm({...editForm,name:e.target.value})} placeholder="고객 이름"/>
        </div>
        <div style={{marginBottom:16}}>
          <label style={{fontSize:12,fontWeight:700,color:T.ink2,display:'block',marginBottom:6}}>전화번호</label>
          <input className="inp" type="tel" value={editForm.phone} onChange={e=>setEditForm({...editForm,phone:e.target.value})} placeholder="010-0000-0000"/>
        </div>
        <div style={{display:'flex',gap:8}}>
          <button onClick={()=>setEditForm(null)} style={{flex:1,height:48,borderRadius:12,border:`1px solid ${T.line}`,background:T.surface,fontSize:14,fontWeight:600,cursor:'pointer'}}>취소</button>
          <button onClick={saveCustomerEdit} disabled={!editForm.name.trim()} style={{flex:2,height:48,borderRadius:12,border:'none',background:editForm.name.trim()?T.ink:T.line,color:editForm.name.trim()?'#fff':T.ink3,fontSize:14,fontWeight:700,cursor:editForm.name.trim()?'pointer':'not-allowed'}}>저장</button>
        </div>
      </div>
    </>}

    {/* 고객 삭제 확인 모달 */}
    {confirmDelete&&(()=>{
      const c=enriched.find(x=>x.id===confirmDelete);
      return <>
        <div onClick={()=>setConfirmDelete(null)} style={{position:'fixed',inset:0,background:'rgba(0,0,0,.4)',zIndex:40,animation:'fadeIn .2s'}}/>
        <div style={{position:'fixed',left:'50%',top:'50%',transform:'translate(-50%,-50%)',background:T.surface,borderRadius:20,padding:24,zIndex:41,width:'min(360px,90vw)',boxShadow:'0 20px 60px rgba(0,0,0,.25)',animation:'popIn .2s'}}>
          <div style={{fontSize:18,fontWeight:800,marginBottom:8}}>고객 삭제</div>
          <div style={{fontSize:14,color:T.ink2,marginBottom:16,lineHeight:1.6}}>
            <b>{c?.name}</b>님의 정보를 삭제하시겠습니까?<br/>
            <span style={{color:T.danger,fontSize:13}}>⚠️ 예약 이력은 유지되지만 고객 정보는 복구할 수 없습니다.</span>
          </div>
          <div style={{display:'flex',gap:8}}>
            <button onClick={()=>setConfirmDelete(null)} style={{flex:1,height:48,borderRadius:12,border:`1px solid ${T.line}`,background:T.surface,fontSize:14,fontWeight:600,cursor:'pointer'}}>취소</button>
            <button onClick={()=>deleteCustomer(confirmDelete)} style={{flex:1,height:48,borderRadius:12,border:'none',background:T.danger,color:'#fff',fontSize:14,fontWeight:700,cursor:'pointer'}}>삭제</button>
          </div>
        </div>
      </>;
    })()}
  </div>;
}

// ── Inbox Screen (예약 요청함) ─────────────────────────────────────
function InboxScreen({allPending,staff,onConfirm,onReject,onJumpDate}){
  const[selected,setSelected]=useState(null);
  const[mode,setMode]=useState('view'); // 'view' | 'edit' | 'reject'
  const[rejectReason,setRejectReason]=useState('');
  const[busy,setBusy]=useState(false);

  // 편집 폼 상태
  const[editDate,setEditDate]=useState('');
  const[editStart,setEditStart]=useState('');
  const[editEnd,setEditEnd]=useState('');
  const[editService,setEditService]=useState('');
  const[editDetail,setEditDetail]=useState('');
  const[editStaffId,setEditStaffId]=useState('');
  const[editSegs,setEditSegs]=useState([]); // 여러 스텝 순서 배정

  const svcMap={hair:'✂️ 헤어',makeup:'💄 메이크업',both:'✨ 헤어+메이크업'};

  function formatDate(d){
    if(!d) return '';
    const dt=new Date(d+'T00:00:00');
    const dow=['일','월','화','수','목','금','토'][dt.getDay()];
    return `${d.slice(5).replace('-','/')} (${dow})`;
  }

  function openDetail(b){
    setSelected(b);
    setMode('view');
    setEditDate(b.booking_date||'');
    setEditStart(b.start_time?.slice(0,5)||'');
    setEditEnd(b.end_time?.slice(0,5)||'');
    setEditService(b.service_type||'');
    setEditDetail(b.service_detail||'');
    setEditStaffId(b.requested_staff_id||'');
    // 초기 세그먼트 설정: 요청된 스텝이 있으면 단일 세그먼트, 없으면 빈 배열
    const totalDur=calculateDuration(b.start_time?.slice(0,5)||'09:00',b.end_time?.slice(0,5)||'10:00');
    setEditSegs(b.requested_staff_id?[{staffId:b.requested_staff_id,label:'시술',dur:totalDur}]:[]);
    setRejectReason('');
  }

  function calculateDuration(start,end){
    const[sh,sm]=start.split(':').map(Number);
    const[eh,em]=end.split(':').map(Number);
    return Math.max(10,(eh*60+em)-(sh*60+sm));
  }

  function closeDetail(){setSelected(null);setMode('view');}

  const handleConfirm=async()=>{
    if(busy)return;
    setBusy(true);
    // 여러 스텝 순서 배정이 있으면 첫 번째 스텝을 requested_staff_id로 저장
    const finalStaffId=editSegs.length>0?editSegs[0].staffId:(editStaffId||selected.requested_staff_id||null);
    const updates={
      status:'confirmed',
      confirmed_at:new Date().toISOString(),
      booking_date:editDate||selected.booking_date,
      start_time:editStart||selected.start_time?.slice(0,5),
      end_time:editEnd||selected.end_time?.slice(0,5),
      service_type:editService||selected.service_type,
      service_detail:editDetail,
      requested_staff_id: finalStaffId,
      // 여러 스텝 배정 정보를 JSON으로 저장 (staff_sequence 필드 필요)
      staff_sequence: editSegs.length>0?JSON.stringify(editSegs):null
    };
    // 시트를 먼저 닫고 (즉시 UX), 그 다음 API 호출
    closeDetail();
    await onConfirm({...selected,_updates:updates,_editSegs:editSegs});
    setBusy(false);
  };

  const handleReject=async()=>{
    if(busy)return;
    setBusy(true);
    closeDetail(); // 즉시 닫기 + 목록에서 삭제
    await onReject(selected,'');
    setBusy(false);
  };

  const pending=allPending; // 요청함 = pending만

  const BookingCard=({b,isPending})=>{
    const reqStaff=staff.find(s=>s.id===b.requested_staff_id)||staff.find(s=>b.assigned_staff?.some?.(a=>a.staff_id===s.id));
    const borderColor=isPending?'#FDE68A':'#BBF7D0';
    const badgeBg=isPending?'#FEF3C7':'#DCFCE7';
    const badgeColor=isPending?'#92400E':'#166534';
    const badgeText=isPending?'⏳ 요청중':'✅ 확정됨';
    return <div onClick={()=>openDetail(b)}
      style={{background:T.surface,borderRadius:16,border:`1.5px solid ${borderColor}`,marginBottom:10,padding:'14px 16px',cursor:'pointer',boxShadow:'0 2px 8px rgba(0,0,0,.05)'}}>
      <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:8}}>
        <div>
          <div style={{fontSize:16,fontWeight:800}}>{b.customers?.name}</div>
          <div style={{fontSize:12,color:T.ink2,marginTop:1}}>{b.customers?.phone}</div>
        </div>
        <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:4}}>
          <div style={{fontSize:11,fontWeight:700,background:badgeBg,color:badgeColor,padding:'2px 8px',borderRadius:999}}>{badgeText}</div>
          <button onClick={e=>{e.stopPropagation();onJumpDate(b.booking_date);}}
            style={{fontSize:10,color:T.accent,fontWeight:700,border:'none',background:'transparent',cursor:'pointer',textDecoration:'underline'}}>
            스케줄에서 보기 →
          </button>
        </div>
      </div>
      <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
        {[`📅 ${formatDate(b.booking_date)}`,`🕐 ${b.start_time?.slice(0,5)}~${b.end_time?.slice(0,5)}`,svcMap[b.service_type]||b.service_type].map((txt,i)=>(
          <span key={i} style={{fontSize:11,background:T.bg,padding:'3px 8px',borderRadius:8,fontWeight:600,color:T.ink2}}>{txt}</span>
        ))}
        {reqStaff&&<span style={{fontSize:11,background:T.bg,padding:'3px 8px',borderRadius:8,fontWeight:600,color:T.ink2,display:'inline-flex',alignItems:'center',gap:3}}>
          <span style={{width:8,height:8,borderRadius:'50%',background:reqStaff.color,display:'inline-block'}}/>
          {reqStaff.name}
        </span>}
      </div>
      {b.customer_memo&&<div style={{marginTop:8,fontSize:11,color:'#0369A1',background:'#F0F9FF',padding:'5px 10px',borderRadius:8,borderLeft:'3px solid #38BDF8'}}>
        💬 {b.customer_memo}
      </div>}
    </div>;
  };

  return <div style={{flex:1,display:'flex',flexDirection:'column',background:T.bg}}>
    <div style={{padding:'calc(env(safe-area-inset-top,0px) + 16px) 16px 12px',background:T.surface,borderBottom:`1px solid ${T.line}`,flexShrink:0}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <div style={{fontSize:20,fontWeight:800}}>예약 요청함</div>
        {pending.length>0&&<div style={{background:T.danger,color:'#fff',fontSize:12,fontWeight:800,padding:'3px 10px',borderRadius:999}}>{pending.length}건 대기</div>}
      </div>
    </div>

    <div style={{flex:1,overflowY:'auto',padding:16}}>
      {pending.length>0&&<>
        <div style={{fontSize:12,fontWeight:800,color:'#92400E',marginBottom:8,letterSpacing:.4}}>⏳ 확인 필요 ({pending.length}건)</div>
        {pending.map(b=><BookingCard key={b.id} b={b} isPending={true}/>)}
      </>}

      {pending.length===0&&<div style={{display:'flex',flexDirection:'column',alignItems:'center',paddingTop:60,gap:10}}>
        <div style={{fontSize:48}}>✅</div>
        <div style={{fontSize:15,fontWeight:700,color:T.ink2}}>처리할 요청이 없습니다</div>
        <div style={{fontSize:13,color:T.ink3}}>새 예약 요청이 오면 알림이 표시됩니다</div>
      </div>}
    </div>

    {/* 바텀시트 */}
    {selected&&<>
      <div onClick={closeDetail} style={{position:'fixed',inset:0,background:'rgba(0,0,0,.45)',zIndex:40}}/>
      <div style={{position:'fixed',left:0,right:0,bottom:0,background:T.surface,borderTopLeftRadius:24,borderTopRightRadius:24,zIndex:41,maxHeight:'90vh',display:'flex',flexDirection:'column'}}>
        <div style={{width:36,height:4,background:T.line,borderRadius:2,margin:'12px auto 0',flexShrink:0}}/>

        {/* 헤더 */}
        <div style={{padding:'12px 20px 10px',borderBottom:`1px solid ${T.line}`,display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:0}}>
          <div>
            <div style={{fontSize:18,fontWeight:800}}>{selected.customers?.name}</div>
            <a href={`tel:${selected.customers?.phone}`} style={{fontSize:12,color:T.accent,fontWeight:600,display:'block',marginBottom:4}}>📞 {selected.customers?.phone}</a>
            {selected.customers?.pin&&<div style={{display:'inline-flex',alignItems:'center',gap:5,background:'#EDE9FE',color:'#6D28D9',fontSize:12,fontWeight:800,padding:'3px 10px',borderRadius:999}}>
              🔑 조회 비밀번호: <span style={{letterSpacing:6,fontFamily:'monospace',fontSize:15}}>{selected.customers.pin}</span>
            </div>}
          </div>
          <div style={{display:'flex',gap:8,alignItems:'center'}}>
            {selected.status==='pending'&&mode==='view'&&<button onClick={()=>setMode('edit')}
              style={{height:32,padding:'0 12px',borderRadius:10,border:`1px solid ${T.line}`,background:T.bg,fontSize:12,fontWeight:700,cursor:'pointer'}}>
              ✏️ 수정
            </button>}
            <button onClick={closeDetail} style={{width:32,height:32,borderRadius:'50%',border:`1px solid ${T.line}`,background:T.bg,fontSize:15,cursor:'pointer'}}>✕</button>
          </div>
        </div>

        {/* ── 스크롤 영역 (내용만) ── */}
        <div style={{flex:1,overflowY:'auto',padding:'14px 20px 8px'}}>

          {/* VIEW 모드 — 예약 정보 */}
          {mode==='view'&&<>
            <div style={{background:T.bg,borderRadius:14,padding:'12px 14px',fontSize:13}}>
              {[
                ['날짜',formatDate(selected.booking_date)],
                ['시술 시작',selected.start_time?.slice(0,5)],
                ['나가시는 시간',selected.end_time?.slice(0,5)],
                ['시술',svcMap[selected.service_type]||selected.service_type],
                ...(selected.service_detail?[['시술내용',selected.service_detail]]:[]),
                ...(selected.customer_memo?[['요청사항',selected.customer_memo]]:[]),
                ...(selected.requested_staff_id?[['희망 스텝',staff.find(s=>s.id===selected.requested_staff_id)?.name||'미지정']]:[])]
                .filter(([,v])=>v).map(([l,v],i,a)=><div key={i} style={{display:'flex',padding:'7px 0',borderBottom:i<a.length-1?`1px solid ${T.line2}`:'none'}}>
                  <div style={{width:90,fontWeight:700,color:T.ink2,flexShrink:0,fontSize:12}}>{l}</div>
                  <div style={{flex:1,fontWeight:600,color:T.ink}}>{v}</div>
                </div>)}
            </div>
            {selected.status==='confirmed'&&<div style={{marginTop:12,padding:'12px 14px',background:'#F0FDF4',border:'1px solid #BBF7D0',borderRadius:12,fontSize:13,fontWeight:600,color:'#166534',textAlign:'center'}}>✅ 이미 확정된 예약입니다</div>}
          </>}

          {/* EDIT 모드 — 수정 폼 */}
          {mode==='edit'&&(()=>{
            const totalDur=calculateDuration(editStart||'09:00',editEnd||'10:00');
            const segsTotal=editSegs.reduce((a,s)=>a+s.dur,0);
            const remaining=totalDur-segsTotal;
            const segsValid=editSegs.length>=1&&remaining===0;

            // 시간 분할 계산
            let acc=0;
            const splitDur=editSegs.map(s=>{
              const from=addMin(editStart||'09:00',acc);
              const to=addMin(editStart||'09:00',acc+s.dur);
              acc+=s.dur;
              return{...s,from,to};
            });

            const toggleStaff=(id)=>{
              const ex=editSegs.find(s=>s.staffId===id);
              if(ex){
                const w=editSegs.filter(s=>s.staffId!==id);
                if(!w.length){setEditSegs([]);return;}
                setEditSegs(w.map((s,i)=>i===w.length-1?{...s,dur:s.dur+ex.dur}:s));
              } else if(editSegs.length<3){
                if(!editSegs.length){setEditSegs([{staffId:id,label:'시술',dur:totalDur}]);}
                else{
                  const last=editSegs[editSegs.length-1];
                  const take=Math.min(20,Math.max(10,Math.floor(last.dur/2/10)*10));
                  const newDur=Math.max(10,last.dur-take);
                  const labels=['클렌징','메인','마무리'];
                  setEditSegs([...editSegs.slice(0,-1),{...last,dur:newDur},{staffId:id,label:labels[editSegs.length]||'시술',dur:take}]);
                }
              }
            };

            const adjustSeg=(idx,delta)=>{
              const next=editSegs.map(s=>({...s}));
              const other=idx===editSegs.length-1?idx-1:idx+1;
              if(other<0||other>=editSegs.length)return;
              if(next[idx].dur+delta<10||next[other].dur-delta<10)return;
              next[idx].dur+=delta;
              next[other].dur-=delta;
              setEditSegs(next);
            };

            return <>
              <div style={{fontSize:13,fontWeight:800,color:T.ink,marginBottom:12}}>예약 내용 수정</div>
              <div style={{display:'flex',flexDirection:'column',gap:12}}>
                <div>
                  <label style={{fontSize:11,fontWeight:700,color:T.ink2,display:'block',marginBottom:4}}>날짜</label>
                  <input type="date" value={editDate} onChange={e=>setEditDate(e.target.value)}
                    style={{height:44,borderRadius:12,border:`1.5px solid ${T.line}`,padding:'0 12px',fontSize:14,width:'100%',outline:'none'}}/>
                </div>
                <div style={{display:'flex',gap:10}}>
                  <div style={{flex:1}}>
                    <label style={{fontSize:11,fontWeight:700,color:T.ink2,display:'block',marginBottom:4}}>시술 시작</label>
                    <input type="time" value={editStart} onChange={e=>setEditStart(e.target.value)}
                      style={{width:'100%',height:44,borderRadius:12,border:`1.5px solid ${T.line}`,padding:'0 10px',fontSize:14,outline:'none'}}/>
                  </div>
                  <div style={{flex:1}}>
                    <label style={{fontSize:11,fontWeight:700,color:T.ink2,display:'block',marginBottom:4}}>나가시는 시간</label>
                    <input type="time" value={editEnd} onChange={e=>setEditEnd(e.target.value)}
                      style={{width:'100%',height:44,borderRadius:12,border:`1.5px solid ${T.line}`,padding:'0 10px',fontSize:14,outline:'none'}}/>
                  </div>
                </div>
                <div>
                  <label style={{fontSize:11,fontWeight:700,color:T.ink2,display:'block',marginBottom:4}}>시술 종류</label>
                  <div style={{display:'flex',gap:6}}>
                    {[['hair','✂️ 헤어'],['makeup','💄 메이크업'],['both','✨ 둘 다']].map(([v,l])=>(
                      <button key={v} onClick={()=>setEditService(v)}
                        style={{flex:1,height:40,borderRadius:10,border:`1.5px solid ${editService===v?T.ink:T.line}`,background:editService===v?T.ink:'transparent',color:editService===v?'#fff':T.ink,fontSize:12,fontWeight:700,cursor:'pointer'}}>
                        {l}
                      </button>
                    ))}
                  </div>
                </div>
                <div>
                  <label style={{fontSize:11,fontWeight:700,color:T.ink2,display:'block',marginBottom:4}}>시술 내용</label>
                  <input value={editDetail} onChange={e=>setEditDetail(e.target.value)} placeholder="시술 내용 입력"
                    style={{width:'100%',height:44,borderRadius:12,border:`1.5px solid ${T.line}`,padding:'0 12px',fontSize:14,outline:'none'}}/>
                </div>

                {/* 스텝 순서 배정 */}
                <div>
                  <label style={{fontSize:11,fontWeight:700,color:T.ink2,display:'block',marginBottom:6}}>
                    담당 스텝 배정 <span style={{color:T.ink3,fontWeight:500}}>(최대 3명 순서 배정 가능)</span>
                  </label>
                  <div style={{display:'flex',gap:6,marginBottom:10,flexWrap:'wrap'}}>
                    {staff.filter(s=>s.is_active).map(s=>{
                      const idx=editSegs.findIndex(x=>x.staffId===s.id);
                      const sel=idx>=0;
                      return <button key={s.id} onClick={()=>toggleStaff(s.id)} disabled={!sel&&editSegs.length>=3}
                        style={{flex:'0 0 auto',minWidth:70,padding:'8px 10px',borderRadius:10,cursor:sel||editSegs.length<3?'pointer':'not-allowed',
                          border:sel?`2px solid ${T.ink}`:`1px solid ${T.line}`,
                          background:sel?T.line2:T.surface,display:'flex',flexDirection:'column',alignItems:'center',gap:3,
                          opacity:!sel&&editSegs.length>=3?0.4:1}}>
                        <div style={{width:28,height:28,borderRadius:'50%',background:s.color,color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:800}}>{s.name[0]}</div>
                        <div style={{fontSize:11,fontWeight:700}}>{s.name}</div>
                        {sel&&<Chip color="dark" size="xs">#{idx+1}</Chip>}
                      </button>;
                    })}
                  </div>

                  {editSegs.length>0&&<>
                    <div style={{marginBottom:6,display:'flex',justifyContent:'space-between',fontSize:11,fontWeight:700}}>
                      <span style={{color:T.ink2}}>시간 분할 ({totalDur}분)</span>
                      <span style={{color:segsValid?T.success:T.danger,fontVariantNumeric:'tabular-nums'}}>
                        {segsValid?`${totalDur}분 ✓`:remaining>0?`+${remaining}분 남음`:`${-remaining}분 초과`}
                      </span>
                    </div>
                    <div style={{height:36,borderRadius:8,overflow:'hidden',display:'flex',background:T.line2,marginBottom:8}}>
                      {splitDur.map((s,i)=>{
                        const stf=staff.find(x=>x.id===s.staffId);
                        return <div key={i} style={{flex:s.dur,background:stf?.color||'#ccc',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,fontWeight:700,borderRight:i<splitDur.length-1?'2px solid #fff':'none'}}>
                          {stf?.name} {s.dur}m
                        </div>;
                      })}
                    </div>
                    {splitDur.map((s,i)=>{
                      const stf=staff.find(x=>x.id===s.staffId);
                      const nxt=i<splitDur.length-1;
                      const prv=i>0;
                      const canM=s.dur>10&&editSegs.length>1&&(nxt?splitDur[i+1].dur:prv?splitDur[i-1].dur:0)>=20;
                      const canP=editSegs.length>1&&(nxt?splitDur[i+1].dur:prv?splitDur[i-1].dur:0)>10;
                      return <div key={i} style={{display:'flex',alignItems:'center',gap:8,padding:'8px 10px',borderRadius:10,border:`1px solid ${T.line}`,background:T.surface,marginBottom:6}}>
                        <div style={{width:28,height:28,borderRadius:'50%',background:stf?.color||'#ccc',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:800}}>{stf?.name?.[0]}</div>
                        <div style={{flex:1}}>
                          <div style={{fontSize:12,fontWeight:700}}>{stf?.name} <span style={{color:T.ink2,fontWeight:500}}>·{s.label}</span></div>
                          <div style={{fontSize:10,color:T.ink2,fontVariantNumeric:'tabular-nums',marginTop:1}}>{s.from}—{s.to}</div>
                        </div>
                        <div style={{display:'flex',alignItems:'center',gap:3}}>
                          <button onClick={()=>adjustSeg(i,-10)} disabled={!canM}
                            style={{width:28,height:28,borderRadius:6,border:`1px solid ${T.line}`,background:canM?T.surface:T.line2,color:canM?T.ink:T.ink3,fontSize:13,fontWeight:700,cursor:canM?'pointer':'default'}}>−</button>
                          <div style={{minWidth:38,textAlign:'center',fontSize:12,fontWeight:800,fontVariantNumeric:'tabular-nums'}}>{s.dur}분</div>
                          <button onClick={()=>adjustSeg(i,+10)} disabled={!canP}
                            style={{width:28,height:28,borderRadius:6,border:`1px solid ${T.line}`,background:canP?T.surface:T.line2,color:canP?T.ink:T.ink3,fontSize:13,fontWeight:700,cursor:canP?'pointer':'default'}}>+</button>
                        </div>
                        <button onClick={()=>toggleStaff(s.staffId)}
                          style={{width:24,height:24,borderRadius:6,border:`1px solid ${T.line}`,background:T.surface,color:T.ink3,fontSize:11,fontWeight:700,cursor:'pointer'}}>✕</button>
                      </div>;
                    })}
                  </>}

                  {editSegs.length===0&&<div style={{padding:16,borderRadius:12,border:`1.5px dashed ${T.line}`,textAlign:'center',color:T.ink2,fontSize:12,fontWeight:600}}>
                    위에서 스텝을 1명 이상 선택하세요
                  </div>}
                </div>
              </div>
            </>;
          })()}

          {/* REJECT 모드 */}
          {mode==='reject'&&<div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'20px 0',gap:10}}>
            <div style={{fontSize:40}}>⚠️</div>
            <div style={{fontSize:15,fontWeight:700,color:T.ink,textAlign:'center'}}>
              {selected.customers?.name}님의 예약을<br/>거절하시겠습니까?
            </div>
          </div>}
        </div>

        {/* ── 하단 고정 액션 버튼 (스크롤 영역 바깥) ── */}
        <div style={{padding:'12px 20px 20px',flexShrink:0,borderTop:`1px solid ${T.line2}`}}>
          {/* VIEW — pending */}
          {mode==='view'&&selected.status==='pending'&&<div style={{display:'flex',gap:10}}>
            <button onClick={()=>{setMode('reject');setRejectReason('');}}
              style={{flex:1,height:54,borderRadius:14,border:'1.5px solid #FECACA',background:'#FEF2F2',color:T.danger,fontSize:15,fontWeight:700,cursor:'pointer'}}>
              거절
            </button>
            <button onClick={handleConfirm} disabled={busy}
              style={{flex:2,height:54,borderRadius:14,border:'none',background:T.success,color:'#fff',fontSize:15,fontWeight:700,cursor:'pointer',opacity:busy?.6:1}}>
              {busy?'처리 중...':'✓ 그대로 확정'}
            </button>
          </div>}

          {/* EDIT */}
          {mode==='edit'&&(()=>{
            const totalDur=calculateDuration(editStart||'09:00',editEnd||'10:00');
            const segsTotal=editSegs.reduce((a,s)=>a+s.dur,0);
            const remaining=totalDur-segsTotal;
            const segsValid=editSegs.length>=1&&remaining===0;
            const canConfirm=editDate&&editStart&&editEnd&&editService&&segsValid;
            return <div style={{display:'flex',gap:10}}>
              <button onClick={()=>setMode('view')}
                style={{flex:1,height:54,borderRadius:14,border:`1.5px solid ${T.line}`,background:T.surface,fontSize:14,fontWeight:600,cursor:'pointer'}}>
                취소
              </button>
              <button onClick={handleConfirm} disabled={busy||!canConfirm}
                style={{flex:2,height:54,borderRadius:14,border:'none',background:canConfirm?T.success:T.line,color:canConfirm?'#fff':T.ink3,fontSize:14,fontWeight:700,cursor:canConfirm?'pointer':'not-allowed',opacity:busy?.6:1}}>
                {busy?'처리 중...':canConfirm?'수정 후 확정':'스텝을 배정하세요'}
              </button>
            </div>;
          })()}

          {/* REJECT */}
          {mode==='reject'&&<div style={{display:'flex',gap:10}}>
            <button onClick={()=>setMode('view')}
              style={{flex:1,height:54,borderRadius:14,border:`1.5px solid ${T.line}`,background:T.surface,fontSize:14,fontWeight:600,cursor:'pointer'}}>
              취소
            </button>
            <button onClick={handleReject} disabled={busy}
              style={{flex:2,height:54,borderRadius:14,border:'none',background:T.danger,color:'#fff',fontSize:15,fontWeight:700,cursor:'pointer',opacity:busy?.6:1}}>
              {busy?'처리 중...':'거절 확정'}
            </button>
          </div>}
        </div>

      </div>
    </>}
  </div>;
}

// ── Settings ───────────────────────────────────────────────────────
function SettingsScreen({onSignOut,googleToken,setGoogleToken}){
  // Client ID: localStorage 저장값 우선, 없으면 기본값 사용
  const[clientId,setClientId]=useState(()=>localStorage.getItem('nunu_gcal_cid')||GCAL_DEFAULT_CLIENT_ID);
  const[gcalLoading,setGcalLoading]=useState(false);
  const[showClientIdInput,setShowClientIdInput]=useState(false);
  const isConnected=!!googleToken;

  // Google GSI 초기화 (clientId가 있을 때)
  useEffect(()=>{
    if(!clientId) return;
    const tryInit=()=>{
      if(gcalInit(clientId,(token)=>{
        setGoogleToken(token);
        setGcalLoading(false);
      })) return;
      setTimeout(tryInit, 500); // GSI 스크립트 로드 대기
    };
    tryInit();
  },[clientId]);

  function handleConnect(){
    if(!clientId.trim()){setShowClientIdInput(true);return;}
    setGcalLoading(true);
    const ok=gcalLogin();
    if(!ok){
      setGcalLoading(false);
      alert('Google 연동 라이브러리 로딩 중... 잠시 후 다시 시도해주세요');
    }
  }

  function handleSaveClientId(){
    const cid=clientId.trim();
    if(!cid){return;}
    localStorage.setItem('nunu_gcal_cid',cid);
    setShowClientIdInput(false);
    // 재초기화
    gcalInit(cid,(token)=>{setGoogleToken(token);setGcalLoading(false);});
    setTimeout(()=>{setGcalLoading(true);gcalLogin();},300);
  }

  function handleDisconnect(){
    localStorage.removeItem(GCAL_KEY);
    setGoogleToken(null);
  }

  return <div style={{flex:1,overflowY:'auto',background:T.bg}}>
    <div style={{paddingTop:'calc(env(safe-area-inset-top,0px) + 16px)',paddingBottom:12,paddingLeft:16,paddingRight:16,fontSize:20,fontWeight:800}}>설정</div>

    {/* 계정 */}
    <div style={{margin:'0 16px 16px',background:T.surface,borderRadius:16,border:`1px solid ${T.line}`,overflow:'hidden'}}>
      <div style={{padding:'12px 16px',fontSize:11,fontWeight:800,color:T.ink2,letterSpacing:.6,borderBottom:`1px solid ${T.line2}`}}>계정</div>
      <button onClick={onSignOut} style={{display:'flex',alignItems:'center',width:'100%',padding:'13px 16px',border:'none',background:'transparent',cursor:'pointer',color:T.danger,fontSize:14,fontWeight:700}}>로그아웃</button>
    </div>

    {/* Google Calendar 연동 */}
    <div style={{margin:'0 16px 16px',background:T.surface,borderRadius:16,border:`1px solid ${T.line}`,overflow:'hidden'}}>
      <div style={{padding:'12px 16px',fontSize:11,fontWeight:800,color:T.ink2,letterSpacing:.6,borderBottom:`1px solid ${T.line2}`}}>📅 구글 캘린더 연동</div>

      {isConnected ? (
        /* 연결됨 */
        <div style={{padding:'16px'}}>
          <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:14}}>
            <div style={{width:40,height:40,borderRadius:'50%',background:'#DCFCE7',display:'flex',alignItems:'center',justifyContent:'center',fontSize:22}}>✅</div>
            <div>
              <div style={{fontSize:14,fontWeight:700,color:T.ink}}>연동 완료</div>
              <div style={{fontSize:12,color:T.ink3,marginTop:2}}>{googleToken.email||'Google 계정 연결됨'}</div>
            </div>
          </div>
          <div style={{padding:'10px 12px',background:'#F0FDF4',border:'1px solid #BBF7D0',borderRadius:10,fontSize:12,color:'#166534',fontWeight:600,lineHeight:1.7,marginBottom:12}}>
            ✓ 예약 확정 시 Google 캘린더에 자동 등록<br/>
            ✓ 이벤트: 고객명 · 시술 · 시간 · 담당 스텝
          </div>
          <button onClick={handleDisconnect} style={{width:'100%',height:42,borderRadius:12,border:`1px solid ${T.line}`,background:T.bg,fontSize:13,fontWeight:600,color:T.ink2,cursor:'pointer'}}>
            연결 해제
          </button>
        </div>
      ) : (
        /* 미연결 */
        <div style={{padding:'16px'}}>
          {!showClientIdInput ? (
            <>
              <div style={{fontSize:13,color:T.ink2,lineHeight:1.7,marginBottom:14}}>
                예약 확정 시 구글 캘린더에 <b>자동으로 일정이 등록</b>됩니다.<br/>
                Google 계정으로 로그인하면 바로 사용할 수 있습니다.
              </div>
              <div style={{padding:'10px 12px',background:'#EFF6FF',border:'1px solid #BFDBFE',borderRadius:10,fontSize:12,color:'#1E40AF',fontWeight:600,lineHeight:1.7,marginBottom:14}}>
                📋 사전 준비 (1회만):<br/>
                1. <a href="https://console.cloud.google.com/apis/credentials" target="_blank" style={{color:'#1D4ED8'}}>Google Cloud Console</a> 접속<br/>
                2. Google Calendar API 활성화<br/>
                3. OAuth 클라이언트 ID 생성 (웹 애플리케이션)<br/>
                4. 승인된 JS 원본에 <code style={{background:'#DBEAFE',padding:'1px 4px',borderRadius:4}}>https://nununanu-app.vercel.app</code> 추가<br/>
                5. Client ID 복사 후 아래에 입력
              </div>
              {clientId ? (
                <button onClick={()=>{setGcalLoading(true);handleConnect();}} disabled={gcalLoading}
                  style={{width:'100%',height:52,borderRadius:14,border:'none',background:'#4285F4',color:'#fff',fontSize:14,fontWeight:700,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:10,opacity:gcalLoading?.7:1}}>
                  {gcalLoading
                    ? <><div style={{width:16,height:16,borderRadius:'50%',border:'2px solid rgba(255,255,255,.4)',borderTopColor:'#fff',animation:'spin .8s linear infinite'}}/> 연결 중...</>
                    : <><svg width="18" height="18" viewBox="0 0 48 48"><path fill="#fff" d="M44.5 20H24v8.5h11.8C34.7 33.9 30.1 37 24 37c-7.2 0-13-5.8-13-13s5.8-13 13-13c3.1 0 5.9 1.1 8.1 2.9l6.4-6.4C34.6 4.1 29.6 2 24 2 11.8 2 2 11.8 2 24s9.8 22 22 22c11 0 21-8 21-22 0-1.3-.2-2.7-.5-4z"/></svg>
                      Google로 로그인</>}
                </button>
              ) : null}
              <button onClick={()=>setShowClientIdInput(true)} style={{marginTop:10,width:'100%',height:42,borderRadius:12,border:`1px solid ${T.line}`,background:T.bg,fontSize:13,fontWeight:600,color:T.ink2,cursor:'pointer'}}>
                {clientId ? 'Client ID 변경' : '+ Client ID 입력하기'}
              </button>
            </>
          ) : (
            /* Client ID 입력 폼 */
            <>
              <div style={{fontSize:13,fontWeight:700,color:T.ink,marginBottom:8}}>Google Client ID 입력</div>
              <input
                className="inp"
                value={clientId}
                onChange={e=>setClientId(e.target.value)}
                placeholder="xxxxxxxxxxxx.apps.googleusercontent.com"
                style={{marginBottom:10}}
              />
              <div style={{display:'flex',gap:8}}>
                <button onClick={()=>setShowClientIdInput(false)} style={{flex:1,height:46,borderRadius:12,border:`1px solid ${T.line}`,background:T.bg,fontSize:13,fontWeight:600,cursor:'pointer',color:T.ink2}}>취소</button>
                <button onClick={handleSaveClientId} disabled={!clientId.trim()} style={{flex:2,height:46,borderRadius:12,border:'none',background:T.ink,color:'#fff',fontSize:13,fontWeight:700,cursor:'pointer',opacity:clientId.trim()?1:.5}}>저장 후 로그인</button>
              </div>
            </>
          )}
        </div>
      )}
    </div>

    {/* 앱 정보 */}
    <div style={{margin:'0 16px 24px',background:T.surface,borderRadius:16,border:`1px solid ${T.line}`,overflow:'hidden'}}>
      <div style={{padding:'12px 16px',fontSize:11,fontWeight:800,color:T.ink2,letterSpacing:.6,borderBottom:`1px solid ${T.line2}`}}>앱 정보</div>
      <div style={{padding:'13px 16px',display:'flex',justifyContent:'space-between'}}><span style={{fontSize:14,fontWeight:600}}>버전</span><span style={{fontSize:14,color:T.ink3}}>1.0.0</span></div>
    </div>
  </div>;
}

// ── Toast ──────────────────────────────────────────────────────────
function Toast({msg,onDone}){
  const[out,setOut]=useState(false);
  useEffect(()=>{const t1=setTimeout(()=>setOut(true),3200),t2=setTimeout(onDone,3700);return()=>{clearTimeout(t1);clearTimeout(t2);};},[]);
  return <div style={{position:'fixed',left:12,right:12,top:'calc(env(safe-area-inset-top,0px) + 12px)',background:T.ink,color:'#fff',borderRadius:16,padding:'12px 14px',display:'flex',alignItems:'center',gap:12,zIndex:99,boxShadow:'0 12px 32px rgba(0,0,0,.3)',animation:out?'toastOut .4s forwards':'toastIn .3s'}}>
    <div style={{width:32,height:32,borderRadius:'50%',background:T.success,color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,fontWeight:800,flexShrink:0}}>✓</div>
    <div style={{flex:1}}><div style={{fontSize:14,fontWeight:700}}>{msg.title}</div>{msg.sub&&<div style={{fontSize:12,opacity:.7,marginTop:2}}>{msg.sub}</div>}</div>
    <button onClick={()=>{setOut(true);setTimeout(onDone,400);}} style={{height:28,padding:'0 10px',borderRadius:999,border:'none',background:'rgba(255,255,255,.18)',color:'#fff',fontSize:12,fontWeight:700,cursor:'pointer'}}>닫기</button>
  </div>;
}

                phone:customer.phone,
                pin:customer.pin,

// ── Admin App (main) ───────────────────────────────────────────────
function AdminApp({onSignOut}){
  const[tab,setTab]=useState('today');
  const[selectedDate,setSelectedDate]=useState(()=>new Date());
  const[staff,setStaff]=useState([]);
  const[customers,setCustomers]=useState([]);
  const[blocks,setBlocks]=useState([]);
  const[highlightId,setHighlightId]=useState(null);
  const[toast,setToast]=useState(null);
  const[flow,setFlow]=useState(null);
  const[draft,setDraft]=useState(null);
  const[selectedBlock,setSelectedBlock]=useState(null);
  const[editingId,setEditingId]=useState(null);
  const[supaBookings,setSupaBookings]=useState([]);
  const[allPending,setAllPending]=useState([]);    // pending + confirmed 요청함
  const[supaCustomers,setSupaCustomers]=useState([]); // Supabase 고객 목록
  const[supaHistory,setSupaHistory]=useState([]);     // 전체 예약 이력
  // Google Calendar 연동 상태
  const[googleToken,setGoogleToken]=useState(()=>gcalGetToken());
  const[loadingBkg,setLoadingBkg]=useState(false);
  const loaded=useRef(false);
  const saving=useRef(false);
  const saveTimer=useRef(null);

  // 초기 데이터 로드: localStorage + Supabase staff
  useEffect(()=>{
    setCustomers(LS.get(LS_CUST,[]));
    setBlocks(LS.get(LS_BLOCKS,[]));
    loaded.current=true;
    // Supabase에서 스텝 목록 로드 (우선)
    sbGet('staff?select=*&is_active=eq.true&order=created_at.asc')
      .then(data=>{
        if(data&&data.length>0){setStaff(data);LS.set(LS_STAFF,data);}
        else setStaff(LS.get(LS_STAFF,[]));
      });
  },[]);

  // Supabase 고객 + 예약 이력 로드 (pin 포함)
  const loadSupaCustomers=useCallback(async()=>{
    const [custData, histData] = await Promise.all([
      sbGet('customers?select=id,name,phone,pin,memo,created_at&order=created_at.desc'),
      sbGet('bookings?select=*,customers(name,phone,pin)&order=booking_date.desc&limit=500')
    ]);
    setSupaCustomers(custData||[]);
    setSupaHistory(histData||[]);
  },[]);

  useEffect(()=>{
    loadSupaCustomers();
  },[loadSupaCustomers]);

  // 요청함: pending(미처리)만 로드 — 확정/거절 시 자동 삭제됨
  const loadAllPending=useCallback(async()=>{
    const data=await sbGet('bookings?select=*,customers(name,phone,pin)&status=eq.pending&order=booking_date.asc&order=start_time.asc');
    setAllPending(data||[]);
  },[]);

  useEffect(()=>{
    loadAllPending();
    const id=setInterval(loadAllPending,30000); // 30초마다 갱신
    return()=>clearInterval(id);
  },[loadAllPending]);

  // 선택 날짜 변경 시 Supabase 예약 로드
  useEffect(()=>{
    const date=dateISO(selectedDate);
    setLoadingBkg(true);
    sbGet(`bookings?booking_date=eq.${date}&select=*,customers(name,phone)&status=in.(pending,confirmed)&order=start_time.asc`)
      .then(data=>{setSupaBookings(data||[]);})
      .finally(()=>setLoadingBkg(false));
  },[selectedDate]);

  // 데이터 변경 시 localStorage 저장
  useEffect(()=>{
    if(!loaded.current)return;
    LS.set(LS_CUST,customers);LS.set(LS_BLOCKS,blocks);
  },[customers,blocks]);

  const signOut=()=>{localStorage.removeItem(AUTH_KEY);onSignOut();};

  // Supabase 예약 새로고침
  const reloadSupaBookings=useCallback(async()=>{
    const date=dateISO(selectedDate);
    const data=await sbGet(`bookings?booking_date=eq.${date}&select=*,customers(name,phone)&status=in.(pending,confirmed)&order=start_time.asc`);
    setSupaBookings(data||[]);
  },[selectedDate]);

  // 예약 확정
  const confirmBooking=useCallback(async(block)=>{
    await sbPatch('bookings',block.supaId,{status:'confirmed',confirmed_at:new Date().toISOString()});
    setSelectedBlock(null);
    await reloadSupaBookings();
    setToast({title:`${block.customer.name} 예약 확정`,sub:'고객에게 확정 알림이 필요합니다'});
  },[reloadSupaBookings]);

  // 예약 거절
  const rejectBooking=useCallback(async(block)=>{
    await sbPatch('bookings',block.supaId,{status:'rejected'});
    setSelectedBlock(null);
    await reloadSupaBookings();
    setToast({title:`${block.customer.name} 예약 거절됨`});
  },[reloadSupaBookings]);

  const initDraft=()=>({date:new Date(selectedDate),duration:60,startTime:'13:00',endTime:'14:00',name:'',phone:'',customer:null,segs:[]});
  const openNew=()=>{setDraft(initDraft());setEditingId(null);setFlow('s1');};
  const openNewAt=useCallback((time,staffId)=>{
    if(flow)return;
    const d={date:new Date(selectedDate),duration:60,startTime:time,name:'',phone:'',customer:null,segs:[]};
    if(staffId&&staff.find(s=>s.id===staffId))d.segs=[{staffId,label:'시술',dur:60}];
    setDraft(d);setEditingId(null);setFlow('s2');
  },[flow,staff,selectedDate]);

  const openEdit=async(block)=>{
    // Supabase 블록 편집
    if(block.isSupa&&block.supaId){
      // Supabase에서 전체 예약 정보 가져오기
      const booking=supaBookings.find(b=>b.id===block.supaId);
      if(!booking)return;

      // staff_sequence 파싱
      let segs=[];
      try{
        if(booking.staff_sequence){
          segs=JSON.parse(booking.staff_sequence);
        }
      }catch{}

      // segs가 없으면 단일 스텝으로 설정
      if(segs.length===0){
        segs=[{staffId:booking.requested_staff_id||block.staffId,label:'시술',dur:block.dur}];
      }

      const bDate=new Date(booking.booking_date);
      setDraft({
        date:bDate,
        duration:segs.reduce((sum,s)=>sum+s.dur,0),
        startTime:booking.start_time?.slice(0,5)||block.start,
        name:booking.customers?.name||block.customer.name,
        phone:booking.customers?.phone||'',
        customer:{
          name:booking.customers?.name||block.customer.name,
          phone:booking.customers?.phone||'',
          visits:0,
          color:block.customer.color
        },
        segs
      });
      setEditingId(block.id);
      setSelectedBlock(null);
      setFlow('s1');
    } else {
      // 로컬 블록 편집 (기존 로직)
      const bDate=block.date?new Date(block.date):new Date(selectedDate);
      setDraft({
        date:bDate,
        duration:block.dur,
        startTime:block.start,
        name:block.customer.name,
        phone:'',
        customer:customers.find(c=>c.name===block.customer.name)||{name:block.customer.name,phone:'',visits:0,color:block.customer.color},
        segs:[{staffId:block.staffId,label:block.customer.service,dur:block.dur}]
      });
      setEditingId(block.id);
      setSelectedBlock(null);
      setFlow('s1');
    }
  };
  const closeFlow=()=>{setFlow(null);setDraft(null);setEditingId(null);};

  const handleBlockMove=useCallback(async(blockId,newStart,newStaffId)=>{
    // 블록 찾기
    const block=todayBlocks.find(b=>b.id===blockId);
    if(!block){
      console.warn('[handleBlockMove] 블록을 찾을 수 없음:',blockId);
      return;
    }

    console.log('[handleBlockMove] 시작:',{blockId,newStart,newStaffId,block});

    // Supabase 예약 블록인 경우
    if(block.isSupa&&block.supaId){
      console.log('[handleBlockMove] Supabase 블록 이동:',block.supaId);
      // 여러 세그먼트가 있는 경우
      if(block.totalSegments>1){
        // 전체 예약 시간 계산
        const allBlocks=todayBlocks.filter(b=>b.supaId===block.supaId).sort((a,b)=>a.segmentIndex-b.segmentIndex);
        const totalDur=allBlocks.reduce((sum,b)=>sum+b.dur,0);
        const newEnd=addMin(newStart,totalDur);

        // staff_sequence 업데이트: 드래그한 세그먼트의 스텝만 변경
        let updatedSegs;
        try{
          const booking=supaBookings.find(b=>b.id===block.supaId);
          const segs=JSON.parse(booking.staff_sequence||'[]');
          segs[block.segmentIndex].staffId=newStaffId;
          updatedSegs=segs;
        }catch{
          updatedSegs=[{staffId:newStaffId,label:'시술',dur:block.dur}];
        }

        const updates={
          start_time:newStart,
          end_time:newEnd,
          requested_staff_id:updatedSegs[0]?.staffId||newStaffId,
          staff_sequence:JSON.stringify(updatedSegs)
        };
        console.log('[handleBlockMove] 여러 세그먼트 업데이트:',updates);
        const ok=await sbPatch('bookings',block.supaId,updates);
        if(ok){
          console.log('[handleBlockMove] 업데이트 성공');
          await reloadSupaBookings();
          setToast({title:'예약이 이동되었습니다',sub:`${newStart} · ${staff.find(s=>s.id===newStaffId)?.name||''} (${block.segmentIndex+1}/${block.totalSegments})`});
        } else {
          console.error('[handleBlockMove] 업데이트 실패');
          setToast({title:'⚠️ 이동 실패',sub:'다시 시도해주세요'});
        }
      } else {
        // 단일 블록 이동
        const newEnd=addMin(newStart,block.dur);
        const updates={
          start_time:newStart,
          end_time:newEnd,
          requested_staff_id:newStaffId
        };
        console.log('[handleBlockMove] 단일 블록 업데이트:',updates);
        const ok=await sbPatch('bookings',block.supaId,updates);
        if(ok){
          console.log('[handleBlockMove] 업데이트 성공');
          await reloadSupaBookings();
          setToast({title:'예약이 이동되었습니다',sub:`${newStart} · ${staff.find(s=>s.id===newStaffId)?.name||''}`});
        } else {
          console.error('[handleBlockMove] 업데이트 실패');
          setToast({title:'⚠️ 이동 실패',sub:'다시 시도해주세요'});
        }
      }
    } else {
      // 로컬 블록 이동 (기존 로직)
      setBlocks(prev=>prev.map(b=>b.id===blockId?{...b,start:newStart,staffId:newStaffId}:b));
      setHighlightId(blockId);setTimeout(()=>setHighlightId(null),2500);
      setToast({title:'예약 시간이 변경되었습니다',sub:`${newStart}로 이동됨`});
    }
  },[todayBlocks,staff,reloadSupaBookings,supaBookings]);

  const submit=async()=>{
    setFlow('busy');
    const custName=draft.customer?.name||draft.name;
    const startTime=draft.startTime;
    const isEdit=!!editingId;
    const dISO=dateISO(draft.date);
    const custColor=draft.customer?.color||'sky';

    // Supabase 블록 편집인지 확인
    const editingBlock=todayBlocks.find(b=>b.id===editingId);
    const isSupaEdit=editingBlock?.isSupa&&editingBlock?.supaId;

    if(isSupaEdit){
      // Supabase 예약 업데이트
      let acc=0;
      const endTime=addMin(startTime,draft.duration);
      const updates={
        booking_date:dISO,
        start_time:startTime,
        end_time:endTime,
        requested_staff_id:draft.segs[0]?.staffId||null,
        staff_sequence:draft.segs.length>1?JSON.stringify(draft.segs):null
      };

      const ok=await sbPatch('bookings',editingBlock.supaId,updates);
      if(ok){
        await reloadSupaBookings();
        setFlow(null);setDraft(null);setEditingId(null);
        setToast({title:`${custName} 예약 수정 완료`,sub:`${startTime}로 변경됨`});
      } else {
        setFlow(null);
        setToast({title:'⚠️ 수정 실패',sub:'다시 시도해주세요'});
      }
    } else {
      // 로컬 블록 생성/편집 (기존 로직)
      setTimeout(()=>{
        let acc=0;
        const newBlocks=draft.segs.map((seg,i)=>{const start=addMin(startTime,acc);acc+=seg.dur;const id=isEdit&&i===0?editingId:`nb_${Date.now()}_${i}`;return{id,staffId:seg.staffId,start,dur:seg.dur,date:dISO,customer:{name:custName,service:seg.label,color:custColor}};});
        const mid=newBlocks[Math.floor(newBlocks.length/2)]?.id;
        setBlocks(prev=>[...(isEdit?prev.filter(b=>b.id!==editingId):prev),...newBlocks]);
        setHighlightId(mid);setTimeout(()=>setHighlightId(null),3500);
        setFlow(null);setDraft(null);setEditingId(null);
        // 신규 고객 visits 업데이트
        if(draft.customer?.isNew){
          setCustomers(prev=>[...prev,{id:`c_${Date.now()}`,visits:1,last:draft.segs[0]?.label||'시술',name:custName,phone:draft.customer.phone||'',color:custColor}]);
        } else if(draft.customer){
          setCustomers(prev=>prev.map(c=>c.name===custName?{...c,visits:(c.visits||0)+1,last:draft.segs[0]?.label||c.last}:c));
        }
        setToast({title:`${custName}·${startTime} ${isEdit?'수정':'등록'} 완료`,sub:'저장됨'});
      },800);
    }
  };

  const deleteBlock=async(id)=>{
    const block=todayBlocks.find(b=>b.id===id);
    if(!block)return;

    // Supabase 예약 블록 삭제
    if(block.isSupa&&block.supaId){
      const ok=await sbPatch('bookings',block.supaId,{status:'cancelled'});
      if(ok){
        await reloadSupaBookings();
        setSelectedBlock(null);
        setToast({title:'예약이 취소되었습니다',sub:'상태가 "취소됨"으로 변경되었습니다'});
      } else {
        setToast({title:'⚠️ 취소 실패',sub:'다시 시도해주세요'});
      }
    } else {
      // 로컬 블록 삭제 (기존 로직)
      setBlocks(prev=>prev.filter(b=>b.id!==id));
      setSelectedBlock(null);
      setToast({title:'예약이 삭제되었습니다'});
    }
  };
  const isBusy=flow==='busy';

  useEffect(()=>{const fn=e=>{if(e.key==='Escape'&&!isBusy){closeFlow();setSelectedBlock(null);}};window.addEventListener('keydown',fn);return()=>window.removeEventListener('keydown',fn);},[isBusy]);

  // 로컬 블록 + Supabase 예약 병합
  const todayBlocks=useMemo(()=>{
    const date=dateISO(selectedDate);
    const localBlocks=blocks.filter(b=>b.date===date);
    const localIds=new Set(localBlocks.map(b=>b.id));
    const sbBlocks=supaBookings
      .flatMap(b=>bookingToBlock(b,staff)) // flatMap으로 여러 블록 처리
      .filter(b=>b&&!localIds.has(b.id.replace(/_\d+$/,''))); // sb_{id}_0 형태도 처리
    return [...localBlocks,...sbBlocks];
  },[blocks,supaBookings,selectedDate,staff]);

  return <div style={{height:'100%',display:'flex',flexDirection:'column',background:T.surface}}>
    {toast&&<Toast msg={toast} onDone={()=>setToast(null)}/>}
    {tab==='inbox'&&<InboxScreen
      allPending={allPending}
      staff={staff}
      onConfirm={async(b)=>{
        // 1. 즉시 UI에서 제거 (optimistic)
        setAllPending(prev=>prev.filter(x=>x.id!==b.id));
        // 2. Supabase 업데이트
        const updates=b._updates||{status:'confirmed',confirmed_at:new Date().toISOString()};
        const ok=await sbPatch('bookings',b.id,updates);
        if(!ok){
          loadAllPending();
          setToast({title:'처리에 실패했습니다. 다시 시도해주세요.'});
          return;
        }
        // 3. Google Calendar 이벤트 생성
        const curToken=gcalGetToken();
        if(curToken){
          const svcMap={hair:'헤어',makeup:'메이크업',both:'헤어+메이크업'};
          // 담당 스텝 라벨 구성: 여러 스텝 순서가 있으면 모두 표시
          let staffLabel='랜덤배정';
          if(b._editSegs&&b._editSegs.length>0){
            staffLabel=b._editSegs.map((seg,i)=>{
              const s=staff.find(st=>st.id===seg.staffId);
              return `${i+1}. ${s?.name||'?'} (${seg.dur}분)`;
            }).join(' → ');
          } else {
            const finalStaffId=updates.requested_staff_id||b.requested_staff_id;
            staffLabel=finalStaffId?(staff.find(s=>s.id===finalStaffId)?.name||'랜덤배정'):'랜덤배정';
          }
          // 업데이트된 예약 정보로 이벤트 생성
          const bookingForCal={...b,...updates};
          const calResult=await gcalCreateEvent(bookingForCal, staffLabel);
          if(calResult.ok){
            setToast({title:`${b.customers?.name} 예약 확정됨`,sub:'📅 구글 캘린더에 자동 등록되었습니다'});
          } else if(calResult.reason==='token_expired'){
            setGoogleToken(null);
            setToast({title:`${b.customers?.name} 예약 확정됨`,sub:'⚠️ 구글 토큰 만료 — 설정에서 재연결 필요'});
          } else {
            setToast({title:`${b.customers?.name} 예약 확정됨`,sub:`⚠️ 캘린더 등록 실패: ${calResult.reason}`});
          }
        } else {
          setToast({title:`${b.customers?.name} 예약 확정됨`});
        }
        // 4. 백그라운드 새로고침
        setTimeout(()=>Promise.all([loadAllPending(),reloadSupaBookings(),loadSupaCustomers()]),500);
      }}
      onReject={async(b,reason='')=>{
        // 1. 즉시 UI에서 제거 (optimistic)
        setAllPending(prev=>prev.filter(x=>x.id!==b.id));
        // 2. Supabase 업데이트
        const ok=await sbPatch('bookings',b.id,{status:'rejected',rejection_reason:reason});
        if(!ok){
          loadAllPending();
          setToast({title:'처리에 실패했습니다. 다시 시도해주세요.'});
          return;
        }
        setToast({title:`${b.customers?.name} 예약 거절됨`});
        // 3. 백그라운드 새로고침
        setTimeout(()=>Promise.all([loadAllPending(),reloadSupaBookings(),loadSupaCustomers()]),500);
      }}
      onJumpDate={date=>{setSelectedDate(new Date(date));setTab('today');}}
    />}
    {tab==='today'&&<>
      <Header selectedDate={selectedDate} setSelectedDate={setSelectedDate} blockCount={todayBlocks.length} staffCount={staff.length} loadingBkg={loadingBkg} supaBookings={supaBookings} staff={staff} supaCustomers={supaCustomers} setDraft={setDraft} setEditingId={setEditingId} setFlow={setFlow}/>
      <div style={{flex:1,minHeight:0,display:'flex',flexDirection:'column',overflow:'hidden',position:'relative'}}>
        <Timeline staff={staff} blocks={todayBlocks} highlightId={highlightId}
          onBlockTap={b=>{if(!flow)setSelectedBlock(b);}}
          onBlockEdit={b=>{if(!flow)openEdit(b);}}
          onBlockDelete={id=>{if(!flow)deleteBlock(id);}}
          onBlockMove={handleBlockMove}
          onEmptyTap={openNewAt}/>
        {!flow&&!selectedBlock&&<button onClick={openNew} style={{position:'absolute',right:20,bottom:24,width:56,height:56,borderRadius:'50%',background:T.ink,color:'#fff',border:'none',fontSize:30,fontWeight:300,boxShadow:'0 6px 20px rgba(0,0,0,.35)',cursor:'pointer',zIndex:10,display:'flex',alignItems:'center',justifyContent:'center',animation:'popIn .3s'}}>＋</button>}
      </div>
    </>}
    {tab==='staff'&&<StaffScreen staff={staff} setStaff={setStaff} blocks={blocks}/>}
    {tab==='cust' &&<CustomerScreen supaCustomers={supaCustomers} supaHistory={supaHistory} onRefresh={loadSupaCustomers}/>}
    {tab==='me'   &&<SettingsScreen onSignOut={signOut} googleToken={googleToken} setGoogleToken={setGoogleToken} staff={staff}/>}
    <TabBar active={tab} setActive={v=>{setTab(v);closeFlow();setSelectedBlock(null);}} pendingCount={allPending.filter(b=>b.status==='pending').length}/>
    {selectedBlock&&<BlockSheet block={selectedBlock} staff={staff} onClose={()=>setSelectedBlock(null)} onEdit={()=>openEdit(selectedBlock)} onDelete={()=>deleteBlock(selectedBlock.id)} onConfirm={confirmBooking} onReject={rejectBooking}/>}
    {flow==='s1'&&<S1Date draft={draft} set={setDraft} onNext={()=>setFlow('s2')} onClose={closeFlow}/>}
    {flow==='s2'&&<S2Customer draft={draft} set={setDraft} customers={customers} onNext={()=>setFlow('s3')} onBack={()=>setFlow('s1')} onClose={closeFlow}/>}
    {flow==='s3'&&<S3Time draft={draft} set={setDraft} onNext={()=>setFlow('s4')} onBack={()=>setFlow('s2')} onClose={closeFlow}/>}
    {flow==='s4'&&<S4Duration draft={draft} set={setDraft} onNext={()=>setFlow('s5')} onBack={()=>setFlow('s3')} onClose={closeFlow}/>}
    {flow==='s5'&&<S5Staff draft={draft} set={setDraft} staff={staff} onNext={()=>setFlow('confirm')} onBack={()=>setFlow('s4')} onClose={closeFlow}/>}
    {(flow==='confirm'||isBusy)&&<ConfirmSheet draft={draft} staff={staff} onSubmit={submit} onBack={()=>setFlow('s5')} onClose={closeFlow} busy={isBusy}/>}
  </div>;
}

// ── Root App ───────────────────────────────────────────────────────
function App(){
  const[authed,setAuthed]=useState(()=>localStorage.getItem(AUTH_KEY)==='1');

  if(!authed)return <LoginScreen onLogin={()=>setAuthed(true)}/>;
  return <AdminApp onSignOut={()=>setAuthed(false)}/>;
}

// DOM 및 라이브러리 로딩 대기
console.log('📦 App 컴포넌트 준비 완료');

function initApp() {
  console.log('🎨 앱 초기화 시작...');

  // React/ReactDOM 로드 확인
  if (typeof React === 'undefined' || typeof ReactDOM === 'undefined') {
    console.error('❌ React 라이브러리가 로드되지 않았습니다');
    document.getElementById('root').innerHTML = `
      <div style="padding:40px;text-align:center;font-family:sans-serif;">
        <h2 style="color:#EF4444;margin-bottom:16px;">⚠️ React 로딩 실패</h2>
        <p style="color:#6B7280;margin-bottom:24px;">인터넷 연결을 확인하고 페이지를 새로고침하세요.</p>
        <button onclick="location.reload()" style="padding:10px 20px;border-radius:8px;border:none;background:#18181B;color:#fff;cursor:pointer;">새로고침</button>
      </div>
    `;
    return;
  }

  try {
    console.log('🎨 렌더링 시작...');
    ReactDOM.render(<App/>, document.getElementById('root'));
    console.log('✅ 렌더링 완료!');
  } catch(e) {
    console.error('❌ 렌더링 에러:', e);
    document.getElementById('root').innerHTML = `
      <div style="padding:40px;text-align:center;font-family:sans-serif;">
        <h2 style="color:#EF4444;margin-bottom:16px;">⚠️ 앱 로딩 실패</h2>
        <p style="color:#6B7280;margin-bottom:24px;">렌더링 에러: ${e.message}</p>
        <p style="font-size:14px;color:#9CA3AF;">브라우저 콘솔(F12)에서 상세 에러를 확인하세요.</p>
        <button onclick="location.reload()" style="padding:10px 20px;border-radius:8px;border:none;background:#18181B;color:#fff;cursor:pointer;margin-top:16px;">새로고침</button>
      </div>
    `;
  }
}

// 초기화 실행 (약간의 지연 추가)
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', initApp);
} else {
  setTimeout(initApp, 100);
}
</script>
</body>
