// 누누아누 OAuth 클라이언트 ID (자동 설정)
const GCAL_DEFAULT_CLIENT_ID = '215660211768-9uk9dpka1v42ds4lkgkbla6bp0dbakr1.apps.googleusercontent.com';
const GCAL_SCOPE = 'https://www.googleapis.com/auth/calendar.events';
const GCAL_KEY = 'nunu_google_cal';
let _tokenClient = null;

function gcalSaveToken(resp) {
  const data = {
    access_token: resp.access_token,
    expires_at: Date.now() + (resp.expires_in || 3600) * 1000,
    email: ''
  };
  // 사용자 이메일 조회
  fetch('https://www.googleapis.com/oauth2/v2/userinfo', {
    headers: { Authorization: `Bearer ${resp.access_token}` }
  }).then(r => r.json()).then(info => {
    data.email = info.email || '';
    localStorage.setItem(GCAL_KEY, JSON.stringify(data));
  }).catch(() => {
    localStorage.setItem(GCAL_KEY, JSON.stringify(data));
  });
  return data;
}

function gcalGetToken() {
  try {
    const d = JSON.parse(localStorage.getItem(GCAL_KEY) || 'null');
    if (!d || !d.access_token) return null;
    if (Date.now() > d.expires_at - 120000) return null; // 2분 전 만료 처리
    return d;
  } catch { return null; }
}

function gcalInit(clientId, onToken) {
  if (!window.google?.accounts?.oauth2) return false;
  _tokenClient = window.google.accounts.oauth2.initTokenClient({
    client_id: clientId,
    scope: GCAL_SCOPE,
    callback: (resp) => {
      if (resp.error) { console.error('Google OAuth 오류:', resp.error); return; }
      const saved = gcalSaveToken(resp);
      if (onToken) setTimeout(() => onToken(saved), 500);
    }
  });
  return true;
}

function gcalLogin() {
  if (!_tokenClient) return false;
  _tokenClient.requestAccessToken({ prompt: '' });
  return true;
}

async function gcalCreateEvent(booking, staffLabel) {
  const token = gcalGetToken();
  if (!token) return { ok: false, reason: 'no_token' };

  const svcMap = { hair: '✂️ 헤어', makeup: '💄 메이크업', both: '✨ 헤어+메이크업' };
  const pad = n => String(n).padStart(2, '0');

  // 날짜+시간 형식: 2026-06-05T10:00:00
  const startDT = `${booking.booking_date}T${(booking.start_time||'').slice(0,5)}:00`;
  const endDT   = `${booking.booking_date}T${(booking.end_time||'').slice(0,5)}:00`;

  const desc = [
    `고객: ${booking.customers?.name} (${booking.customers?.phone || ''})`,
    `시술: ${booking.service_detail || svcMap[booking.service_type]}`,
    staffLabel ? `담당: ${staffLabel}` : '',
    booking.customer_memo ? `요청사항: ${booking.customer_memo}` : '',
    `\n예약 앱에서 확정됨`
  ].filter(Boolean).join('\n');

  const event = {
    summary: `[예약] ${booking.customers?.name} · ${svcMap[booking.service_type]||booking.service_type}`,
    description: desc,
    start: { dateTime: startDT, timeZone: 'Asia/Seoul' },
    end:   { dateTime: endDT,   timeZone: 'Asia/Seoul' },
    colorId: '2' // 초록색
  };

  try {
    const r = await fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events', {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${token.access_token}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(event)
    });
    const body = await r.json();
    if (!r.ok) {
      // 토큰 만료 시
      if (r.status === 401) {
        localStorage.removeItem(GCAL_KEY);
        return { ok: false, reason: 'token_expired' };
      }
      return { ok: false, reason: body.error?.message || r.status };
    }
    return { ok: true, eventId: body.id, htmlLink: body.htmlLink };
  } catch(e) {
    return { ok: false, reason: e.message };
  }
}

// ── Supabase 예약 → 타임라인 블록 변환 (여러 스텝 순서 지원) ───────
function bookingToBlock(b, staffList){
  const startTime=(b.start_time||'09:00').slice(0,5);
  const endTime=(b.end_time||'10:00').slice(0,5);
  const[sh,sm]=startTime.split(':').map(Number);
  const[eh,em]=endTime.split(':').map(Number);
  const totalDur=Math.max(10,(eh*60+em)-(sh*60+sm));

  const svcMap={hair:'✂️ 헤어',makeup:'💄 메이크업',both:'✨ 헤어+메이크업'};
  const colorMap={pending:'amber',confirmed:'emerald',rejected:'rose',cancelled:'lime'};
  const statusLabel={pending:'[요청중]',confirmed:'[확정]',rejected:'[거절]',cancelled:'[취소]'};

  // staff_sequence가 있으면 여러 블록 생성
  let segs=[];
  try{
    if(b.staff_sequence){
      segs=JSON.parse(b.staff_sequence);
    }
  }catch{}

  if(segs.length>0){
    // 여러 스텝 순서 배정: 각 세그먼트마다 블록 생성
    const blocks=[];
    let acc=0;
    segs.forEach((seg,i)=>{
      const start=addMin(startTime,acc);
      blocks.push({
        id:`sb_${b.id}_${i}`,
        staffId:seg.staffId,
        start,
        dur:seg.dur,
        date:b.booking_date,
        customer:{
          name:b.customers?.name||'예약자',
          service:`${svcMap[b.service_type]||b.service_type} ${statusLabel[b.status]||''} (${i+1}/${segs.length})`,
          color:colorMap[b.status]||'sky'
        },
        status:b.status,
        memo:b.customer_memo||'',
        phone:b.customers?.phone||'',
        isSupa:true,
        supaId:b.id,
        segmentIndex:i,
        totalSegments:segs.length
      });
      acc+=seg.dur;
    });
    return blocks;
  }

  // 단일 스텝 배정 (기존 로직)
  let staffId=b.requested_staff_id||null;
  if(!staffId&&staffList.length>0){
    const match=staffList.find(s=>
      b.service_type==='hair'?s.role==='hair':
      b.service_type==='makeup'?s.role==='makeup':true
    );
    staffId=(match||staffList[0]).id;
  }

  return [{
    id:`sb_${b.id}`,
    staffId,
    start:startTime,
    dur:totalDur,
    date:b.booking_date,
    customer:{
      name:b.customers?.name||'예약자',
      service:`${svcMap[b.service_type]||b.service_type} ${statusLabel[b.status]||''}`,
      color:colorMap[b.status]||'sky'
    },
    status:b.status,
    memo:b.customer_memo||'',
    phone:b.customers?.phone||'',
    isSupa:true,
    supaId:b.id
  }];
}

function dateISO(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}

function addDays(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r;}

    if(!searchQuery.trim())return[];
    const q=searchQuery.toLowerCase().replace(/-/g,'');
    return (supaCustomers||[])
      .filter(c=>{
        const name=c.name?.toLowerCase()||'';
        const phone=c.phone?.replace(/-/g,'')||'';
        return name.includes(searchQuery.toLowerCase())||phone.includes(q);
      })
      .slice(0,5); // 최대 5개만 표시
  },[searchQuery,supaCustomers]);

  // 고객 검색 결과 (예약 기록)
  const searchResults=useMemo(()=>{
    if(!searchQuery.trim())return[];
    const q=searchQuery.toLowerCase().replace(/-/g,'');
    return (supaBookings||[])
      .filter(b=>b.status==='confirmed')
      .filter(b=>{
        const name=b.customers?.name?.toLowerCase()||'';
        const phone=b.customers?.phone?.replace(/-/g,'')||'';
        return name.includes(searchQuery)||phone.includes(q);
      })
      .sort((a,b)=>a.booking_date.localeCompare(b.booking_date)||a.start_time.localeCompare(b.start_time));
  },[searchQuery,supaBookings]);

  // 검색 결과의 날짜들
  const searchDates=useMemo(()=>{
    return [...new Set(searchResults.map(b=>b.booking_date))];
  },[searchResults]);

  // 날짜별 확정 예약 개수 계산 (검색 모드일 때는 검색 결과만)
  const bookingsByDate=useMemo(()=>{
    const map={};
    const bookings=searchMode&&searchQuery.trim()?searchResults:(supaBookings||[]).filter(b=>b.status==='confirmed');
    bookings.forEach(b=>{
      if(!map[b.booking_date])map[b.booking_date]=0;
      map[b.booking_date]++;
    });
    return map;
  },[supaBookings,searchMode,searchQuery,searchResults]);

  const navBtn=(label,fn)=><button type="button" onClick={fn} style={{width:32,height:32,border:'none',background:'transparent',fontSize:18,color:T.ink2,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',borderRadius:8}}>{label}</button>;

  // 날짜 클릭 핸들러
  const handleDateClick=(date)=>{
    const dateStr=`${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;

    // 같은 날짜를 다시 클릭하면 타임라인으로 이동
    if(dateStr===selectedDate){
      onChange(date);
      onClose?.();
    } else {
      // 다른 날짜를 클릭하면 리스트만 업데이트
      setSelectedDate(dateStr);
    }
  };

  // 선택된 날짜의 예약 목록 (검색 모드 고려)
  const selectedBookings=useMemo(()=>{
    if(!selectedDate)return[];
    const bookings=searchMode&&searchQuery.trim()?searchResults:(supaBookings||[]).filter(b=>b.status==='confirmed');
    return bookings.filter(b=>b.booking_date===selectedDate).sort((a,b)=>a.start_time.localeCompare(b.start_time));
  },[selectedDate,supaBookings,searchMode,searchQuery,searchResults]);

  const svcMap={hair:'✂️ 헤어',makeup:'💄 메이크업',both:'✨ 헤어+메이크업'};

  const[y,m,d]=selectedDate.split('-').map(Number);

  // 검색 실행
  const handleSearch=()=>{
    if(searchQuery.trim()){
      setSearchMode(true);
      // 검색 결과의 첫 번째 날짜로 이동
      if(searchDates.length>0){
        setSelectedDate(searchDates[0]);
        const[yy,mm]=searchDates[0].split('-').map(Number);
        setVm(new Date(yy,mm-1,1));
      }
    } else {
      setSearchMode(false);
    }
  };

  // 검색 초기화
  const clearSearch=()=>{
    setSearchQuery('');
    setSearchMode(false);
    setShowAutocomplete(false);
    setFocusedIndex(-1);
  };

  // 고객 선택 시 예약 생성
  const handleSelectCustomer=(customer)=>{
    setSearchQuery('');
    setShowAutocomplete(false);
    setSearchMode(false);
    setFocusedIndex(-1);
    // 현재 선택된 날짜로 예약 생성
    if(onCreateBooking){
      onCreateBooking(customer,selectedDate);
    }
    if(onClose){
      onClose();
    }
  };

  // 키보드 네비게이션
  const handleKeyDown=(e)=>{
    if(!showAutocomplete||autocompleteCustomers.length===0)return;

    if(e.key==='ArrowDown'){
      e.preventDefault();
      setFocusedIndex(prev=>prev<autocompleteCustomers.length-1?prev+1:prev);
    }else if(e.key==='ArrowUp'){
      e.preventDefault();
      setFocusedIndex(prev=>prev>0?prev-1:0);
    }else if(e.key==='Enter'){
      e.preventDefault();
      if(focusedIndex>=0&&focusedIndex<autocompleteCustomers.length){
        handleSelectCustomer(autocompleteCustomers[focusedIndex]);
      }else{
        handleSearch();
      }
    }else if(e.key==='Escape'){
      setShowAutocomplete(false);
      setFocusedIndex(-1);
    }
  };

  // 입력값 변경 시
  const handleInputChange=(e)=>{
    const val=e.target.value;
    setSearchQuery(val);
    setShowAutocomplete(val.trim().length>0);
    setFocusedIndex(-1);
  };

  // 포커스 아웃 처리
  const handleBlur=()=>{
    // 약간의 지연을 주어 클릭 이벤트가 먼저 처리되도록 함
    setTimeout(()=>setShowAutocomplete(false),200);
  };

  // 자동완성 사용 가능 여부
  const hasAutocompleteFeature=supaCustomers&&supaCustomers.length>0&&onCreateBooking;

  // 캘린더 + 리스트 함께 표시
  return <div style={{background:T.surface,borderRadius:18,padding:14,border:`1px solid ${T.line}`,boxShadow:'0 12px 40px rgba(0,0,0,.18)',width:320,maxHeight:'80vh',display:'flex',flexDirection:'column',gap:12}}>
    {/* 검색창 */}
    <div style={{display:'flex',gap:6}}>
      <div style={{flex:1,position:'relative'}}>
        <input
          ref={inputRef}
          type="text"
          value={searchQuery}
          onChange={handleInputChange}
          onKeyDown={handleKeyDown}
          onFocus={()=>searchQuery.trim()&&hasAutocompleteFeature&&setShowAutocomplete(true)}
          onBlur={handleBlur}
          placeholder="고객명 또는 연락처 검색"
          style={{width:'100%',height:36,borderRadius:10,border:`1.5px solid ${T.line}`,background:T.bg,padding:'0 32px 0 10px',fontSize:13,outline:'none',transition:'border .15s'}}
        />
        {searchQuery&&<button type="button" onClick={clearSearch} style={{position:'absolute',right:8,top:'50%',transform:'translateY(-50%)',width:20,height:20,borderRadius:'50%',border:'none',background:T.line,color:T.ink2,fontSize:10,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',zIndex:10}}>✕</button>}

        {/* 자동완성 드롭다운 */}
        {hasAutocompleteFeature&&showAutocomplete&&autocompleteCustomers.length>0&&<div style={{position:'absolute',top:'100%',left:0,right:0,marginTop:4,background:'#fff',border:`1px solid ${T.line}`,borderRadius:10,boxShadow:'0 4px 12px rgba(0,0,0,.15)',zIndex:100,maxHeight:200,overflowY:'auto'}}>
          {autocompleteCustomers.map((customer,idx)=><button
            key={customer.id}
            type="button"
            onClick={()=>handleSelectCustomer(customer)}
            onMouseEnter={()=>setFocusedIndex(idx)}
            style={{width:'100%',padding:'10px 12px',border:'none',background:focusedIndex===idx?'#F3F4F6':'transparent',textAlign:'left',cursor:'pointer',borderBottom:idx<autocompleteCustomers.length-1?`1px solid ${T.line2}`:'none',display:'flex',flexDirection:'column',gap:2,transition:'background .15s'}}>
            <div style={{fontSize:13,fontWeight:700,color:T.ink}}>{customer.name}</div>
            <div style={{fontSize:11,color:T.ink2}}>{customer.phone}</div>
            {customer.memo&&<div style={{fontSize:10,color:T.ink3,marginTop:2}}>📝 {customer.memo}</div>}
          </button>)}
          <div style={{padding:'6px 12px',background:'#F9FAFB',borderTop:`1px solid ${T.line2}`,fontSize:10,color:T.ink3,textAlign:'center'}}>
            ↑↓ 이동 · Enter 선택 · ESC 닫기
          </div>
        </div>}
      </div>
      <button type="button" onClick={handleSearch} disabled={!searchQuery.trim()} style={{width:36,height:36,borderRadius:10,border:'none',background:searchQuery.trim()?T.ink:T.line,color:searchQuery.trim()?'#fff':T.ink3,fontSize:16,cursor:searchQuery.trim()?'pointer':'not-allowed',display:'flex',alignItems:'center',justifyContent:'center'}}>🔍</button>
    </div>

    {/* 검색 결과 안내 */}
    {searchMode&&searchQuery.trim()&&<div style={{fontSize:11,fontWeight:600,color:T.accent,padding:'4px 8px',background:'#FFF0EA',borderRadius:8,textAlign:'center'}}>
      📌 "{searchQuery}" 검색 결과: {searchResults.length}건 ({searchDates.length}일)
    </div>}

    {/* 캘린더 */}
    <div>
      <div style={{display:'flex',alignItems:'center',marginBottom:8}}>
        {navBtn('‹',()=>setVm(d=>new Date(d.getFullYear(),d.getMonth()-1,1)))}
        <div style={{flex:1,textAlign:'center',fontSize:14,fontWeight:800}}>{yr}년 {mo+1}월</div>
        {navBtn('›',()=>setVm(d=>new Date(d.getFullYear(),d.getMonth()+1,1)))}
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',marginBottom:4}}>
        {DOW_KO.map((dw,i)=><div key={dw} style={{textAlign:'center',fontSize:10,fontWeight:700,padding:'4px 0',color:i===0?'#EF4444':i===6?'#3B82F6':T.ink3}}>{dw}</div>)}
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:2}}>
        {cells.map((date,i)=>{
          if(!date)return <div key={i}/>;
          const dateStr=`${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
          const sel=dateStr===selectedDate,tod=isToday(date),dow=date.getDay();
          const bookingCount=bookingsByDate[dateStr]||0;
          const dots=Math.min(5,bookingCount);
          const hasSearchResult=searchMode&&searchDates.includes(dateStr);
          return <button key={i} type="button" onClick={()=>handleDateClick(date)} style={{width:'100%',aspectRatio:'1',borderRadius:8,border:tod&&!sel?`2px solid ${T.accent}`:hasSearchResult?`2px solid #F59E0B`:'none',background:sel?T.ink:hasSearchResult?'#FEF3C7':'transparent',color:sel?'#fff':tod?T.accent:hasSearchResult?'#92400E':dow===0?'#EF4444':dow===6?'#3B82F6':T.ink,fontSize:13,fontWeight:sel||tod||hasSearchResult?800:500,cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',position:'relative'}}>
            <span>{date.getDate()}</span>
            {bookingCount>0&&<div style={{display:'flex',gap:2,marginTop:2}}>
              {[...Array(dots)].map((_,idx)=><div key={idx} style={{width:3,height:3,borderRadius:'50%',background:sel?'#fff':hasSearchResult?'#F59E0B':'#EF4444'}}/>)}
            </div>}
          </button>;
        })}
      </div>
    </div>

    {/* 구분선 */}
    <div style={{height:1,background:T.line}}/>

    {/* 선택된 날짜의 예약 리스트 */}
    <div style={{flex:1,minHeight:0,display:'flex',flexDirection:'column'}}>
      <div style={{fontSize:13,fontWeight:800,marginBottom:8,color:T.ink}}>{m}월 {d}일 예약 ({selectedBookings.length}건)</div>
      <div style={{flex:1,overflowY:'auto',display:'flex',flexDirection:'column',gap:6}}>
        {selectedBookings.length===0?(
          <div style={{textAlign:'center',padding:'20px',color:T.ink3}}>
            <div style={{fontSize:24,marginBottom:6}}>📅</div>
            <div style={{fontSize:12,fontWeight:600}}>{searchMode?'검색 결과가 없습니다':'예약이 없습니다'}</div>
          </div>
        ):selectedBookings.map(b=>{
          const staffName=staff?.find(s=>s.id===b.requested_staff_id)?.name||'랜덤배정';
          return <div key={b.id} style={{background:T.bg,borderRadius:10,padding:'8px 10px',border:`1px solid ${T.line2}`}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:3}}>
              <span style={{fontSize:12,fontWeight:800,color:T.ink}}>{b.start_time?.slice(0,5)} - {b.end_time?.slice(0,5)}</span>
              <span style={{fontSize:10,fontWeight:700,padding:'2px 6px',borderRadius:999,background:'#DCFCE7',color:'#166534'}}>확정</span>
            </div>
            <div style={{fontSize:12,fontWeight:700,color:T.ink,marginBottom:2}}>{b.customers?.name}</div>
            <div style={{fontSize:11,color:T.ink2}}>{svcMap[b.service_type]||b.service_type} · {staffName}</div>
            {b.customer_memo&&<div style={{fontSize:10,color:'#0369A1',marginTop:3,background:'#F0F9FF',padding:'3px 6px',borderRadius:5}}>💬 {b.customer_memo}</div>}
          </div>;
        })}
      </div>
    </div>

    {/* 도움말 */}
    <div style={{fontSize:10,color:T.ink3,textAlign:'center',padding:'6px 0',borderTop:`1px solid ${T.line2}`}}>
      {searchMode?'노란색 날짜: 검색된 예약 · ':''}날짜를 다시 클릭하면 타임라인으로 이동합니다
    </div>
  </div>;
}

// ── TimeWheel ─────────────────────────────────────────────────────
function TimeWheel({value,onChange}){
  const ROW=44,HALF=2;
  const ref=useRef(null);
  useEffect(()=>{if(!ref.current)return;const idx=ALL_TIMES.indexOf(value);if(idx>=0)ref.current.scrollTop=idx*ROW;},[]);
  const onScroll=useCallback(e=>{const idx=Math.round(e.target.scrollTop/ROW),t=ALL_TIMES[Math.max(0,Math.min(ALL_TIMES.length-1,idx))];if(t!==value)onChange(t);},[value,onChange]);
  return <div style={{position:'relative',height:ROW*5,borderRadius:16,overflow:'hidden',border:`1px solid ${T.line}`}}>
    <div style={{position:'absolute',left:0,right:0,top:HALF*ROW,height:ROW,background:T.bg,borderTop:`1px solid ${T.line}`,borderBottom:`1px solid ${T.line}`,zIndex:1,pointerEvents:'none',display:'flex',alignItems:'center',justifyContent:'center'}}>
      <span style={{fontSize:17,fontWeight:800,color:T.accent,fontVariantNumeric:'tabular-nums'}}>{value}</span>
    </div>
    <div style={{position:'absolute',left:0,right:0,top:0,height:HALF*ROW,background:`linear-gradient(${T.surface},transparent)`,zIndex:2,pointerEvents:'none'}}/>
    <div style={{position:'absolute',left:0,right:0,bottom:0,height:HALF*ROW,background:`linear-gradient(transparent,${T.surface})`,zIndex:2,pointerEvents:'none'}}/>
    <div ref={ref} onScroll={onScroll} style={{height:'100%',overflowY:'scroll',scrollSnapType:'y mandatory',paddingTop:HALF*ROW,paddingBottom:HALF*ROW}}>
      {ALL_TIMES.map((t,i)=>{const cur=ALL_TIMES.indexOf(value),dist=Math.abs(i-cur);return <div key={t} onClick={()=>{ref.current.scrollTop=i*ROW;onChange(t);}} style={{height:ROW,scrollSnapAlign:'center',display:'flex',alignItems:'center',justifyContent:'center',fontSize:dist===0?26:dist===1?18:13,fontWeight:dist===0?800:dist===1?600:400,color:dist===0?'transparent':dist===1?T.ink2:T.ink3,fontVariantNumeric:'tabular-nums',cursor:'pointer'}}>{t}</div>;})}
    </div>
  </div>;
}

// ── Context Menu ──────────────────────────────────────────────────
function CtxMenu({x,y,block,onEdit,onDelete,onDetail,onClose}){
  const menuW=160,menuH=130;
  const px=Math.min(x,window.innerWidth-menuW-8),py=Math.min(y,window.innerHeight-menuH-8);
  return <>
    <div onClick={onClose} style={{position:'fixed',inset:0,zIndex:200}}/>
    <div style={{position:'fixed',left:px,top:py,zIndex:201,background:T.surface,borderRadius:14,boxShadow:'0 8px 32px rgba(0,0,0,.22)',border:`1px solid ${T.line}`,overflow:'hidden',minWidth:menuW,animation:'popIn .15s'}}>
      {[{label:'상세 보기',icon:'👁',fn:onDetail},{label:'예약 수정',icon:'✏️',fn:onEdit},{label:'예약 삭제',icon:'🗑️',fn:onDelete,danger:true}].map(item=>(
        <button key={item.label} onClick={item.fn} style={{display:'flex',alignItems:'center',gap:10,width:'100%',padding:'11px 14px',border:'none',background:'transparent',textAlign:'left',fontSize:14,fontWeight:600,color:item.danger?T.danger:T.ink,cursor:'pointer',borderBottom:`1px solid ${T.line2}`}}>
          <span style={{fontSize:16}}>{item.icon}</span>{item.label}
        </button>
      ))}
    </div>
  </>;
}

// ── Timeline ──────────────────────────────────────────────────────
function Timeline({staff,blocks,highlightId,onBlockTap,onBlockEdit,onBlockDelete,onBlockMove,onEmptyTap}){
  const ROW_H=52,SH=ROW_H/6,TOTAL_H=ROW_H*(TL_END-TL_START);
  const bodyRef=useRef(null),dragRef=useRef(null),lpTimer=useRef(null);
  const[ghost,setGhost]=useState(null),[ctxMenu,setCtxMenu]=useState(null);
  const[showWheel,setShowWheel]=useState(false),[wheelTime,setWheelTime]=useState('00:00');
  const wheelDrag=useRef(null);

  useEffect(()=>{
    const el=bodyRef.current;if(!el)return;
    const[h,m]=nowStr().split(':').map(Number);
    if(h>=TL_START&&h<TL_END) el.scrollTop=Math.max(0,(h-TL_START)*ROW_H+m/60*ROW_H-el.clientHeight/3);
  },[]);

  const getPos=useCallback((clientY,clientX)=>{
    const el=bodyRef.current;if(!el)return{slot:0,lane:0};
    const rect=el.getBoundingClientRect();
    const y=clientY-rect.top+el.scrollTop;
    const slot=Math.max(0,Math.min(TOTAL_SLOTS-1,Math.round(y/SH)));
    const x=clientX-rect.left-TIME_COL;
    const laneW=(rect.width-TIME_COL)/Math.max(1,staff.length);
    const lane=Math.max(0,Math.min(staff.length-1,Math.floor(x/laneW)));
    return{slot,lane};
  },[staff.length,SH]);

  const startDrag=useCallback((e,block)=>{
    const pt=e.touches?e.touches[0]:e;
    const blockSlot=timeToSlot(block.start);
    const{slot}=getPos(pt.clientY,pt.clientX);
    dragRef.current={block,offsetSlot:slot-blockSlot,curSlot:blockSlot,curLane:staff.findIndex(s=>s.id===block.staffId),startX:pt.clientX,startY:pt.clientY,moved:false};
  },[staff,getPos]);

  const onBlockTouch=useCallback((e,block)=>{
    const pt=e.touches[0];
    lpTimer.current=setTimeout(()=>{
      dragRef.current=null;navigator.vibrate?.(40);setCtxMenu({x:pt.clientX,y:pt.clientY,block});
    },400);
    startDrag(e,block);
  },[startDrag]);

  useEffect(()=>{
    const clearLp=()=>clearTimeout(lpTimer.current);
    const onMove=e=>{
      if(!dragRef.current)return;
      clearLp();
      const pt=e.touches?e.touches[0]:e;
      const dx=pt.clientX-dragRef.current.startX,dy=pt.clientY-dragRef.current.startY;
      if(!dragRef.current.moved&&Math.sqrt(dx*dx+dy*dy)<8)return;
      dragRef.current.moved=true;
      const{slot,lane}=getPos(pt.clientY,pt.clientX);
      const newSlot=Math.max(0,slot-dragRef.current.offsetSlot);
      dragRef.current.curSlot=newSlot;dragRef.current.curLane=lane;
      setGhost({slot:newSlot,lane,block:dragRef.current.block});
    };
    const onUp=()=>{
      clearLp();if(!dragRef.current)return;
      const d=dragRef.current;dragRef.current=null;setGhost(null);
      if(d.moved){const newStart=slotToTime(d.curSlot),newStaffId=staff[d.curLane]?.id;if(newStaffId)onBlockMove?.(d.block.id,newStart,newStaffId);}
      else onBlockTap?.(d.block);
    };
    window.addEventListener('mousemove',onMove);window.addEventListener('mouseup',onUp);
    window.addEventListener('touchmove',onMove,{passive:true});window.addEventListener('touchend',onUp);
    return()=>{window.removeEventListener('mousemove',onMove);window.removeEventListener('mouseup',onUp);window.removeEventListener('touchmove',onMove);window.removeEventListener('touchend',onUp);};
  },[staff,onBlockMove,onBlockTap,getPos]);

  const onBgClick=useCallback(e=>{
    if(dragRef.current?.moved)return;
    const el=bodyRef.current;if(!el)return;
    const rect=el.getBoundingClientRect();
    const x=e.clientX-rect.left,y=e.clientY-rect.top+el.scrollTop;
    const slot=Math.max(0,Math.min(TOTAL_SLOTS-1,Math.round(y/SH)));
    const time=slotToTime(slot);
    if(x<TIME_COL){setWheelTime(time);setShowWheel(true);}
    else{
      const laneW=(rect.width-TIME_COL)/Math.max(1,staff.length);
      const lane=Math.max(0,Math.min(staff.length-1,Math.floor((x-TIME_COL)/laneW)));
      onEmptyTap?.(time,staff[lane]?.id);
    }
  },[staff,onEmptyTap,SH]);

  const onWheelTimeChange=useCallback(time=>{
    setWheelTime(time);
    const[h,m]=time.split(':').map(Number);
    if(bodyRef.current)bodyRef.current.scrollTop=Math.max(0,(h-TL_START)*ROW_H+m/60*ROW_H-bodyRef.current.clientHeight/3);
  },[ROW_H]);

  const timeLabels=[];
  for(let h=0;h<=TL_END-TL_START;h++){
    timeLabels.push({label:`${String(TL_START+h).padStart(2,'0')}:00`,top:h*ROW_H,isHour:true});
    if(h<TL_END-TL_START)timeLabels.push({label:`${String(TL_START+h).padStart(2,'0')}:30`,top:h*ROW_H+ROW_H/2,isHour:false});
  }

  return <div style={{flex:1,minHeight:0,display:'flex',flexDirection:'column',overflow:'hidden',background:T.surface}}>
    <div style={{display:'flex',borderBottom:`1px solid ${T.line}`,flexShrink:0}}>
      <div style={{width:TIME_COL,flexShrink:0}}/>
      {staff.map(s=><div key={s.id} style={{flex:1,padding:'8px 4px',display:'flex',flexDirection:'column',alignItems:'center',gap:3,borderLeft:`1px solid ${T.line2}`}}>
        <Avatar name={s.name} color={s.color} size={28}/>
        <div style={{fontSize:11,fontWeight:600,color:T.ink2}}>{s.name}</div>
      </div>)}
    </div>

      <div onClick={onBgClick} style={{position:'relative',height:TOTAL_H}}>
        {Array.from({length:TL_END-TL_START+1},(_,i)=>(
          <div key={i} style={{position:'absolute',left:0,right:0,top:i*ROW_H,height:1,background:T.line}}/>
        ))}
        {Array.from({length:TL_END-TL_START},(_,i)=>(
          <div key={`h${i}`} style={{position:'absolute',left:TIME_COL,right:0,top:i*ROW_H+ROW_H/2,height:1,background:T.line2}}/>
        ))}
        {timeLabels.map((item,i)=>(
          <div key={i} style={{position:'absolute',left:0,top:item.top-6,width:TIME_COL,paddingLeft:5,
            fontSize:item.isHour?10:9,fontWeight:item.isHour?700:400,
            color:item.isHour?T.ink3:'#C4C4C0',fontVariantNumeric:'tabular-nums',lineHeight:1,userSelect:'none',pointerEvents:'none'}}>
            {item.label}
          </div>
        ))}
        {staff.map((_,i)=>(
          <div key={i} style={{position:'absolute',top:0,bottom:0,

        {blocks.map(b=>{
          const li=staff.findIndex(s=>s.id===b.staffId);if(li<0)return null;

          const h=Math.max(6,b.dur/60*ROW_H-1);
          const c=CC[b.customer.color]||CC.sky,hl=highlightId===b.id;
          const dragging=ghost?.block.id===b.id;
          return <div key={b.id}
            onMouseDown={e=>{e.preventDefault();startDrag(e,b);}}
            onTouchStart={e=>onBlockTouch(e,b)}
            onClick={e=>e.stopPropagation()}
            onContextMenu={e=>{e.preventDefault();setCtxMenu({x:e.clientX,y:e.clientY,block:b});}}
            style={{position:'absolute',top,height:h,overflow:'hidden',
              left:`calc(${TIME_COL}px + (100% - ${TIME_COL}px)/${Math.max(1,staff.length)}*${li} + 2px)`,
              width:`calc((100% - ${TIME_COL}px)/${Math.max(1,staff.length)} - 4px)`,
              background:c.fill,borderLeft:`3px solid ${c.stripe}`,borderRadius:6,padding:'2px 5px',
              fontSize:10,color:c.ink,fontWeight:600,
              outline:hl?`2px solid ${T.ink}`:'none',outlineOffset:1,
              boxShadow:hl?'0 4px 14px rgba(0,0,0,.14)':'none',
              cursor:'grab',userSelect:'none',WebkitUserSelect:'none',touchAction:'none',
              opacity:dragging?0.3:1,transition:'opacity .15s'}}>
            <div style={{fontWeight:700,fontSize:11,lineHeight:1.3,overflow:'hidden',whiteSpace:'nowrap',textOverflow:'ellipsis'}}>{b.customer.name}</div>
            {h>22&&<div style={{fontSize:9.5,opacity:.75,overflow:'hidden',whiteSpace:'nowrap',textOverflow:'ellipsis'}}>{b.customer.service}</div>}
            {h>36&&<div style={{fontSize:9,opacity:.6,fontVariantNumeric:'tabular-nums'}}>{b.start}·{b.dur}분</div>}
          </div>;
        })}
        {ctxMenu&&<CtxMenu x={ctxMenu.x} y={ctxMenu.y} block={ctxMenu.block}
          onClose={()=>setCtxMenu(null)}
          onDetail={()=>{setCtxMenu(null);onBlockTap?.(ctxMenu.block);}}
          onEdit={()=>{setCtxMenu(null);onBlockEdit?.(ctxMenu.block);}}
          onDelete={()=>{setCtxMenu(null);onBlockDelete?.(ctxMenu.block.id);}}/>}
        {ghost&&(()=>{
          const stf=staff[ghost.lane];
          const top=ghost.slot*SH,h=Math.max(6,ghost.block.dur/60*ROW_H-1);
          return <div style={{position:'absolute',top,height:h,
            left:`calc(${TIME_COL}px + (100% - ${TIME_COL}px)/${Math.max(1,staff.length)}*${ghost.lane} + 2px)`,
            width:`calc((100% - ${TIME_COL}px)/${Math.max(1,staff.length)} - 4px)`,
            background:stf?.color||T.ink,color:'#fff',borderRadius:8,padding:'4px 6px',
            fontSize:10,fontWeight:700,zIndex:20,pointerEvents:'none',
            boxShadow:'0 8px 24px rgba(0,0,0,.28)',border:'2px solid rgba(255,255,255,.4)'}}>
            <div style={{fontSize:12,fontWeight:800}}>{ghost.block.customer.name}</div>
            <div style={{fontSize:10,opacity:.85,fontVariantNumeric:'tabular-nums'}}>{slotToTime(ghost.slot)}·{ghost.block.dur}분</div>
          </div>;
        })()}
        {ghost&&<div style={{position:'absolute',left:TIME_COL,right:0,top:ghost.slot*SH,height:2,background:T.accent,zIndex:19,pointerEvents:'none',borderRadius:1}}/>}
        {(()=>{const t=nowStr(),[h,m]=t.split(':').map(Number);if(h<TL_START||h>=TL_END)return null;
          const top=(h-TL_START)*ROW_H+m/60*ROW_H;
          return <div style={{position:'absolute',left:TIME_COL-4,right:0,top,zIndex:4,pointerEvents:'none'}}>
            <div style={{position:'absolute',left:0,right:0,height:2,background:T.danger,borderRadius:1}}/>
            <div style={{position:'absolute',left:-3,top:-4,width:10,height:10,borderRadius:'50%',background:T.danger}}/>
          </div>;})()}

    </div>
    {showWheel&&<>
      <div onClick={()=>setShowWheel(false)} style={{position:'fixed',inset:0,zIndex:50,background:'rgba(0,0,0,.25)'}}/>
      <div onClick={e=>e.stopPropagation()} style={{position:'fixed',left:'50%',top:'50%',transform:'translate(-50%,-50%)',zIndex:51,background:T.surface,borderRadius:22,padding:'14px 14px 12px',boxShadow:'0 20px 60px rgba(0,0,0,.28)',border:`1px solid ${T.line}`,width:170}}>
        <div style={{fontSize:11,fontWeight:800,color:T.ink2,textAlign:'center',marginBottom:10}}>시간으로 이동</div>

}

// ── Block detail sheet ─────────────────────────────────────────────
function BlockSheet({block,staff,onClose,onEdit,onDelete,onConfirm,onReject}){
  const c=CC[block.customer.color]||CC.sky,s=staff.find(x=>x.id===block.staffId);
  const[confirmDel,setConfirmDel]=useState(false);
  const[confirmRej,setConfirmRej]=useState(false);
  const isPending=block.isSupa&&block.status==='pending';
  const isConfirmed=block.isSupa&&block.status==='confirmed';
  const statusLabel={pending:'⏳ 요청중',confirmed:'✅ 확정됨',rejected:'❌ 거절됨',cancelled:'취소됨'};
  return <Sheet onClose={onClose}>
    <div style={{padding:'12px 20px 0'}}>
      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:12}}>
        <div style={{width:4,height:44,background:c.stripe,borderRadius:2}}/>
        <div style={{flex:1}}>
          <div style={{fontSize:20,fontWeight:800}}>{block.customer.name}</div>
          <div style={{fontSize:13,color:T.ink2,marginTop:2}}>{block.customer.service?.replace(/\[.*?\]/,'').trim()}</div>
        </div>
        {block.isSupa&&<span style={{fontSize:11,fontWeight:700,padding:'3px 8px',borderRadius:999,background:c.fill,color:c.ink}}>{statusLabel[block.status]||block.status}</span>}
      </div>
      {[
        ['담당 스텝',<div style={{display:'flex',alignItems:'center',gap:6}}><Avatar name={s?.name} color={s?.color||'#888'} size={20}/><span style={{fontSize:14,fontWeight:600}}>{s?.name??'미지정'}</span></div>],
        ['시작',block.start],
        ['종료',addMin(block.start,block.dur)],
        ['소요',`${block.dur}분`],
        ...(block.phone?[['연락처',<a href={`tel:${block.phone}`} style={{color:T.accent,fontWeight:700,fontSize:14}}>{block.phone}</a>]]:[]),
        ...(block.memo?[['요청사항',block.memo]]:[]),
      ].map(([l,v],i,a)=><div key={i} style={{display:'flex',alignItems:'center',padding:'11px 0',borderBottom:i<a.length-1?`1px solid ${T.line2}`:'none'}}>
        <div style={{width:80,fontSize:12,color:T.ink2,fontWeight:600,flexShrink:0}}>{l}</div>
        <div style={{flex:1,fontSize:14,fontWeight:600,wordBreak:'break-all'}}>{v}</div>
      </div>)}

      {/* 고객 예약 요청: 확정/거절 버튼 */}
      {isPending&&<div style={{marginTop:14,display:'flex',gap:8,marginBottom:4}}>
        <button onClick={()=>setConfirmRej(true)} style={{flex:1,height:48,borderRadius:14,border:'1px solid #FECACA',background:'#FEF2F2',color:T.danger,fontSize:14,fontWeight:700,cursor:'pointer'}}>거절</button>
        <button onClick={()=>onConfirm&&onConfirm(block)} style={{flex:2,height:48,borderRadius:14,border:'none',background:T.success,color:'#fff',fontSize:14,fontWeight:700,cursor:'pointer'}}>✓ 확정</button>
      </div>}

      {/* 확정된 예약: 편집/삭제 (Supabase 블록 포함) */}
      {(isConfirmed||!block.isSupa)&&<>
        <div style={{marginTop:12,display:'flex',gap:8,marginBottom:8}}>
          <SBtn onClick={()=>setConfirmDel(true)} flex={1} danger>{block.isSupa?'취소':'삭제'}</SBtn>
          <PBtn onClick={onEdit} flex={2}>예약 수정</PBtn>
        </div>
        {confirmDel&&<div style={{background:'#FEF2F2',border:'1px solid #FECACA',borderRadius:12,padding:'12px 14px',marginBottom:8}}>
          <div style={{fontSize:13,fontWeight:700,color:T.danger,marginBottom:8}}>
            {block.isSupa?'예약을 취소하시겠습니까?':'정말 삭제하시겠습니까?'}
          </div>
          <div style={{display:'flex',gap:8}}><SBtn onClick={()=>setConfirmDel(false)} flex={1}>취소</SBtn><button onClick={onDelete} style={{flex:2,height:44,borderRadius:12,border:'none',background:T.danger,color:'#fff',fontSize:14,fontWeight:700,cursor:'pointer'}}>{block.isSupa?'취소 확정':'삭제 확정'}</button></div>
        </div>}
      </>}

      {/* 거절 확인 */}
      {confirmRej&&<div style={{background:'#FEF2F2',border:'1px solid #FECACA',borderRadius:12,padding:'12px 14px',marginTop:8,marginBottom:8}}>
        <div style={{fontSize:13,fontWeight:700,color:T.danger,marginBottom:8}}>예약을 거절하시겠습니까?</div>
        <div style={{display:'flex',gap:8}}><SBtn onClick={()=>setConfirmRej(false)} flex={1}>취소</SBtn><button onClick={()=>onReject&&onReject(block)} style={{flex:2,height:44,borderRadius:12,border:'none',background:T.danger,color:'#fff',fontSize:14,fontWeight:700,cursor:'pointer'}}>거절 확정</button></div>
      </div>}
    </div>
  </Sheet>;
}

function S2Customer({draft,set,onNext,onBack,onClose,customers}){
  const q=(draft.name||'').trim();
  const inputRef=useRef(null);
  useEffect(()=>{setTimeout(()=>inputRef.current?.focus(),100);},[]);
  const matches=useMemo(()=>{if(!q)return[];return customers.filter(c=>c.name.includes(q)||c.phone.replace(/\D/g,'').includes(q.replace(/\D/g,''))).slice(0,5);},[q,customers]);
  const enabled=!!draft.customer||q.length>=1;
  const handleNext=()=>{if(!draft.customer&&q)set({...draft,customer:{name:q,phone:'',visits:0,color:'sky',isNew:true}});onNext();};
  return <Sheet onClose={onClose} step={2} totalSteps={5} onBack={onBack}>
    <STitle title="누가 오시나요?" sub="이름이나 번호로 검색"/>
    <SBody>
      <div style={{height:52,display:'flex',alignItems:'center',gap:10,padding:'0 14px',borderRadius:14,border:`1.5px solid ${draft.name?T.ink:T.line}`,background:T.surface,marginBottom:12}}>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={T.ink3} strokeWidth="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input ref={inputRef} value={draft.name} onChange={e=>set({...draft,name:e.target.value,customer:null})} placeholder="이름 또는 전화번호" style={{flex:1,border:'none',outline:'none',background:'transparent',fontSize:16,color:T.ink,fontWeight:500}}/>
        {draft.name&&<button onClick={()=>set({...draft,name:'',customer:null})} style={{width:22,height:22,borderRadius:'50%',border:'none',background:T.line,color:T.ink2,fontSize:11,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center'}}>✕</button>}
      </div>
      {q?<div style={{borderRadius:14,overflow:'hidden',border:`1px solid ${T.line}`}}>
        {matches.length===0?<div style={{padding:16,fontSize:13,color:T.ink2,textAlign:'center'}}>일치하는 고객 없음</div>
        :matches.map((m,i)=>{const sel=draft.customer?.name===m.name;return <button key={m.id||m.name} onClick={()=>set({...draft,customer:m,name:m.name})} style={{display:'flex',alignItems:'center',gap:12,padding:'12px 14px',width:'100%',textAlign:'left',border:'none',background:sel?T.line2:T.surface,borderBottom:i<matches.length-1?`1px solid ${T.line2}`:'none',cursor:'pointer'}}>
          <div style={{width:36,height:36,borderRadius:'50%',background:CC[m.color]?.fill,color:CC[m.color]?.ink,display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,fontWeight:800,flexShrink:0}}>{m.name[0]}</div>
          <div style={{flex:1}}><div style={{fontSize:15,fontWeight:700}}>{m.name}</div><div style={{fontSize:12,color:T.ink2,marginTop:1}}>{m.phone}·방문{m.visits}회</div></div>
          {m.visits>=5&&<Chip color="accent" size="xs">단골</Chip>}
          {sel&&<div style={{width:20,height:20,borderRadius:'50%',background:T.success,color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:800}}>✓</div>}
        </button>;})}
      </div>:<div>
        <div style={{fontSize:12,fontWeight:700,color:T.ink2,marginBottom:8}}>최근 방문</div>
        <div style={{borderRadius:14,overflow:'hidden',border:`1px solid ${T.line}`}}>
          {customers.slice(0,4).map((m,i)=><button key={m.id||m.name} onClick={()=>set({...draft,customer:m,name:m.name})} style={{display:'flex',alignItems:'center',gap:12,padding:'12px 14px',width:'100%',textAlign:'left',border:'none',background:T.surface,borderBottom:i<3?`1px solid ${T.line2}`:'none',cursor:'pointer'}}>
            <div style={{width:36,height:36,borderRadius:'50%',background:CC[m.color]?.fill,color:CC[m.color]?.ink,display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,fontWeight:800}}>{m.name[0]}</div>
            <div style={{flex:1}}><div style={{fontSize:15,fontWeight:700}}>{m.name}</div><div style={{fontSize:12,color:T.ink2,marginTop:1}}>방문{m.visits}회</div></div>
            {m.visits>=5&&<Chip color="accent" size="xs">단골</Chip>}
            <span style={{fontSize:16,color:T.ink3}}>›</span>
          </button>)}
        </div>
      </div>}
    </SBody>
    <SFoot><PBtn disabled={!enabled} onClick={handleNext}>{draft.customer?'다음':q?`"${q}" 신규 등록 후 다음`:'다음'}</PBtn></SFoot>
  </Sheet>;
}

function S4Duration({draft,set,onNext,onBack,onClose}){
  const setDur=d=>{
    // 끝나는 시간에서 시술 시간을 빼서 시작 시간 자동 계산
    const endTime=draft.endTime||draft.startTime;
    const startTime=subtractMin(endTime,d);
    set({...draft,duration:d,startTime,segs:[]});
  };

  // 현재 계산된 시작 시간
  const calculatedStart=draft.endTime?subtractMin(draft.endTime,draft.duration):draft.startTime;
  const displayEnd=draft.endTime||addMin(draft.startTime,draft.duration);

  return <Sheet onClose={onClose} step={4} totalSteps={5} onBack={onBack}>
    <STitle title="시술 시간은 얼마나 걸리나요?" sub={`${displayEnd} 나가기`}/>
    <SBody>
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:8,marginBottom:16}}>
        {DURATIONS.map(m=><button key={m} onClick={()=>setDur(m)} style={{padding:'14px 0',borderRadius:14,border:'none',background:draft.duration===m?T.ink:T.line2,color:draft.duration===m?'#fff':T.ink,fontSize:15,fontWeight:800,fontVariantNumeric:'tabular-nums',cursor:'pointer'}}>{m}분</button>)}
      </div>
      <div style={{display:'flex',alignItems:'center',gap:12,padding:14,background:T.bg,borderRadius:14,border:`1px solid ${T.line}`}}>
        <button onClick={()=>setDur(Math.max(10,draft.duration-10))} style={{width:48,height:48,borderRadius:12,border:`1px solid ${T.line}`,background:T.surface,fontSize:16,fontWeight:700}}>−10</button>
        <div style={{flex:1,textAlign:'center'}}><div style={{fontSize:11,color:T.ink2,fontWeight:600}}>시술 시간</div><div style={{fontSize:28,fontWeight:800,fontVariantNumeric:'tabular-nums',letterSpacing:-1}}>{draft.duration}분</div></div>
        <button onClick={()=>setDur(Math.min(240,draft.duration+10))} style={{width:48,height:48,borderRadius:12,border:`1px solid ${T.line}`,background:T.surface,fontSize:16,fontWeight:700}}>+10</button>
      </div>
      <div style={{marginTop:12,padding:'10px 14px',borderRadius:12,border:`1px solid ${T.line}`,background:T.surface,display:'flex',alignItems:'center',gap:8}}>
        <div style={{width:4,height:28,background:T.accent,borderRadius:2}}/>
        <div style={{flex:1}}>
          <div style={{fontSize:11,color:T.ink2,fontWeight:600,marginBottom:2}}>자동 계산된 시간</div>
          <div style={{fontSize:14,fontWeight:700,fontVariantNumeric:'tabular-nums'}}>
            {calculatedStart} 시작 → {displayEnd} 종료
            <span style={{marginLeft:8,fontSize:12,fontWeight:500,color:T.ink2}}>({draft.duration}분)</span>
          </div>
        </div>
      </div>
    </SBody>
    <SFoot><PBtn onClick={onNext}>다음</PBtn></SFoot>
  </Sheet>;
}

function S5Staff({draft,set,onNext,onBack,onClose,staff}){
  const segs=draft.segs,total=segs.reduce((a,s)=>a+s.dur,0),remaining=draft.duration-total,valid=remaining===0&&segs.length>=1;
  const splitDur=useMemo(()=>{let acc=0;return segs.map(s=>{const from=addMin(draft.startTime,acc),to=addMin(draft.startTime,acc+s.dur);acc+=s.dur;return{...s,from,to};});},[segs,draft.startTime]);
  const toggle=id=>{
    const ex=segs.find(s=>s.staffId===id);
    if(ex){const w=segs.filter(s=>s.staffId!==id);if(!w.length){set({...draft,segs:[]});return;}set({...draft,segs:w.map((s,i)=>i===w.length-1?{...s,dur:s.dur+ex.dur}:s)});}
    else if(segs.length<3){if(!segs.length){set({...draft,segs:[{staffId:id,label:'시술',dur:draft.duration}]});}
    else{const last=segs[segs.length-1],take=Math.min(20,Math.max(10,Math.floor(last.dur/2/10)*10)),newDur=Math.max(10,last.dur-take);const labels=['클렌징','메인','마무리'];set({...draft,segs:[...segs.slice(0,-1),{...last,dur:newDur},{staffId:id,label:labels[segs.length]||'시술',dur:take}]});}}
  };
  const adjust=(idx,delta)=>{const next=segs.map(s=>({...s}));const other=idx===segs.length-1?idx-1:idx+1;if(other<0||other>=segs.length)return;if(next[idx].dur+delta<10||next[other].dur-delta<10)return;next[idx].dur+=delta;next[other].dur-=delta;set({...draft,segs:next});};
  return <Sheet onClose={onClose} step={5} totalSteps={5} onBack={onBack}>
    <STitle title="스텝을 배정하세요" sub={`최대 3명·총${draft.duration}분`}/>

      <div style={{display:'flex',gap:8,marginBottom:16}}>

          <Avatar name={s.name} color={s.color} size={32}/><div style={{fontSize:12,fontWeight:700}}>{s.name}</div>
          {sel&&<Chip color="dark" size="xs">#{idx+1}</Chip>}
        </button>;})}
      </div>
      {segs.length>0&&<>
        <div style={{marginBottom:8,display:'flex',justifyContent:'space-between',fontSize:12,fontWeight:700}}><span style={{color:T.ink2}}>시간 분할</span><span style={{color:valid?T.success:T.danger,fontVariantNumeric:'tabular-nums'}}>{valid?`${draft.duration}분 ✓`:remaining>0?`+${remaining}분 남음`:`${-remaining}분 초과`}</span></div>
        <div style={{height:40,borderRadius:10,overflow:'hidden',display:'flex',background:T.line2,marginBottom:6}}>
          {splitDur.map((s,i)=>{const stf=staff.find(x=>x.id===s.staffId);return <div key={i} style={{flex:s.dur,background:stf?.color||'#ccc',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700,borderRight:i<splitDur.length-1?'2px solid #fff':'none'}}>{stf?.name} {s.dur}m</div>;})}
        </div>
        {splitDur.map((s,i)=>{const stf=staff.find(x=>x.id===s.staffId),nxt=i<splitDur.length-1,prv=i>0,canM=s.dur>10&&segs.length>1&&(nxt?splitDur[i+1].dur:prv?splitDur[i-1].dur:0)>=20,canP=segs.length>1&&(nxt?splitDur[i+1].dur:prv?splitDur[i-1].dur:0)>10;return <div key={i} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 12px',borderRadius:12,border:`1px solid ${T.line}`,background:T.surface,marginBottom:8}}>

          <div style={{flex:1}}><div style={{fontSize:13,fontWeight:700}}>{stf?.name} <span style={{color:T.ink2,fontWeight:500}}>·{s.label}</span></div><div style={{fontSize:11,color:T.ink2,fontVariantNumeric:'tabular-nums',marginTop:1}}>{s.from}—{s.to}</div></div>
          <div style={{display:'flex',alignItems:'center',gap:4}}>

            <div style={{minWidth:46,textAlign:'center',fontSize:14,fontWeight:800,fontVariantNumeric:'tabular-nums'}}>{s.dur}분</div>
            <button onClick={()=>adjust(i,+10)} disabled={!canP} style={{width:32,height:32,borderRadius:8,border:`1px solid ${T.line}`,background:canP?T.surface:T.line2,color:canP?T.ink:T.ink3,fontSize:15,fontWeight:700,cursor:canP?'pointer':'default'}}>+</button>
          </div>
          <button onClick={()=>toggle(s.staffId)} style={{width:28,height:28,borderRadius:8,border:`1px solid ${T.line}`,background:T.surface,color:T.ink3,fontSize:12,fontWeight:700,cursor:'pointer'}}>✕</button>
        </div>;})}
      </>}
      {segs.length===0&&<div style={{padding:20,borderRadius:14,border:`1.5px dashed ${T.line}`,textAlign:'center',color:T.ink2,fontSize:13,fontWeight:600}}>위에서 스텝을 1명 이상 선택하세요</div>}

  const statusColor={pending:'#FEF3C7',confirmed:'#DCFCE7',rejected:'#FEE2E2',cancelled:'#F4F4F5'};
  const statusTxt={pending:'#92400E',confirmed:'#166534',rejected:'#991B1B',cancelled:'#52525B'};

  // 고객별 통계 계산
  const enriched=useMemo(()=>supaCustomers.map(c=>{
    const myBk=supaHistory.filter(b=>b.customer_id===c.id);

    const lastVisit=confirmed.sort((a,b)=>b.booking_date.localeCompare(a.booking_date))[0]?.booking_date||null;
    const COLORS=['#0EA5E9','#F43F5E','#A855F7','#10B981','#F97316','#EAB308','#6366F1','#EC4899'];
    const colorIdx=Math.abs(c.name.split('').reduce((a,ch)=>a+ch.charCodeAt(0),0))%COLORS.length;
    return{...c,visitCount:confirmed.length,totalBk:myBk.length,lastVisit,avatarColor:COLORS[colorIdx]};
  }),[supaCustomers,supaHistory]);

  const filtered=useMemo(()=>{
    if(!q.trim())return enriched;
    const qq=q.toLowerCase().replace(/-/g,'');
    return enriched.filter(c=>c.name?.includes(q)||c.phone?.replace(/-/g,'').includes(qq));
  },[enriched,q]);

  // 메모 저장
  async function saveMemo(customerId){
    setSavingMemo(true);
    await fetch(`${SB_URL}/rest/v1/customers?id=eq.${customerId}`,{
      method:'PATCH',headers:SB_HDR,body:JSON.stringify({memo:memoEdit})
    });
    await onRefresh();
    setSavingMemo(false);
    setDetail(d=>d?{...d,memo:memoEdit}:null);

    if(!editForm||!editForm.name.trim()){return;}
    const ok=await fetch(`${SB_URL}/rest/v1/customers?id=eq.${editForm.customer.id}`,{
      method:'PATCH',
      headers:SB_HDR,
      body:JSON.stringify({name:editForm.name.trim(),phone:editForm.phone.trim()})

      await onRefresh();
      setEditForm(null);
      if(detail&&detail.id===editForm.customer.id){
        setDetail({...detail,name:editForm.name.trim(),phone:editForm.phone.trim()});
      }
    }
    return ok;
  }

      method:'DELETE',

            style={{height:36,padding:'0 12px',borderRadius:10,border:`1px solid ${T.line}`,background:T.bg,fontSize:12,fontWeight:700,cursor:'pointer',color:T.ink2}}>
