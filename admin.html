        <div style={{position:'fixed',left:'50%',top:'50%',transform:'translate(-50%,-50%)',background:T.surface,borderRadius:20,padding:24,zIndex:41,width:'min(360px,90vw)',boxShadow:'0 20px 60px rgba(0,0,0,.25)',animation:'popIn .2s'}}>
          <div style={{fontSize:18,fontWeight:900,marginBottom:8}}>예약 이력 삭제</div>
          <div style={{fontSize:14,color:T.ink2,marginBottom:18,lineHeight:1.6}}>
            선택된 이력을 삭제하시겠습니까<br/>
            <span style={{fontSize:12,color:T.ink3}}>삭제된 이력은 관리자 고객 상세와 고객의 내 예약 확인에서 표시되지 않습니다.</span>
          </div>
          <div style={{display:'flex',gap:8}}>
            <button onClick={()=>setConfirmHistoryDelete(null)} disabled={deletingHistory} style={{flex:1,height:48,borderRadius:12,border:`1px solid ${T.line}`,background:T.surface,fontSize:14,fontWeight:700,cursor:deletingHistory?'default':'pointer',opacity:deletingHistory?.6:1}}>취소</button>
            <button onClick={deleteSelectedHistories} disabled={deletingHistory||!confirmHistoryDelete?.ids?.length} style={{flex:1.4,height:48,borderRadius:12,border:'none',background:T.danger,color:'#fff',fontSize:14,fontWeight:900,cursor:deletingHistory?'default':'pointer',opacity:deletingHistory?.75:1}}>{deletingHistory?'삭제 중...':'삭제 하기'}</button>
          </div>
        </div>
      </>}
    </div>;
  }


  return <div style={{flex:1,minHeight:0,display:'flex',flexDirection:'column',background:T.bg,overflow:'hidden'}}>
    <div style={{paddingTop:'calc(env(safe-area-inset-top,0px)+16px)',paddingBottom:10,paddingLeft:16,paddingRight:16,background:T.surface,borderBottom:`1px solid ${T.line}`,flexShrink:0}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
        <div style={{fontSize:20,fontWeight:800}}>고객 관리</div>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <span style={{fontSize:12,color:T.ink3,fontWeight:600}}>{filtered.length}명</span>
          <button onClick={onRefresh} style={{height:36,padding:'0 12px',borderRadius:10,border:`1px solid ${T.line}`,background:T.bg,fontSize:12,fontWeight:700,cursor:'pointer',color:T.ink2}}>새로고침</button>
        </div>
      </div>
      <div style={{height:44,display:'flex',alignItems:'center',gap:10,padding:'0 12px',borderRadius:12,border:`1px solid ${T.line}`,background:T.bg}}>
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke={T.ink3} strokeWidth="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input value={q} onChange={e=>setQ(e.target.value)} placeholder="이름, 전화번호 검색" style={{flex:1,border:'none',outline:'none',background:'transparent',fontSize:15,color:T.ink}}/>
        {q&&<button onClick={()=>setQ('')} style={{width:20,height:20,borderRadius:'50%',border:'none',background:T.line,color:T.ink2,fontSize:10,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer'}}>×</button>}
      </div>
    </div>
    <div style={{flex:1,minHeight:0,overflowY:'auto',padding:'8px 16px calc(88px + env(safe-area-inset-bottom,0px))',WebkitOverflowScrolling:'touch',overscrollBehaviorY:'contain'}}>
      {notice&&<div style={{padding:'10px 12px',borderRadius:10,background:notice.type==='err'?'#FEF2F2':'#F0FDF4',border:`1px solid ${notice.type==='err'?'#FECACA':'#BBF7D0'}`,fontSize:12,fontWeight:700,color:notice.type==='err'?T.danger:'#166534',margin:'4px 0 10px'}}>{notice.text}</div>}
      {filtered.length===0?(
        <div style={{textAlign:'center',paddingTop:60,color:T.ink3}}>
          <div style={{fontSize:40,marginBottom:12}}>?뫁</div>
          <div style={{fontSize:14,fontWeight:700}}>{q?'검색 결과가 없습니다':'등록된 고객이 없습니다'}</div>
          <div style={{fontSize:12,marginTop:6}}>고객의 예약 요청이 완료되면 자동 등록됩니다</div>
        </div>
      ):(
        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          {filtered.map((c,i)=>(
            <div key={c.id} style={{background:T.surface,borderRadius:14,border:`1px solid ${T.line}`,padding:'13px 14px',display:'flex',alignItems:'center',gap:12}}>
              <button onClick={()=>openCustomerDetail(c)}
                style={{display:'flex',alignItems:'center',gap:12,flex:1,border:'none',background:'transparent',cursor:'pointer',textAlign:'left',padding:0}}>
                <div style={{width:42,height:42,borderRadius:'50%',background:c.avatarColor,color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:17,fontWeight:800,flexShrink:0}}>{c.name?.[0]||'?'}</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:'flex',alignItems:'center',gap:6}}>
                    <span style={{fontSize:15,fontWeight:700}}>{c.name}</span>
                    {c.visitCount>=5&&<span style={{fontSize:10,fontWeight:700,background:'#FFEDD5',color:'#9A3412',padding:'1px 6px',borderRadius:999}}>단골</span>}
                    {c.visitCount===0&&c.totalBk>0&&<span style={{fontSize:10,fontWeight:700,background:'#DBEAFE',color:'#1E3A8A',padding:'1px 6px',borderRadius:999}}>신규</span>}
                  </div>
                  <div style={{fontSize:12,color:T.ink2,marginTop:2}}>{c.phone||'연락처 없음'} · 방문 {c.visitCount}회</div>
                </div>
                <div style={{textAlign:'right',flexShrink:0,marginRight:8}}>
                  {c.lastVisit&&<div style={{fontSize:11,color:T.ink3}}>{c.lastVisit.slice(5).replace('-','/')}</div>}
                  <span style={{fontSize:16,color:T.ink3}}>›</span>
                </div>
              </button>
              {canEdit&&<div style={{display:'flex',gap:6,flexShrink:0}}>
                <button onClick={()=>openCustomerEdit(c)}
                  style={{height:34,padding:'0 10px',borderRadius:10,border:`1px solid ${T.line}`,background:T.surface,fontSize:13,fontWeight:700,color:T.ink2,cursor:'pointer'}}>
                  수정
                </button>
                <button onClick={()=>setConfirmDelete(c.id)}
                  style={{height:34,padding:'0 10px',borderRadius:10,border:'1px solid #FECACA',background:'#FEF2F2',fontSize:13,fontWeight:700,color:T.danger,cursor:'pointer'}}>
                  삭제
                </button>
              </div>}
            </div>
          ))}
        </div>
      )}
    </div>


    {canEdit&&editForm&&<>
      <div onClick={()=>setEditForm(null)} style={{position:'fixed',inset:0,background:'rgba(0,0,0,.45)',zIndex:40}}/>
        <div style={{position:'fixed',left:'50%',top:'50%',transform:'translate(-50%,-50%)',background:T.surface,borderRadius:20,padding:24,zIndex:41,width:'min(380px,90vw)',maxHeight:'86dvh',overflowY:'auto',boxShadow:'0 20px 60px rgba(0,0,0,.25)',animation:'popIn .2s'}}>
        <div style={{fontSize:18,fontWeight:800,marginBottom:16}}>고객 정보 수정</div>
        <div style={{marginBottom:12}}>
          <label style={{fontSize:12,fontWeight:700,color:T.ink2,display:'block',marginBottom:6}}>이름 *</label>
          <input className="inp" value={editForm.name} onChange={e=>setEditForm({...editForm,name:e.target.value})} placeholder="고객 이름"/>
        </div>
        <div style={{marginBottom:12}}>
          <label style={{fontSize:12,fontWeight:700,color:T.ink2,display:'block',marginBottom:6}}>전화번호</label>
          <input className="inp" type="tel" value={editForm.phone} onChange={e=>setEditForm({...editForm,phone:e.target.value})} placeholder="010-0000-0000"/>
        </div>
        <div style={{marginBottom:16}}>
          <label style={{fontSize:12,fontWeight:700,color:T.ink2,display:'block',marginBottom:6}}>고객 메모</label>
          <textarea value={editForm.memo||''} onChange={e=>setEditForm({...editForm,memo:e.target.value})} rows={4} placeholder="고객 특이사항, 선호 시술, 알레르기 등"
            style={{width:'100%',borderRadius:12,border:`1.5px solid ${T.line}`,padding:'10px 12px',fontSize:14,resize:'vertical',outline:'none',fontFamily:'inherit',lineHeight:1.5}}/>
        </div>
        <div style={{display:'flex',gap:8}}>
          <button onClick={()=>setEditForm(null)} disabled={savingEdit} style={{flex:1,height:48,borderRadius:12,border:`1px solid ${T.line}`,background:T.surface,fontSize:14,fontWeight:600,cursor:savingEdit?'default':'pointer',opacity:savingEdit?.6:1}}>취소</button>
          <button onClick={saveCustomerEdit} disabled={!editForm.name.trim()||savingEdit} style={{flex:2,height:48,borderRadius:12,border:'none',background:editForm.name.trim()&&!savingEdit?T.ink:T.line,color:editForm.name.trim()&&!savingEdit?'#fff':T.ink3,fontSize:14,fontWeight:700,cursor:editForm.name.trim()&&!savingEdit?'pointer':'not-allowed'}}>{savingEdit?'저장 중...':'저장'}</button>
        </div>
      </div>
    </>}


    {canEdit&&confirmDelete&&(()=>{
      const c=enriched.find(x=>x.id===confirmDelete);
      return <>
        <div onClick={()=>setConfirmDelete(null)} style={{position:'fixed',inset:0,background:'rgba(0,0,0,.4)',zIndex:40,animation:'fadeIn .2s'}}/>
        <div style={{position:'fixed',left:'50%',top:'50%',transform:'translate(-50%,-50%)',background:T.surface,borderRadius:20,padding:24,zIndex:41,width:'min(360px,90vw)',boxShadow:'0 20px 60px rgba(0,0,0,.25)',animation:'popIn .2s'}}>
          <div style={{fontSize:18,fontWeight:800,marginBottom:8}}>고객 삭제</div>
          <div style={{fontSize:14,color:T.ink2,marginBottom:16,lineHeight:1.6}}>
            <b>{c?.name}</b> 고객 정보를 삭제하시겠습니까?<br/>
            <span style={{color:T.danger,fontSize:13}}>고객 목록에서 숨김 처리되며 예약 이력은 유지됩니다.</span>
          </div>
          <div style={{display:'flex',gap:8}}>
            <button onClick={()=>setConfirmDelete(null)} disabled={deleting} style={{flex:1,height:48,borderRadius:12,border:`1px solid ${T.line}`,background:T.surface,fontSize:14,fontWeight:600,cursor:deleting?'default':'pointer',opacity:deleting?.6:1}}>취소</button>
            <button onClick={()=>deleteCustomer(confirmDelete)} disabled={deleting} style={{flex:1,height:48,borderRadius:12,border:'none',background:T.danger,color:'#fff',fontSize:14,fontWeight:700,cursor:deleting?'default':'pointer',opacity:deleting?.75:1}}>{deleting?'삭제 중...':'삭제'}</button>
          </div>
        </div>
      </>;
    })()}
  </div>;
}


function InboxScreen({allPending,staff,onConfirm,onReject,onCancelApprove,onCancelReject,onJumpDate,canEdit=true}){
  const[selected,setSelected]=useState(null);
  const[mode,setMode]=useState('view'); // 'view' | 'edit' | 'reject'
  const[rejectReason,setRejectReason]=useState('');
  const[busy,setBusy]=useState(false);


  const[editDate,setEditDate]=useState('');
  const[editStart,setEditStart]=useState('');
  const[editEnd,setEditEnd]=useState('');
  const[editService,setEditService]=useState('');
  const[editDetail,setEditDetail]=useState('');
  const[editStaffId,setEditStaffId]=useState('');
  const[editSegs,setEditSegs]=useState([]);
  const editDurationRef=useRef(null);

  const svcMap={hair:'헤어',makeup:'메이크업',both:'헤어+메이크업'};
  const SEG_STEP=5,SEG_MIN=5;

  function formatDate(d){
    if(!d) return '';
    const dt=new Date(d+'T00:00:00');
    const dow=['일','월','화','수','목','금','토'][dt.getDay()];
    return `${d.slice(5).replace('-','/')} (${dow})`;
  }

  function openDetail(b){
    setSelected(b);
    setMode('view');
    setEditDate(b.booking_date||'');
    setEditStart(b.start_time?.slice(0,5)||'');
    setEditEnd(b.end_time?.slice(0,5)||'');
    setEditService(b.service_type||'');
    setEditDetail(bookingDisplayMemo(b));
    setEditStaffId(b.requested_staff_id||'');


    const totalDur=calculateDuration(b.start_time?.slice(0,5)||'09:00',b.end_time?.slice(0,5)||'10:00');
    let initialSegs=[];


    if(b.staff_sequence){
      try{
        let seqs=b.staff_sequence;

        if(typeof seqs==='string'){
          seqs=JSON.parse(seqs);
        }
        if(Array.isArray(seqs)&&seqs.length>0){
          initialSegs=seqs.map((seg,i)=>({
            staffId:seg.staffId,
            label:seg.label||'',
            dur:seg.dur
          }));
        }
      }catch(e){
        console.error('[openDetail] staff_sequence 파싱 실패:',e,b.staff_sequence);
      }
    }


    if(initialSegs.length===0&&b.requested_staff_id){
      initialSegs=[{staffId:b.requested_staff_id,label:'',dur:totalDur}];
    }

    if(initialSegs.length===0&&b.assigned_staff){
      try{
        let assigned=b.assigned_staff;
        if(typeof assigned==='string')assigned=JSON.parse(assigned);
        if(Array.isArray(assigned)){
          const assignedSegs=assigned
            .map(a=>({
              staffId:a.staffId||a.staff_id,
              label:a.label||'',
              role:a.role||'',
              dur:10
            }))
            .filter(s=>s.staffId);
          if(assignedSegs.length)initialSegs=fitSegsToDuration(assignedSegs,totalDur);
        }
      }catch(e){
        console.error('[openDetail] assigned_staff 파싱 실패:',e,b.assigned_staff);
      }
    }

    console.log('[openDetail] editSegs 초기값', initialSegs, 'from:', b.staff_sequence);
    editDurationRef.current=totalDur;
    setEditSegs(initialSegs);
    setRejectReason('');
  }

  function calculateDuration(start,end){
    return Math.max(SEG_MIN,minutesFromHHMM(end,'10:00')-minutesFromHHMM(start,'09:00'));
  }

  function fitSegsToDuration(segs,totalDur){
    return fitStaffSegsToDuration(segs,totalDur,SEG_STEP,SEG_MIN);
  }

  useEffect(()=>{
    if(mode!=='edit')return;
    const totalDur=calculateDuration(editStart||'09:00',editEnd||'10:00');
    if(editDurationRef.current===null){
      editDurationRef.current=totalDur;
      return;
    }
    if(editDurationRef.current===totalDur)return;
    editDurationRef.current=totalDur;
    setEditSegs(prev=>prev.length?fitSegsToDuration(prev,totalDur):prev);
  },[mode,editStart,editEnd]);

  function closeDetail(){setSelected(null);setMode('view');editDurationRef.current=null;}

  const handleConfirm=async()=>{
    if(busy)return;
    setBusy(true);

    console.log('[handleConfirm] 시작:', {
      selected,
      editSegs,
      editDate,
      editStart,
      editEnd,
      editService,
      editDetail,
      editStaffId
    });


    const finalTotalDur=calculateDuration(
      (editStart||selected.start_time||'09:00').slice(0,5),
      (editEnd||selected.end_time||'10:00').slice(0,5)
    );
    const finalEditSegs=editSegs.length?fitSegsToDuration(editSegs,finalTotalDur):[];

    let finalStaffId=null;
    if(finalEditSegs.length>0){
      finalStaffId=finalEditSegs[0].staffId;
    }else if(editStaffId){
      finalStaffId=editStaffId;
    }else if(selected.requested_staff_id){
      finalStaffId=selected.requested_staff_id;
    }

    const hasRealSeg=finalEditSegs.some(seg=>isRealStaffReference(safeStaff,seg.staffId));
    const hasRealStaff=isRealStaffReference(safeStaff,finalStaffId);
    if(!hasRealSeg&&!hasRealStaff){
      setBusy(false);
      setMode('edit');
      alert('랜덤 배정 요청은 스텝을 1명 이상 수동 배정한 뒤 확정할 수 있습니다.');
      return;
    }



    let staffSequence=null;
    if(finalEditSegs.length>0){

      staffSequence=finalEditSegs;
      console.log('[handleConfirm] staff_sequence (편집값):', staffSequence);
    }else if(selected.staff_sequence){


      staffSequence=selected.staff_sequence;
      console.log('[handleConfirm] staff_sequence (기존 유지):', staffSequence, 'type:', typeof staffSequence);
    }

    const normalizedStart=normalizeHHMM(editStart||selected.start_time||'09:00','09:00');
    const normalizedEnd=normalizeHHMM(editEnd||selected.end_time||'10:00','10:00');
    const memoBase=buildBookingMemo(String(editDetail||'').trim(),splitBookingMemo(selected.customer_memo||'').meta);
    const updates={
      status:'confirmed',
      confirmed_at:new Date().toISOString(),
      booking_date:editDate||selected.booking_date,
      start_time:normalizedStart,
      end_time:normalizedEnd,
      service_type:editService||selected.service_type,
      service_detail:finalEditSegs.length?bookingDetailFromSegs(finalEditSegs,safeStaff):(selected.service_detail||bookingDetailFromSegs([{staffId:finalStaffId}],safeStaff)),
      customer_memo:memoBase,
      requested_staff_id: isRealStaffReference(safeStaff,finalStaffId)?finalStaffId:null,
      staff_sequence: staffSequence
    };

    console.log('[handleConfirm] updates:', updates);
    console.log('[handleConfirm] requested_staff_id 최종값', finalStaffId, 'type:', typeof finalStaffId);


    closeDetail();
    await onConfirm({...selected,_updates:updates,_editSegs:finalEditSegs});
    setBusy(false);
  };

  const handleReject=async()=>{
    if(busy)return;
    setBusy(true);
    closeDetail();
    await onReject(selected,'');
    setBusy(false);
  };

  const pending=Array.isArray(allPending)?allPending:[];
  const safeStaff=Array.isArray(staff)?staff:[];

  const BookingCard=({b,isPending})=>{
    const reqStaffLabel=bookingStaffRequestLabel(b,safeStaff);
    const cancelReq=bookingCancelRequest(b);
    const borderColor=cancelReq?'#FECACA':isPending?'#FDE68A':'#BBF7D0';
    const badgeBg=cancelReq?'#FEF2F2':isPending?'#FEF3C7':'#DCFCE7';
    const badgeColor=cancelReq?T.danger:isPending?'#92400E':'#166534';
    const badgeText=cancelReq?'취소 요청':isPending?'요청중':'확정';
    return <div onClick={()=>openDetail(b)}
      style={{background:T.surface,borderRadius:16,border:`1.5px solid ${borderColor}`,marginBottom:10,padding:'14px 16px',cursor:'pointer',boxShadow:'0 2px 8px rgba(0,0,0,.05)'}}>
      <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:8}}>
        <div>
          <div style={{fontSize:16,fontWeight:800}}>{bookingCustomerName(b,'고객')}</div>
          <div style={{fontSize:12,color:T.ink2,marginTop:1}}>{bookingCustomerPhone(b)}</div>
        </div>
        <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:4}}>
          <div style={{fontSize:11,fontWeight:700,background:badgeBg,color:badgeColor,padding:'2px 8px',borderRadius:999}}>{badgeText}</div>
          <button onClick={e=>{e.stopPropagation();onJumpDate(b.booking_date);}}
            style={{fontSize:10,color:T.accent,fontWeight:700,border:'none',background:'transparent',cursor:'pointer',textDecoration:'underline'}}>
            일정에서 보기
          </button>
        </div>
      </div>
      <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
        {[`날짜 ${formatDate(b.booking_date)}`,`시간 ${b.start_time?.slice(0,5)}~${b.end_time?.slice(0,5)}`,svcMap[b.service_type]||b.service_type].map((txt,i)=>(
          <span key={i} style={{fontSize:11,background:T.bg,padding:'3px 8px',borderRadius:8,fontWeight:600,color:T.ink2}}>{txt}</span>
        ))}
        <span style={{fontSize:11,background:T.bg,padding:'3px 8px',borderRadius:8,fontWeight:700,color:T.ink2,display:'inline-flex',alignItems:'center',gap:3}}>
          스텝 {reqStaffLabel}
        </span>
      </div>
      {plainBookingMemo(b)&&<div style={{marginTop:8,fontSize:11,color:'#0369A1',background:'#F0F9FF',padding:'5px 10px',borderRadius:8,borderLeft:'3px solid #38BDF8'}}>
        메모: {plainBookingMemo(b)}
      </div>}
      {cancelReq&&<div style={{marginTop:8,fontSize:11,color:T.danger,background:'#FEF2F2',padding:'5px 10px',borderRadius:8,borderLeft:`3px solid ${T.danger}`}}>
        고객 취소 요청 · 관리자 승인 대기
      </div>}
    </div>;
  };

  return <div style={{flex:1,minHeight:0,display:'flex',flexDirection:'column',background:T.bg,overflow:'hidden'}}>
    <div style={{padding:'calc(env(safe-area-inset-top,0px) + 16px) 16px 12px',background:T.surface,borderBottom:`1px solid ${T.line}`,flexShrink:0}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <div style={{fontSize:20,fontWeight:800}}>예약 요청함</div>
        {pending.length>0&&<div style={{background:T.danger,color:'#fff',fontSize:12,fontWeight:800,padding:'3px 10px',borderRadius:999}}>{pending.length}건 대기</div>}
      </div>
    </div>

    <div style={{flex:1,minHeight:0,overflowY:'auto',padding:'16px 16px calc(88px + env(safe-area-inset-bottom,0px))',WebkitOverflowScrolling:'touch',overscrollBehaviorY:'contain'}}>
      {pending.length>0&&<>
        <div style={{fontSize:12,fontWeight:800,color:'#92400E',marginBottom:8,letterSpacing:.4}}>확인 필요 ({pending.length}건)</div>
        {pending.map(b=><BookingCard key={b.id} b={b} isPending={true}/>)}
      </>}

      {pending.length===0&&<div style={{display:'flex',flexDirection:'column',alignItems:'center',paddingTop:60,gap:10}}>
        <div style={{fontSize:48}}>✓</div>
        <div style={{fontSize:15,fontWeight:700,color:T.ink2}}>처리할 요청이 없습니다</div>
        <div style={{fontSize:13,color:T.ink3}}>새 예약 요청이 오면 이곳에 표시됩니다</div>
      </div>}
    </div>


    {selected&&<>
      <div onClick={closeDetail} style={{position:'fixed',inset:0,background:'rgba(0,0,0,.45)',zIndex:40}}/>
      <div className="booking-edit-panel" style={{position:'fixed',left:0,right:0,bottom:0,background:T.surface,borderTopLeftRadius:24,borderTopRightRadius:24,zIndex:41,maxHeight:'90vh',display:'flex',flexDirection:'column'}}>
        <div style={{width:36,height:4,background:T.line,borderRadius:2,margin:'12px auto 0',flexShrink:0}}/>

        {/* ?ㅻ뜑 */}
        <div style={{padding:'12px 20px 10px',borderBottom:`1px solid ${T.line}`,display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:0}}>
          <div className="booking-edit-title-wrap" style={{flex:1,minWidth:0}}>
            <div style={{fontSize:18,fontWeight:800}}>{bookingCustomerName(selected,'고객')}</div>
            <a href={`tel:${bookingCustomerPhone(selected)}`} style={{fontSize:12,color:T.accent,fontWeight:600,display:'block',marginBottom:4}}>전화 {bookingCustomerPhone(selected)}</a>
            {selected.customers?.pin&&<div style={{display:'inline-flex',alignItems:'center',gap:5,background:'#EDE9FE',color:'#6D28D9',fontSize:12,fontWeight:800,padding:'3px 10px',borderRadius:999}}>
              조회 비밀번호: <span style={{letterSpacing:6,fontFamily:'monospace',fontSize:15}}>{selected.customers.pin}</span>
            </div>}
          </div>
          <div style={{display:'flex',gap:8,alignItems:'center'}}>
            {canEdit&&selected.status==='pending'&&mode==='view'&&<button onClick={()=>setMode('edit')}
              style={{height:32,padding:'0 12px',borderRadius:10,border:`1px solid ${T.line}`,background:T.bg,fontSize:12,fontWeight:700,cursor:'pointer'}}>

          </div>
        </div>


        <div className="booking-edit-body" style={{flex:1,overflowY:'auto',overflowX:'hidden',padding:'14px 20px 8px'}}>


          {mode==='view'&&<>
            <div style={{background:T.bg,borderRadius:14,padding:'12px 14px',fontSize:13}}>
              {[
                ['날짜',formatDate(selected.booking_date)],
                ['시술 시작',selected.start_time?.slice(0,5)],
                ['나가셔야 하는 시간',selected.end_time?.slice(0,5)],
                ['시술',svcMap[selected.service_type]||selected.service_type],
                ...(bookingDisplayMemo(selected)?[['메모',bookingDisplayMemo(selected)]]:[]),
                ...(bookingAdminDisplay(selected)?[['관리자',<div style={{whiteSpace:'pre-line',lineHeight:1.45}}>{bookingAdminDisplay(selected)}</div>]]:[]),
                ...(bookingCancelRequest(selected)?[['취소 요청','고객이 취소 승인을 요청했습니다']]:[]),
                ['요청 스텝',bookingStaffRequestLabel(selected,safeStaff)]]
                .filter(([,v])=>v).map(([l,v],i,a)=><div key={i} style={{display:'flex',padding:'7px 0',borderBottom:i<a.length-1?`1px solid ${T.line2}`:'none'}}>
                  <div style={{width:90,fontWeight:700,color:T.ink2,flexShrink:0,fontSize:12}}>{l}</div>
                  <div style={{flex:1,fontWeight:600,color:T.ink}}>{v}</div>

            </div>
            {selected.status==='confirmed'&&<div style={{marginTop:12,padding:'12px 14px',background:'#F0FDF4',border:'1px solid #BBF7D0',borderRadius:12,fontSize:13,fontWeight:600,color:'#166534',textAlign:'center'}}>이미 확정된 예약입니다</div>}
          </>}


          {canEdit&&mode==='edit'&&(()=>{
            const totalDur=calculateDuration(editStart||'09:00',editEnd||'10:00');
            const segsTotal=editSegs.reduce((a,s)=>a+s.dur,0);
            const remaining=totalDur-segsTotal;
            const segsValid=editSegs.length>=1&&remaining===0;


            let acc=0;
            const splitDur=editSegs.map(s=>{
              const from=addMin(editStart||'09:00',acc);
              const to=addMin(editStart||'09:00',acc+s.dur);
              acc+=s.dur;
              return{...s,from,to};
            });

            const toggleStaff=(id)=>{
              const ex=editSegs.find(s=>s.staffId===id);
              if(ex){
                const w=editSegs.filter(s=>s.staffId!==id);
                if(!w.length){setEditSegs([]);return;}
                setEditSegs(w.map((s,i)=>i===w.length-1?{...s,dur:s.dur+ex.dur}:s));
              } else if(editSegs.length<3){
                const stf=safeStaff.find(s=>s.id===id);
                const label=staffSegmentServiceCode({staffId:id},stf);
                if(!editSegs.length){setEditSegs([{staffId:id,label,dur:totalDur}]);}
                else{
                  const last=editSegs[editSegs.length-1];
                  const take=Math.min(20,Math.max(SEG_MIN,Math.floor(last.dur/2/SEG_STEP)*SEG_STEP));
                  const newDur=Math.max(SEG_MIN,last.dur-take);
                  setEditSegs([...editSegs.slice(0,-1),{...last,dur:newDur},{staffId:id,label,dur:take}]);
                }
              }
            };

            const adjustSeg=(idx,delta)=>{
              const next=editSegs.map(s=>({...s}));
              const other=idx===editSegs.length-1?idx-1:idx+1;
              if(other<0||other>=editSegs.length)return;
              if(next[idx].dur+delta<SEG_MIN||next[other].dur-delta<SEG_MIN)return;
              next[idx].dur+=delta;
              next[other].dur-=delta;
              setEditSegs(next);
            };

            return <>
              <div style={{fontSize:13,fontWeight:800,color:T.ink,marginBottom:12}}>예약 내용 수정</div>
              <div style={{display:'flex',flexDirection:'column',gap:12,minWidth:0,maxWidth:'100%',overflowX:'hidden'}}>
                <div>
                  <label style={{fontSize:11,fontWeight:700,color:T.ink2,display:'block',marginBottom:4}}>날짜</label>
                  <input type="date" value={editDate} onChange={e=>setEditDate(e.target.value)}
                    style={{height:44,borderRadius:12,border:`1.5px solid ${T.line}`,padding:'0 12px',fontSize:14,width:'100%',outline:'none'}}/>
                </div>
                <div className="booking-edit-time-row" style={{display:'flex',gap:10}}>
                  <div style={{flex:1}}>
                    <label style={{fontSize:11,fontWeight:700,color:T.ink2,display:'block',marginBottom:4}}>시술 시작</label>
                    <input type="time" value={editStart} onChange={e=>setEditStart(e.target.value)}
                      style={{width:'100%',height:44,borderRadius:12,border:`1.5px solid ${T.line}`,padding:'0 10px',fontSize:14,outline:'none'}}/>
                  </div>
                  <div style={{flex:1}}>
                    <label style={{fontSize:11,fontWeight:700,color:T.ink2,display:'block',marginBottom:4}}>나가셔야 하는 시간</label>
                    <input type="time" value={editEnd} onChange={e=>setEditEnd(e.target.value)}
                      style={{width:'100%',height:44,borderRadius:12,border:`1.5px solid ${T.line}`,padding:'0 10px',fontSize:14,outline:'none'}}/>
                  </div>
                </div>
                <div>
                  <label style={{fontSize:11,fontWeight:700,color:T.ink2,display:'block',marginBottom:4}}>시술 종류</label>
                  <div className="booking-edit-service-row" style={{display:'flex',gap:6}}>
                    {[['hair','헤어'],['makeup','메이크업'],['both','헤어+메이크업']].map(([v,l])=>(
                      <button key={v} onClick={()=>setEditService(v)}
                        style={{flex:1,height:40,borderRadius:10,border:`1.5px solid ${editService===v?T.ink:T.line}`,background:editService===v?T.ink:'transparent',color:editService===v?'#fff':T.ink,fontSize:12,fontWeight:700,cursor:'pointer'}}>
                        {l}
                      </button>
                    ))}
                  </div>
                </div>
                <div>
                  <label style={{fontSize:11,fontWeight:700,color:T.ink2,display:'block',marginBottom:4}}>메모</label>
                  <input value={editDetail} onChange={e=>setEditDetail(e.target.value)} placeholder="메모 입력"
                    style={{width:'100%',height:44,borderRadius:12,border:`1.5px solid ${T.line}`,padding:'0 12px',fontSize:14,outline:'none'}}/>
                </div>


                <div>
                  <label style={{fontSize:11,fontWeight:700,color:T.ink2,display:'block',marginBottom:6}}>
                    담당 스텝 배정 <span style={{color:T.ink3,fontWeight:500}}>(최대 3명, 순서 배정 가능)</span>
                  </label>
                  <div className="booking-edit-staff-wrap" style={{display:'flex',gap:6,marginBottom:10,flexWrap:'wrap'}}>
                    {safeStaff.filter(s=>s.is_active).map(s=>{
                      const idx=editSegs.findIndex(x=>x.staffId===s.id);
                      const sel=idx>=0;
                      return <button key={s.id} onClick={()=>toggleStaff(s.id)} disabled={!sel&&editSegs.length>=3}
                        style={{flex:'0 0 auto',minWidth:70,padding:'8px 10px',borderRadius:10,cursor:sel||editSegs.length<3?'pointer':'not-allowed',
                          border:sel?`2px solid ${T.ink}`:`1px solid ${T.line}`,
                          background:sel?T.line2:T.surface,display:'flex',flexDirection:'column',alignItems:'center',gap:3,
                          opacity:!sel&&editSegs.length>=3?0.4:1}}>
                        <div style={{width:28,height:28,borderRadius:'50%',background:s.color,color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:800}}>{s.name[0]}</div>
                        <div style={{fontSize:11,fontWeight:700}}>{s.name}</div>
                        {sel&&<Chip color="dark" size="xs">#{idx+1}</Chip>}
                      </button>;
                    })}
                  </div>

                  {editSegs.length>0&&<>
                    <div style={{marginBottom:6,display:'flex',justifyContent:'space-between',fontSize:11,fontWeight:700}}>
                      <span style={{color:T.ink2}}>시간 분할 ({totalDur}분)</span>
                      <span style={{color:segsValid?T.success:T.danger,fontVariantNumeric:'tabular-nums'}}>
                        {segsValid?`${totalDur}분 완료`:remaining>0?`+${remaining}분 남음`:`${-remaining}분 초과`}
                      </span>
                    </div>
                    <div className="booking-edit-split-bar" style={{height:36,borderRadius:8,overflow:'hidden',display:'flex',background:T.line2,marginBottom:8}}>
                      {splitDur.map((s,i)=>{
                        const stf=safeStaff.find(x=>x.id===s.staffId);
                        return <div className="booking-edit-split-item" key={i} style={{flex:s.dur,background:stf?.color||'#ccc',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,fontWeight:700,borderRight:i<splitDur.length-1?'2px solid #fff':'none'}}>
                          {staffSegmentDisplay(s,stf)} {s.dur}m
                        </div>;
                      })}
                    </div>
                    {splitDur.map((s,i)=>{
                      const stf=safeStaff.find(x=>x.id===s.staffId);
                      const nxt=i<splitDur.length-1;
                      const prv=i>0;
                      const nearDur=nxt?splitDur[i+1].dur:prv?splitDur[i-1].dur:0;
                      const canM=s.dur>SEG_MIN&&editSegs.length>1&&nearDur>=SEG_MIN*2;
                      const canP=editSegs.length>1&&nearDur>SEG_MIN;
                      return <div className="booking-edit-seg-row" key={i} style={{display:'flex',alignItems:'center',gap:8,padding:'8px 10px',borderRadius:10,border:`1px solid ${T.line}`,background:T.surface,marginBottom:6}}>
                        <div style={{width:28,height:28,borderRadius:'50%',background:stf?.color||'#ccc',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:800}}>{stf?.name?.[0]}</div>
                        <div className="booking-edit-seg-main" style={{flex:1}}>
                          <div style={{fontSize:12,fontWeight:700}}>{staffSegmentDisplay(s,stf)}</div>
                          <div style={{fontSize:10,color:T.ink2,fontVariantNumeric:'tabular-nums',marginTop:1}}>{s.from} - {s.to}</div>
                        </div>
                        <div style={{display:'flex',alignItems:'center',gap:3}}>
                          <button onClick={()=>adjustSeg(i,-SEG_STEP)} disabled={!canM}
                            style={{width:28,height:28,borderRadius:6,border:`1px solid ${T.line}`,background:canM?T.surface:T.line2,color:canM?T.ink:T.ink3,fontSize:13,fontWeight:700,cursor:canM?'pointer':'default'}}>-</button>
                          <div className="booking-edit-duration" style={{minWidth:38,textAlign:'center',fontSize:12,fontWeight:800,fontVariantNumeric:'tabular-nums'}}>{s.dur}분</div>
                          <button onClick={()=>adjustSeg(i,+SEG_STEP)} disabled={!canP}
                            style={{width:28,height:28,borderRadius:6,border:`1px solid ${T.line}`,background:canP?T.surface:T.line2,color:canP?T.ink:T.ink3,fontSize:13,fontWeight:700,cursor:canP?'pointer':'default'}}>+</button>
                        </div>
                        <button onClick={()=>toggleStaff(s.staffId)}
                          style={{width:24,height:24,borderRadius:6,border:`1px solid ${T.line}`,background:T.surface,color:T.ink3,fontSize:11,fontWeight:700,cursor:'pointer'}}>×</button>
                      </div>;
                    })}
                  </>}

                  {editSegs.length===0&&<div style={{padding:16,borderRadius:12,border:`1.5px dashed ${T.line}`,textAlign:'center',color:T.ink2,fontSize:12,fontWeight:600}}>
                    위에서 스텝을 1명 이상 선택하세요
                  </div>}
                </div>
              </div>
            </>;
          })()}


          {canEdit&&mode==='reject'&&<div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'20px 0',gap:10}}>
            <div style={{fontSize:40}}>주의</div>
            <div style={{fontSize:15,fontWeight:700,color:T.ink,textAlign:'center'}}>
              {bookingCustomerName(selected,'고객')}님의 예약을<br/>거절하시겠습니까?
            </div>
          </div>}
        </div>


        <div className="booking-edit-actions" style={{padding:'12px 20px 20px',flexShrink:0,borderTop:`1px solid ${T.line2}`}}>
          {/* VIEW cancel request */}
          {canEdit&&mode==='view'&&bookingCancelRequest(selected)&&<div style={{display:'flex',gap:10}}>
            <button onClick={async()=>{if(busy)return;setBusy(true);closeDetail();await onCancelReject?.(selected);setBusy(false);}}
              style={{flex:1,height:54,borderRadius:14,border:`1.5px solid ${T.line}`,background:T.surface,color:T.ink,fontSize:14,fontWeight:700,cursor:'pointer',opacity:busy?.6:1}}>
              요청 거절
            </button>
            <button onClick={async()=>{if(busy)return;setBusy(true);closeDetail();await onCancelApprove?.(selected);setBusy(false);}}
              style={{flex:2,height:54,borderRadius:14,border:'none',background:T.danger,color:'#fff',fontSize:15,fontWeight:700,cursor:'pointer',opacity:busy?.6:1}}>
              {busy?'처리 중...':'취소 승인'}
            </button>
          </div>}

          {/* VIEW pending */}
          {canEdit&&mode==='view'&&!bookingCancelRequest(selected)&&selected.status==='pending'&&<div style={{display:'flex',gap:10}}>
            <button onClick={()=>{setMode('reject');setRejectReason('');}}
              style={{flex:1,height:54,borderRadius:14,border:'1.5px solid #FECACA',background:'#FEF2F2',color:T.danger,fontSize:15,fontWeight:700,cursor:'pointer'}}>
              거절
            </button>
            <button onClick={handleConfirm} disabled={busy}
              style={{flex:2,height:54,borderRadius:14,border:'none',background:T.success,color:'#fff',fontSize:15,fontWeight:700,cursor:'pointer',opacity:busy?.6:1}}>
              {busy?'처리 중...':'그대로 확정'}
            </button>
          </div>}

          {/* EDIT */}
          {canEdit&&mode==='edit'&&(()=>{
            const totalDur=calculateDuration(editStart||'09:00',editEnd||'10:00');
            const segsTotal=editSegs.reduce((a,s)=>a+s.dur,0);
            const remaining=totalDur-segsTotal;
            const segsValid=editSegs.length>=1&&remaining===0;
            const canConfirm=editDate&&editStart&&editEnd&&editService&&segsValid;
            return <div style={{display:'flex',gap:10}}>
              <button onClick={()=>setMode('view')}
                style={{flex:1,height:54,borderRadius:14,border:`1.5px solid ${T.line}`,background:T.surface,fontSize:14,fontWeight:600,cursor:'pointer'}}>
                취소
              </button>
              <button onClick={handleConfirm} disabled={busy||!canConfirm}
                style={{flex:2,height:54,borderRadius:14,border:'none',background:canConfirm?T.success:T.line,color:canConfirm?'#fff':T.ink3,fontSize:14,fontWeight:700,cursor:canConfirm?'pointer':'not-allowed',opacity:busy?.6:1}}>
                {busy?'처리 중...':canConfirm?'수정 후 확정':'스텝을 배정하세요'}
              </button>
            </div>;
          })()}

          {/* REJECT */}
          {canEdit&&mode==='reject'&&<div style={{display:'flex',gap:10}}>
            <button onClick={()=>setMode('view')}
              style={{flex:1,height:54,borderRadius:14,border:`1.5px solid ${T.line}`,background:T.surface,fontSize:14,fontWeight:600,cursor:'pointer'}}>
              취소
            </button>
            <button onClick={handleReject} disabled={busy}
              style={{flex:2,height:54,borderRadius:14,border:'none',background:T.danger,color:'#fff',fontSize:15,fontWeight:700,cursor:'pointer',opacity:busy?.6:1}}>
              {busy?'처리 중...':'거절 확정'}
            </button>
          </div>}
        </div>

      </div>
    </>}
  </div>;
}

function ScheduleBookingEditSheet({booking,staff,onClose,onSave,onDelete}){
  const safeStaff=Array.isArray(staff)?staff:[];
  const SEG_STEP=5,SEG_MIN=5;
  const calcDuration=(start,end)=>{
    return Math.max(SEG_MIN,minutesFromHHMM(end,'10:00')-minutesFromHHMM(start,'09:00'));
  };
  const [busy,setBusy]=useState(false);
  const [confirmDelete,setConfirmDelete]=useState(false);
  const [editDate,setEditDate]=useState(booking?.booking_date||dateISO(new Date()));
  const [editStart,setEditStart]=useState((booking?.start_time||'09:00').slice(0,5));
  const [editEnd,setEditEnd]=useState((booking?.end_time||'10:00').slice(0,5));
  const [editService,setEditService]=useState(booking?.service_type||'hair');
  const [editDetail,setEditDetail]=useState(bookingDisplayMemo(booking));
  const [editCustomerName,setEditCustomerName]=useState(bookingCustomerName(booking,''));
  const [editCustomerPhone,setEditCustomerPhone]=useState(bookingCustomerPhone(booking));
  const adminDisplay=bookingAdminDisplay(booking);
  const [editSegs,setEditSegs]=useState(()=>{
    const total=calcDuration((booking?.start_time||'09:00').slice(0,5),(booking?.end_time||'10:00').slice(0,5));
    let segs=[];
    try{
      const raw=typeof booking?.staff_sequence==='string'?JSON.parse(booking.staff_sequence):booking?.staff_sequence;
      if(Array.isArray(raw))segs=raw.map(seg=>({staffId:seg.staffId||seg.staff_id,label:seg.label||'',role:seg.role||'',dur:Number(seg.dur)||10})).filter(s=>s.staffId);
    }catch{}
    if(!segs.length&&booking?.assigned_staff){
      try{
        const raw=typeof booking.assigned_staff==='string'?JSON.parse(booking.assigned_staff):booking.assigned_staff;
        if(Array.isArray(raw))segs=raw.map(seg=>({staffId:seg.staff_id||seg.staffId,label:seg.label||'',role:seg.role||'',dur:10})).filter(s=>s.staffId);
      }catch{}
    }
    if(!segs.length&&booking?.requested_staff_id)segs=[{staffId:booking.requested_staff_id,label:'',dur:total}];
    return fitStaffSegsToDuration(segs,total,SEG_STEP,SEG_MIN);
  });
  const durationRef=useRef(calcDuration(editStart,editEnd));

  useEffect(()=>{
    const total=calcDuration(editStart,editEnd);
    if(durationRef.current===total)return;
    durationRef.current=total;
    setEditSegs(prev=>prev.length?fitStaffSegsToDuration(prev,total,SEG_STEP,SEG_MIN):prev);
  },[editStart,editEnd]);

  const totalDur=calcDuration(editStart,editEnd);
  const segsTotal=editSegs.reduce((a,s)=>a+s.dur,0);
  const remaining=totalDur-segsTotal;
  const valid=editDate&&editStart&&editEnd&&editService&&editCustomerName.trim()&&editSegs.length>=1&&remaining===0;
  let acc=0;
  const splitDur=editSegs.map(s=>{const from=addMin(editStart,acc);const to=addMin(editStart,acc+s.dur);acc+=s.dur;return{...s,from,to};});

  const toggleStaff=id=>{
    const ex=editSegs.find(s=>s.staffId===id);
    if(ex){
      const w=editSegs.filter(s=>s.staffId!==id);
      if(!w.length){setEditSegs([]);return;}
      setEditSegs(fitStaffSegsToDuration(w,totalDur,SEG_STEP,SEG_MIN));
    }else if(editSegs.length<3){
      const stf=safeStaff.find(s=>s.id===id);
      const label=staffSegmentServiceCode({staffId:id},stf);
      if(!editSegs.length)setEditSegs([{staffId:id,label,dur:totalDur}]);
      else{
        const last=editSegs[editSegs.length-1];
        const take=Math.min(20,Math.max(SEG_MIN,Math.floor(last.dur/2/SEG_STEP)*SEG_STEP));
        const newDur=Math.max(SEG_MIN,last.dur-take);
        setEditSegs([...editSegs.slice(0,-1),{...last,dur:newDur},{staffId:id,label,dur:take}]);
      }
    }
  };
  const adjustSeg=(idx,delta)=>{
    const next=editSegs.map(s=>({...s}));
    const other=idx===editSegs.length-1?idx-1:idx+1;
    if(other<0||other>=editSegs.length)return;
    if(next[idx].dur+delta<SEG_MIN||next[other].dur-delta<SEG_MIN)return;
    next[idx].dur+=delta;
    next[other].dur-=delta;
    setEditSegs(next);
  };
  const submit=async()=>{
    if(!valid||busy)return;
    setBusy(true);
    const finalSegs=fitStaffSegsToDuration(editSegs,totalDur,SEG_STEP,SEG_MIN);
    const firstStaffId=finalSegs[0]?.staffId||null;
    const normalizedStart=normalizeHHMM(editStart,'09:00');
    const normalizedEnd=normalizeHHMM(editEnd,'10:00');
    const memoBase=buildBookingMemo(String(editDetail||'').trim(),splitBookingMemo(booking?.customer_memo||'').meta);
    const updates={
      booking_date:editDate,
      start_time:normalizedStart,
      end_time:normalizedEnd,
      service_type:editService,
      service_detail:bookingDetailFromSegs(finalSegs,safeStaff),
      customer_memo:memoBase,
      requested_staff_id:isRealStaffReference(safeStaff,firstStaffId)?firstStaffId:null,
      staff_sequence:finalSegs
    };
    await onSave(updates,{finalSegs,customerName:editCustomerName.trim(),customerPhone:editCustomerPhone.trim()});
    setBusy(false);
  };
  const submitDelete=async()=>{

      <div className="booking-edit-actions" style={{padding:'12px 20px 20px',borderTop:`1px solid ${T.line2}`,display:'flex',gap:10}}>
        <button onClick={()=>setConfirmDelete(true)} disabled={busy||!onDelete} style={{flex:.9,height:54,borderRadius:14,border:'1.5px solid #FECACA',background:'#FEF2F2',color:T.danger,fontSize:14,fontWeight:800,cursor:busy||!onDelete?'default':'pointer',opacity:(busy||!onDelete)?0.55:1}}>삭제</button>
        <button onClick={onClose} disabled={busy} style={{flex:1,height:54,borderRadius:14,border:`1.5px solid ${T.line}`,background:T.surface,fontSize:14,fontWeight:700,cursor:busy?'default':'pointer'}}>취소</button>
        <button onClick={submit} disabled={!valid||busy} style={{flex:1.8,height:54,borderRadius:14,border:'none',background:valid?T.success:T.line,color:valid?'#fff':T.ink3,fontSize:14,fontWeight:800,cursor:valid&&!busy?'pointer':'not-allowed',opacity:busy?.6:1}}>{busy?'처리 중...':'수정 저장'}</button>
      </div>
    </div>
    {confirmDelete&&<>
      <div onClick={busy?undefined:()=>setConfirmDelete(false)} style={{position:'fixed',inset:0,background:'rgba(0,0,0,.48)',zIndex:70}}/>
      <div style={{position:'fixed',left:'50%',top:'50%',transform:'translate(-50%,-50%)',width:'min(340px,90vw)',background:T.surface,borderRadius:20,zIndex:71,boxShadow:'0 20px 60px rgba(0,0,0,.28)',padding:22,animation:'popIn .2s'}}>
        <div style={{fontSize:18,fontWeight:900,marginBottom:8}}>예약 삭제</div>
        <div style={{fontSize:14,color:T.ink2,lineHeight:1.6,marginBottom:18}}>
          <b>{editCustomerName||bookingCustomerName(booking,'고객')}</b> 예약을 삭제하시겠습니까?<br/>
          <span style={{fontSize:12,color:T.ink3}}>삭제하면 미니달력 리스트와 일정 타임라인에서 바로 사라집니다.</span>

        <div style={{display:'flex',gap:8}}>
          <button onClick={()=>setConfirmDelete(false)} disabled={busy} style={{flex:1,height:46,borderRadius:12,border:`1px solid ${T.line}`,background:T.surface,fontSize:14,fontWeight:800,cursor:busy?'default':'pointer'}}>취소</button>

function StaffAuthApprovalItem({req,staff,onApprove,onReject}){
  const initial=staff.find(s=>s.id===req.staffId)?.id||staff.find(s=>s.name===req.name)?.id||'';
  const[staffId,setStaffId]=useState(initial);
  const linked=staff.find(s=>s.id===staffId);
  return <div style={{padding:'13px 16px',borderBottom:`1px solid ${T.line2}`}}>
    <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:10,marginBottom:10}}>
      <div>
        <div style={{fontSize:15,fontWeight:900,color:T.ink}}>{req.name}</div>
        <div style={{fontSize:12,color:T.ink2,marginTop:2}}>연락처 {req.phone||'-'} · 비밀번호 {req.pin}</div>
        <div style={{fontSize:11,color:T.ink3,marginTop:3}}>{req.requestedAt?.slice(0,10)||''}</div>
      </div>
      <span style={{fontSize:11,fontWeight:800,padding:'3px 8px',borderRadius:999,background:req.status==='approved'?'#DCFCE7':req.status==='rejected'?'#FEE2E2':'#FEF3C7',color:req.status==='approved'?'#166534':req.status==='rejected'?'#991B1B':'#92400E'}}>
        {req.status==='approved'?'승인됨':req.status==='rejected'?'거절됨':'승인 대기'}
      </span>
    </div>
    {req.status==='pending'?<>
      <label className="lbl">연결할 스텝</label>
      <div style={{display:'flex',gap:8}}>
        <select className="sel" value={staffId} onChange={e=>setStaffId(e.target.value)} style={{flex:1}}>
          <option value="">스텝 선택</option>
          {staff.map(s=><option key={s.id} value={s.id}>{s.name} · {staffRoleLabel(s.role)}</option>)}
        </select>
        <button onClick={()=>onReject(req)} style={{height:44,padding:'0 12px',borderRadius:10,border:'1px solid #FECACA',background:'#FEF2F2',color:T.danger,fontSize:12,fontWeight:900,cursor:'pointer'}}>거절</button>
        <button onClick={()=>staffId&&onApprove(req,staffId)} disabled={!staffId} style={{height:44,padding:'0 14px',borderRadius:10,border:'none',background:staffId?T.success:T.line,color:staffId?'#fff':T.ink3,fontSize:12,fontWeight:900,cursor:staffId?'pointer':'not-allowed'}}>승인</button>
      </div>
    </>:linked&&<div style={{fontSize:12,color:T.ink2}}>연결 스텝: <b>{linked.name}</b></div>}
  </div>;
}

function SettingsScreen({onSignOut,googleToken,setGoogleToken,session,staffAuthRows=[],staff=[],onApproveStaffAuth,onRejectStaffAuth}){

  const[clientId,setClientId]=useState(()=>localStorage.getItem('nunu_gcal_cid')||GCAL_DEFAULT_CLIENT_ID);
  const[gcalLoading,setGcalLoading]=useState(false);
  const[backupLoading,setBackupLoading]=useState(false);
  const[showClientIdInput,setShowClientIdInput]=useState(false);
  const[pushBusy,setPushBusy]=useState(false);
  const[pushDevice,setPushDevice]=useState(()=>getStoredPushDevice());
  const[pushMissing,setPushMissing]=useState([]);
  const[pushError,setPushError]=useState('');
  const[pushDiagnostics,setPushDiagnostics]=useState(null);
  const[pushDiagnosticsBusy,setPushDiagnosticsBusy]=useState(false);
  const isConnected=!!googleToken;


  useEffect(()=>{
    if(!clientId) return;
    const tryInit=()=>{
      if(gcalInit(clientId,(token)=>{
        setGoogleToken(token);
        setGcalLoading(false);
      })) return;
      setTimeout(tryInit, 500);
    };
    tryInit();
  },[clientId]);

  useEffect(()=>{
    let alive=true;
    loadPushConfig()
      .then(cfg=>{if(alive)setPushMissing(cfg.enabled?[]:(cfg.missing||[]));})
      .catch(()=>{if(alive)setPushMissing(['Firebase 설정 확인 실패']);});
    return()=>{alive=false;};
  },[]);

  useEffect(()=>{
    let alive=true;
    refreshStoredPushDevice(session)
      .then(device=>{
        if(!alive)return;
        setPushDevice(device||null);
      })
      .catch(e=>console.warn('[push] settings refresh skipped',e));
    return()=>{alive=false;};
  },[session?.role,session?.staffId,session?.name]);

  useEffect(()=>{
    if(session?.role!=='admin')return;
    let alive=true;
    loadPushDiagnostics()
      .then(data=>{if(alive)setPushDiagnostics(data);})
      .catch(e=>console.warn('[push] diagnostics load skipped',e));
    return()=>{alive=false;};
  },[session?.role]);

  function handleConnect(){
    if(!clientId.trim()){setShowClientIdInput(true);return;}
    setGcalLoading(true);
    const ok=gcalLogin();
    if(!ok){
      setGcalLoading(false);
      alert('Google 연동 라이브러리 로딩 중입니다. 잠시 후 다시 시도해주세요.');
    }
  }

  function handleSaveClientId(){
    const cid=clientId.trim();
    if(!cid){return;}
    localStorage.setItem('nunu_gcal_cid',cid);
    setShowClientIdInput(false);

    gcalInit(cid,(token)=>{setGoogleToken(token);setGcalLoading(false);});
    setTimeout(()=>{setGcalLoading(true);gcalLogin();},300);
  }

  function handleDisconnect(){
    localStorage.removeItem(GCAL_KEY);
    setGoogleToken(gcalGetToken());
    alert('Google Calendar는 Apps Script 서버 연동으로 유지됩니다. 연결을 중지하려면 Apps Script 트리거를 삭제해야 합니다.');
  }

  async function handleEnablePush(){
    if(pushBusy)return;
    setPushBusy(true);
    setPushError('');
    try{
      const device=await enablePushDevice(session);
      setPushDevice(device);
      if(session?.role==='admin')handleRefreshPushDiagnostics();
      alert('이 기기에서 누누아누 알림을 받을 수 있습니다.');
    }catch(e){
      const msg=e?.message||'알림 설정에 실패했습니다.';
      setPushError(msg);
      alert(msg);
    }finally{
      setPushBusy(false);
    }
  }

  async function handleDisablePush(){
    if(pushBusy)return;
    setPushBusy(true);
    setPushError('');
    try{
      await disablePushDevice();
      setPushDevice(null);
      if(session?.role==='admin')handleRefreshPushDiagnostics();
      alert('이 기기 알림을 껐습니다.');
    }catch(e){
      const msg=e?.message||'알림 해제에 실패했습니다.';
      setPushError(msg);
      alert(msg);
    }finally{
      setPushBusy(false);
    }
  }

  async function handleResetPush(){
    if(pushBusy)return;
    setPushBusy(true);
    setPushError('');
    try{
      const device=await resetPushDevice(session);
      setPushDevice(device);
      if(session?.role==='admin')handleRefreshPushDiagnostics();
      alert('이 기기 알림을 새로 등록했습니다. 이제 테스트 알림을 보내 확인해주세요.');
    }catch(e){
      const msg=e?.message||'알림 재설정에 실패했습니다.';
      setPushError(msg);
      alert(msg);
    }finally{
      setPushBusy(false);
    }
  }

  async function handleRefreshPushDiagnostics(){
    if(pushDiagnosticsBusy)return;
    setPushDiagnosticsBusy(true);
    try{
      const data=await loadPushDiagnostics();
      setPushDiagnostics(data);
    }catch(e){
      const msg=e?.message||'알림 진단 정보를 불러오지 못했습니다.';
      setPushError(msg);
    }finally{
      setPushDiagnosticsBusy(false);
    }
  }

  async function handleTestPush(){
    if(pushBusy)return;
    setPushBusy(true);
    setPushError('');
    try{
      const refreshed=await refreshStoredPushDevice(session,{force:true});
      if(refreshed)setPushDevice(refreshed);
      await notifyAdminDevices({
        type:'admin_notice',
        title:'관리자 알림 테스트',
        body:`${session?.name||'관리자'} 기기에서 전체 알림 테스트를 보냈습니다.`,
        data:{url:'/admin.html',tab:'me'},
        eventKey:`admin_notice:test:${Date.now()}`
      });
      if(session?.role==='admin')setTimeout(()=>handleRefreshPushDiagnostics(),1200);
      alert('전체 관리자 기기로 테스트 알림을 보냈습니다.');
    }catch(e){
      const msg=e?.message||'테스트 알림 전송에 실패했습니다.';
      setPushError(msg);
      alert(msg);
    }finally{
      setPushBusy(false);
    }
  }

  async function handleDownloadBackup(){
    if(backupLoading)return;
    setBackupLoading(true);
    try{
      const [customers,bookings,staffRows]=await Promise.all([
        sbGet('customers?select=*&order=created_at.desc&limit=50000'),
        sbGet('bookings?select=*&order=created_at.desc&limit=50000'),
        sbGet('staff?select=*&order=created_at.asc&limit=10000')
      ]);
      const backup={
        app:'nununanu-reservation',
        exported_at:new Date().toISOString(),
        project_ref:'lwllncasntzevgidsdro',
        counts:{customers:customers.length,bookings:bookings.length,staff:staffRows.length},
        data:{customers,bookings,staff:staffRows},
        local_cache:{
          staff_visibility:LS.get(LS_STAFF_VIS,{}),
          staff_profile:LS.get(LS_STAFF_PROFILE,{})
        }
      };
      const text=JSON.stringify(backup,null,2);
      const blob=new Blob([text],{type:'application/json;charset=utf-8'});
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');
      const stamp=new Date().toISOString().replace(/[:.]/g,'-').slice(0,19);
      a.href=url;
      a.download=`nununanu-backup-${stamp}.json`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
      await writeAuditLog('backup_download','system','manual',{counts:backup.counts});
      alert(`백업 파일을 다운로드했습니다.\n고객 ${customers.length}건 · 예약/시스템 ${bookings.length}건 · 스텝 ${staffRows.length}건`);
    }catch(e){
      console.error('[backup download failed]',e);

    <div style={{margin:'0 16px 16px',background:T.surface,borderRadius:16,border:`1px solid ${T.line}`,overflow:'hidden'}}>

          </>:<div style={{fontSize:11,color:T.ink3,background:T.bg,borderRadius:10,padding:10}}>진단 정보를 불러오는 중입니다.</div>}

    </div>

    {isAdmin&&<div style={{margin:'0 16px 16px',background:T.surface,borderRadius:16,border:`1px solid ${T.line}`,overflow:'hidden'}}>
      <div style={{padding:'12px 16px',fontSize:11,fontWeight:800,color:T.ink2,letterSpacing:.6,borderBottom:`1px solid ${T.line2}`,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <span>스텝 권한 승인 요청</span>

      {pendingAuth.length===0?<div style={{padding:'18px 16px',fontSize:13,color:T.ink3,textAlign:'center'}}>대기 중인 승인 요청이 없습니다</div>:pendingAuth.map(req=><StaffAuthApprovalItem key={req.id} req={req} staff={staff} onApprove={onApproveStaffAuth} onReject={onRejectStaffAuth}/>)}
      {handledAuth.length>0&&<div style={{padding:'10px 16px',background:T.bg,borderTop:`1px solid ${T.line2}`}}>
        <div style={{fontSize:11,fontWeight:800,color:T.ink3,marginBottom:8}}>최근 처리 내역</div>

    {isAdmin&&<div style={{margin:'0 16px 16px',background:T.surface,borderRadius:16,border:`1px solid ${T.line}`,overflow:'hidden'}}>

      {isConnected ? (

            </div>
          </div>
          <div style={{padding:'10px 12px',background:'#F0FDF4',border:'1px solid #BBF7D0',borderRadius:10,fontSize:12,color:'#166534',fontWeight:600,lineHeight:1.7,marginBottom:12}}>
            예약 확정 시 Google 캘린더에 자동 등록<br/>
            이벤트에는 고객명, 시술, 시간, 담당 스텝이 포함됩니다
          </div>
          <button onClick={handleDisconnect} style={{width:'100%',height:42,borderRadius:12,border:`1px solid ${T.line}`,background:T.bg,fontSize:13,fontWeight:600,color:T.ink2,cursor:'pointer'}}>
            연결 해제
          </button>
        </div>
      ) : (

        <div style={{padding:'16px'}}>
          {!showClientIdInput ? (
            <>
              <div style={{fontSize:13,color:T.ink2,lineHeight:1.7,marginBottom:14}}>
                예약 확정 시 Google 캘린더에 <b>자동으로 일정이 등록</b>됩니다.<br/>
                Google 계정으로 로그인하면 바로 사용할 수 있습니다.
              </div>
              <div style={{padding:'10px 12px',background:'#EFF6FF',border:'1px solid #BFDBFE',borderRadius:10,fontSize:12,color:'#1E40AF',fontWeight:600,lineHeight:1.7,marginBottom:14}}>

                2. Google Calendar API 사용 설정<br/>
                3. OAuth 클라이언트 ID 생성<br/>
                4. 승인된 JavaScript 원본에 <code style={{background:'#DBEAFE',padding:'1px 4px',borderRadius:4}}>https://nununanu-app.vercel.app</code> 추가<br/>
                5. Client ID를 복사해 아래에 입력
              </div>
              {clientId ? (
                <button onClick={()=>{setGcalLoading(true);handleConnect();}} disabled={gcalLoading}

                      Google로 로그인</>}
                </button>
              ) : null}
              <button onClick={()=>setShowClientIdInput(true)} style={{marginTop:10,width:'100%',height:42,borderRadius:12,border:`1px solid ${T.line}`,background:T.bg,fontSize:13,fontWeight:600,color:T.ink2,cursor:'pointer'}}>
                {clientId ? 'Client ID 변경' : 'Client ID 입력하기'}
              </button>
            </>
          ) : (
            /* Client ID ?낅젰 ??*/
            <>
              <div style={{fontSize:13,fontWeight:700,color:T.ink,marginBottom:8}}>Google Client ID ?낅젰</div>

                value={clientId}

              <div style={{display:'flex',gap:8}}>

      <div style={{padding:'12px 16px',fontSize:11,fontWeight:800,color:T.ink2,letterSpacing:.6,borderBottom:`1px solid ${T.line2}`}}>운영 백업</div>

        <div style={{fontSize:13,color:T.ink2,lineHeight:1.7,marginBottom:12}}>

    <div style={{margin:'0 16px 24px',background:T.surface,borderRadius:16,border:`1px solid ${T.line}`,overflow:'hidden'}}>

function Toast({msg,onDone}){
  const[out,setOut]=useState(false);
  useEffect(()=>{const t1=setTimeout(()=>setOut(true),3200),t2=setTimeout(onDone,3700);return()=>{clearTimeout(t1);clearTimeout(t2);};},[]);
  return <div style={{position:'fixed',left:12,right:12,top:'calc(env(safe-area-inset-top,0px) + 12px)',background:T.ink,color:'#fff',borderRadius:16,padding:'12px 14px',display:'flex',alignItems:'center',gap:12,zIndex:99,boxShadow:'0 12px 32px rgba(0,0,0,.3)',animation:out?'toastOut .4s forwards':'toastIn .3s'}}>
    <div style={{width:32,height:32,borderRadius:'50%',background:T.success,color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,fontWeight:800,flexShrink:0}}>✓</div>
    <div style={{flex:1}}><div style={{fontSize:14,fontWeight:700}}>{msg.title}</div>{msg.sub&&<div style={{fontSize:12,opacity:.7,marginTop:2}}>{msg.sub}</div>}</div>
    <button onClick={()=>{setOut(true);setTimeout(onDone,400);}} style={{height:28,padding:'0 10px',borderRadius:999,border:'none',background:'rgba(255,255,255,.18)',color:'#fff',fontSize:12,fontWeight:700,cursor:'pointer'}}>닫기</button>
  </div>;
}


function Header({selectedDate,setSelectedDate,blockCount,staffCount,loadingBkg,supaBookings,staff,supaCustomers,setDraft,setEditingId,setFlow,onCalendarImport,onOpenBooking,canEdit=true,staffFilterId=null,staffDayOffs=[],scheduleNotice=null,onSaveScheduleNotice}){
  const[showCal,setShowCal]=useState(false);
  const[importing,setImporting]=useState(false);
  const[noticeEdit,setNoticeEdit]=useState(false);
  const[noticeDraft,setNoticeDraft]=useState('');
  const[noticeBusy,setNoticeBusy]=useState(false);
  const fileRef=useRef(null);
  const mo=selectedDate.getMonth()+1,dd=selectedDate.getDate(),dow=DOW_KO[selectedDate.getDay()];
  const noticeText=String(scheduleNotice?.text||'').trim();
  const offRows=Array.isArray(staffDayOffs)?staffDayOffs:[];
  const openNoticeEdit=()=>{
    setNoticeDraft(noticeText);
    setNoticeEdit(true);
  };
  const saveNotice=async()=>{
    if(noticeBusy)return;
    setNoticeBusy(true);
    const ok=await onSaveScheduleNotice?.(dateISO(selectedDate),noticeDraft);
    setNoticeBusy(false);
    if(ok!==false)setNoticeEdit(false);
  };
  const handleCalendarFile=async e=>{
    const file=e.target.files?.[0];
    if(!file)return;
    setImporting(true);
    try{
      const text=await file.text();
      await onCalendarImport?.(text,file.name);
    }finally{
      setImporting(false);
      e.target.value='';
    }
  };
  return <div style={{position:'relative',padding:`calc(env(safe-area-inset-top,0px) + 10px) 16px 10px`,borderBottom:`1px solid ${T.line}`,background:T.surface,flexShrink:0,zIndex:20}}>
    <div style={{display:'flex',alignItems:'flex-end',justifyContent:'space-between',gap:10}}>
      <div>
        <div style={{display:'flex',alignItems:'center',gap:4}}>
          <button onClick={()=>setSelectedDate(d=>addDays(d,-1))} style={{width:44,height:44,borderRadius:12,border:'none',background:'transparent',color:T.ink2,fontSize:24,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>‹</button>
          <button onClick={()=>setShowCal(v=>!v)} style={{border:'none',background:'transparent',cursor:'pointer',padding:'4px 6px',display:'flex',alignItems:'center',gap:6}}>
            <span style={{fontSize:20,fontWeight:800,letterSpacing:-.6}}>{mo}월 {dd}일 {dow}요일</span>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={T.ink3} strokeWidth="2.5"><path d="m6 9 6 6 6-6"/></svg>
          </button>
          {isToday(selectedDate)&&<span style={{fontSize:11,fontWeight:700,color:T.accent,background:'#FFF0EA',padding:'2px 7px',borderRadius:999}}>오늘</span>}
          <button onClick={()=>setSelectedDate(d=>addDays(d,1))} style={{width:44,height:44,borderRadius:12,border:'none',background:'transparent',color:T.ink2,fontSize:24,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>›</button>
        </div>
        <div style={{fontSize:13,color:T.ink2,marginTop:2}}>예약 {blockCount}건 · 스텝 {staffCount}명{loadingBkg?' 새로고침 중':''}</div>
      </div>

function LoginScreen({onLogin}){
  const[mode,setMode]=useState('admin');
  const[pw,setPw]=useState('');
  const[staffPin,setStaffPin]=useState('');
  const[reqName,setReqName]=useState('');
  const[reqPhone,setReqPhone]=useState('');
  const[reqPin,setReqPin]=useState('');
  const[err,setErr]=useState('');
  const[msg,setMsg]=useState('');
  const[busy,setBusy]=useState(false);

  const resetNotice=()=>{setErr('');setMsg('');};
  const adminLogin=async()=>{
    resetNotice();
    if(!pw){setErr('관리자 비밀번호를 입력하세요');return;}
    setBusy(true);
    try{
      const hash=await sha256Text(pw);
      if(hash===ADMIN_PASSWORD_HASH){
        const session={role:'admin',name:'관리자'};
        writeAuthSession(session);
        onLogin(session);
      } else {
        setErr('비밀번호가 올바르지 않습니다');
        setPw('');
      }
    }catch{
      setErr('보안 모듈을 불러오지 못했습니다. 새로고침 후 다시 시도해주세요.');
    }finally{
      setBusy(false);
    }
  };

  const staffLogin=async()=>{
    resetNotice();
    const pin=staffPin.replace(/\D/g,'').slice(0,4);
    if(pin.length!==4){setErr('승인받은 4자리 비밀번호를 입력하세요');return;}
    setBusy(true);
    try{
      const rows=await sbGet(`bookings?select=*,customers(id,name,phone,pin,memo)&service_detail=eq.${STAFF_AUTH_SERVICE}&status=eq.confirmed&order=created_at.desc`);
      const approved=(rows||[]).map(parseStaffAuthRow).filter(x=>x&&x.status==='approved');
      const matchedAuth=approved.find(x=>x.pin===pin);
      if(!matchedAuth){setErr('승인된 스텝 계정을 찾을 수 없습니다. 승인 요청 후 관리자의 승인을 기다려주세요.');return;}
      const auth=matchedAuth;
      const [staffRows,profileRows]=await Promise.all([
        sbGet('staff?select=*&is_active=eq.true&order=created_at.asc'),
        sbGet(`bookings?select=id,customer_id,status,service_detail,customer_memo,created_at&service_detail=eq.${STAFF_PROFILE_SERVICE}&order=created_at.desc&limit=1000`)
      ]);
      const matched=staffRows.find(s=>s.id===auth.staffId)||staffRows.find(s=>s.name===auth.name);
      if(!matched){setErr('연결된 스텝 정보를 찾을 수 없습니다. 관리자에게 다시 승인 요청해주세요.');return;}
      const profileEntry=staffProfileMap(profileRows).get(matched.id);
      const profile=profileEntry?.profile||{};
      const hasFullPermission=profileEntry?staffHasFullPermission(profile):staffHasFullPermission(matched);
      const merged={...matched,...profile,permission_level:hasFullPermission?'full':'view_only',is_admin:hasFullPermission};
      const session={role:'staff',name:merged.name||matched.name,staffId:matched.id,phone:auth.phone,permission:staffHasFullPermission(merged)?'full':'view_only'};
      writeAuthSession(session);
      onLogin(session);
    }finally{
      setBusy(false);
    }
  };

  const requestStaffAccess=async()=>{
    resetNotice();
    const name=reqName.trim();
    const digits=cleanPhoneDigits(reqPhone);
    const pin=reqPin.replace(/\D/g,'').slice(0,4);
    if(!name){setErr('이름을 입력하세요');return;}
    if(digits.length<10){setErr('연락처를 올바르게 입력하세요');return;}
    if(pin.length!==4){setErr('사용할 비밀번호 숫자 4자리를 입력하세요');return;}
    setBusy(true);
    try{
      const authRows=await sbGet(`bookings?select=*,customers(id,name,phone,pin,memo)&service_detail=eq.${STAFF_AUTH_SERVICE}&order=created_at.desc&limit=2000`);
      const parsedAuth=(authRows||[]).map(parseStaffAuthRow).filter(Boolean);
      const samePin=parsedAuth.find(x=>x.pin===pin&&x.phone!==digits&&x.status!=='rejected');
      if(samePin){setErr('이미 다른 스텝이 사용 중이거나 승인 대기 중인 비밀번호입니다. 다른 4자리 번호를 사용하세요.');return;}

      const existingAuth=parsedAuth.find(x=>x.phone===digits&&x.status!=='rejected');
      if(existingAuth&&existingAuth.pin!==pin){
        setErr('이미 이 연락처로 다른 비밀번호 요청이 있습니다. 관리자에게 문의하세요.');
        return;
      }
      if(existingAuth?.status==='approved'){
        setMsg('이미 승인된 스텝 계정입니다. 스텝 로그인에서 비밀번호 4자리를 입력하세요.');
        setMode('staff');
        return;
      }
      if(existingAuth?.status==='pending'){
        setMsg('이미 권한 승인 요청이 전송되었습니다. 관리자 승인 후 스텝 로그인에서 비밀번호를 입력하세요.');
        setMode('staff');
        return;
      }
      const staffRequestRows=await sbPostSystemBooking({
        booking_date:'2099-12-31',
        start_time:'00:00',
        end_time:'00:10',
        service_type:'hair',
        service_detail:STAFF_AUTH_SERVICE,
        customer_memo:staffAuthMemo({status:'pending',name,phone:digits,pin,requestedAt:new Date().toISOString()}),
        status:'pending'
      });
      if(!staffRequestRows){setErr('승인 요청을 저장하지 못했습니다. 다시 시도해주세요.');return;}
      await notifyApp({bookingId:staffRequestRows?.[0]?.id,phone:digits,type:'staff_approval_requested'});
      setMsg('권한 승인 요청이 전송되었습니다. 관리자 승인 후 비밀번호만 입력하면 로그인할 수 있습니다.');
      setReqName('');setReqPhone('');setReqPin('');
      setMode('staff');
    }finally{
      setBusy(false);
    }
  };

  const tabBtn=(id,label)=><button onClick={()=>{setMode(id);resetNotice();}} style={{flex:1,height:38,borderRadius:999,border:'none',background:mode===id?T.ink:T.cream2,color:mode===id?'#fff':T.ink2,fontSize:14,fontWeight:400,letterSpacing:-.224,textTransform:'none',cursor:'pointer',boxShadow:'none'}}>{label}</button>;

  return <div style={{height:'100%',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',background:T.bg,padding:'0 24px'}}>
    <div style={{width:'100%',maxWidth:380}}>
      <div style={{textAlign:'center',marginBottom:28}}>
        <div style={{display:'inline-flex',alignItems:'center',justifyContent:'center',borderRadius:999,background:'#fff',padding:'8px 18px',border:`1px solid ${T.line}`,boxShadow:'none',marginBottom:14}}>
          <span style={{color:T.ink,fontFamily:'system-ui,-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif',fontSize:22,fontWeight:600,lineHeight:1,letterSpacing:-.28}}>NUNU A NU</span>
        </div>
        <div style={{fontFamily:'system-ui,-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif',fontSize:40,fontWeight:600,lineHeight:1.1,color:T.ink,letterSpacing:-.28}}>Control</div>
        <div style={{fontSize:14,color:T.ink3,marginTop:8,fontWeight:400,letterSpacing:-.224}}>관리자 · 스텝 전용</div>
      </div>
      <div style={{background:T.surface,borderRadius:24,padding:20,boxShadow:'none',border:`1px solid ${T.line}`}}>
        <div className="halftone" style={{margin:-20,marginBottom:16,padding:'12px 20px',borderBottom:`1px solid ${T.line}`,color:T.ink,fontSize:17,fontWeight:600,letterSpacing:-.374,textTransform:'none',borderTopLeftRadius:24,borderTopRightRadius:24}}>로그인</div>
        <div style={{display:'flex',gap:8,marginBottom:16}}>
          {tabBtn('admin','관리자')}
          {tabBtn('staff','스텝 로그인')}
          {tabBtn('request','승인 요청')}
        </div>

        {mode==='admin'&&<>
          <FF label="관리자 비밀번호">
            <div style={{position:'relative'}}>
              <input className="inp" type="password" value={pw} onChange={e=>setPw(e.target.value)} placeholder="비밀번호 입력" autoComplete="current-password" style={{paddingRight:14}} onKeyDown={e=>e.key==='Enter'&&adminLogin()} autoFocus/>
            </div>
          </FF>
          <PBtn onClick={adminLogin} disabled={busy}>{busy?'로그인 중...':'관리자 로그인'}</PBtn>
        </>}

        {mode==='staff'&&<>
          <FF label="승인받은 비밀번호 4자리">
            <input className="inp" type="password" inputMode="numeric" maxLength={4} value={staffPin} onChange={e=>setStaffPin(e.target.value.replace(/\D/g,'').slice(0,4))} placeholder="숫자 4자리" onKeyDown={e=>e.key==='Enter'&&staffLogin()}/>
          </FF>
          <PBtn onClick={staffLogin} disabled={busy}>{busy?'확인 중...':'스텝 로그인'}</PBtn>
        </>}

        {mode==='request'&&<>
          <FF label="이름"><input className="inp" value={reqName} onChange={e=>setReqName(e.target.value)} placeholder="스텝 이름"/></FF>
          <FF label="연락처"><input className="inp" type="tel" inputMode="numeric" value={reqPhone} onChange={e=>setReqPhone(e.target.value)} placeholder="010-0000-0000"/></FF>
          <FF label="사용할 비밀번호 4자리"><input className="inp" type="password" inputMode="numeric" maxLength={4} value={reqPin} onChange={e=>setReqPin(e.target.value.replace(/\D/g,'').slice(0,4))} placeholder="숫자 4자리"/></FF>
          <PBtn onClick={requestStaffAccess} disabled={busy}>{busy?'요청 중...':'권한 승인 요청'}</PBtn>
          <div style={{fontSize:12,color:T.ink3,lineHeight:1.6,marginTop:10}}>관리자가 승인하면 이후에는 비밀번호 4자리만 입력해 로그인합니다.</div>
        </>}

        {err&&<div style={{padding:'10px 12px',background:'#FEF2F2',border:'1px solid #FECACA',borderRadius:10,fontSize:12,color:T.danger,fontWeight:600,marginTop:12}}>{err}</div>}
        {msg&&<div style={{padding:'10px 12px',background:'#F0FDF4',border:'1px solid #BBF7D0',borderRadius:10,fontSize:12,color:'#166534',fontWeight:700,marginTop:12,lineHeight:1.5}}>{msg}</div>}
      </div>
      <div style={{textAlign:'center',marginTop:16,fontSize:12,color:T.ink3}}>관리자 승인 전 스텝 계정은 로그인할 수 없습니다</div>
    </div>
  </div>;
}

  const loadAllPending=useCallback(async()=>{

      sbGet('bookings?select=*,customers(name,phone,pin)&status=eq.pending&order=created_at.desc&limit=2000'),
      sbGet(`bookings?select=*,customers(name,phone,pin)&status=eq.confirmed&booking_date=gte.${today}&order=booking_date.asc&order=start_time.asc&limit=2000`)
    ]);
    const merged=[...(pendingData||[]),...(confirmedData||[])];
    const seen=new Set();
    const rows=merged
      .filter(Boolean)
      .filter(b=>{if(seen.has(b.id))return false;seen.add(b.id);return true;})
      .filter(b=>!isSystemBooking(b)&&!bookingAdminDeleted(b)&&(b.status==='pending'||bookingCancelRequest(b)))

        const dateCmp=String(a.booking_date||'').localeCompare(String(b.booking_date||''));

  const submit=async()=>{
    setFlow('busy');
    const custName=draft.customer?.name||draft.name;

    const endTime=normalizeHHMM(draft.endTime||addMin(startTime,draft.duration||60),'10:00');
    const totalDuration=durationBetween(startTime,endTime);
    const isEdit=!!editingId;
    const dISO=dateISO(draft.date);
    const editingBlock=todayBlocks.find(b=>b.id===editingId);
    const isSupaEdit=editingBlock?.isSupa&&editingBlock?.supaId;

    try{
      if(isSupaEdit){
        const booking=supaBookings.find(b=>b.id===editingBlock.supaId);
        const finalSegs=fitStaffSegsToDuration(draft.segs,totalDuration,5,5);
        const prevMemo=booking?.customer_memo||editingBlock.customer_memo||'';
        const memoBase=buildBookingMemo(String(draft.bookingMemo||'').trim(),splitBookingMemo(prevMemo).meta);
        const updates={
          booking_date:dISO,
          start_time:startTime,
          end_time:endTime,
          service_type:inferServiceTypeFromSegs(finalSegs,staff),
          service_detail:bookingDetailFromSegs(finalSegs,staff),
          requested_staff_id:isRealStaffReference(staff,finalSegs[0]?.staffId)?finalSegs[0]?.staffId:null,
          assigned_staff:buildAssignedStaffFromSegs(finalSegs,staff,startTime),
          staff_sequence:finalSegs,
          customer_memo:withAdminActionMemo(memoBase,'edit',session)
        };

        const ok=await sbPatch('bookings',editingBlock.supaId,updates);
        if(!ok)throw new Error('Supabase booking patch failed');
        await Promise.all([reloadSupaBookings(),loadSupaCustomers()]);
        await notifyAdminDevices({type:'booking_updated',bookingId:editingBlock.supaId,body:`${custName||'고객'} 예약이 수정되었습니다.`,data:{url:'/admin.html',tab:'schedule',date:dISO,start_time:startTime},eventKey:`booking:${editingBlock.supaId}:edit:${Date.now()}`});
        setFlow(null);setDraft(null);setEditingId(null);
        setToast({title:custName+' 예약 수정 완료',sub:startTime+'로 변경됨'});
        return;
      }

      const finalSegs=fitStaffSegsToDuration(draft.segs,totalDuration,5,5);
      if(!finalSegs.length)throw new Error('No staff segments');
      const customerId=await ensureDraftCustomer(draft,custName);
      if(!customerId)throw new Error('Customer save failed');
      const created=await sbPost('bookings',{
        customer_id:customerId,
        booking_date:dISO,
        start_time:startTime,
        end_time:endTime,
        service_type:inferServiceTypeFromSegs(finalSegs,staff),
        service_detail:bookingDetailFromSegs(finalSegs,staff),
        requested_staff_id:isRealStaffReference(staff,finalSegs[0]?.staffId)?finalSegs[0]?.staffId:null,
        assigned_staff:buildAssignedStaffFromSegs(finalSegs,staff,startTime),
        staff_sequence:finalSegs,
        customer_memo:withAdminActionMemo(String(draft.bookingMemo||'').trim(),isEdit?'edit':'confirm',session),
        status:'confirmed',
        confirmed_at:new Date().toISOString()
      });
      const createdId=created?.[0]?.id;
      if(!createdId)throw new Error('Booking create failed');
      if(isEdit)setBlocks(prev=>prev.filter(b=>b.id!==editingId));
      await Promise.all([reloadSupaBookings(),loadSupaCustomers()]);

      setHighlightId(targetId);setTimeout(()=>setHighlightId(null),3500);

      setToast({title:custName+' · '+startTime+' '+(isEdit?'수정':'등록')+' 완료',sub:'Supabase에 저장되어 모든 기기에 반영됩니다'});
    }catch(e){
      console.error('[admin booking submit failed]',e);
      setFlow('confirm');
      setToast({title:'예약 저장 실패',sub:'공용 DB 저장에 실패했습니다. 네트워크와 Supabase 권한을 확인해주세요.'});

  const cancelSupabaseBooking=async(booking,block=null,{source='schedule'}={})=>{

      return false;
    }

      ? withAdminActionMemo(resolveCancelRequestMemo(booking?.customer_memo,'approved'),'cancel_approved',session)
      : withAdminActionMemo(booking?.customer_memo||block?.customer_memo||'','cancel',session);
    const ok=await sbPatch('bookings',booking.id,{
      status:'cancelled',
      cancelled_at:new Date().toISOString(),
      customer_memo:cancelMemo
    });
    if(ok){
      setSupaBookings(prev=>(prev||[]).filter(b=>b.id!==booking.id));
      await notifyApp({bookingId:booking.id,phone:bookingCustomerPhone(booking)||block?.phone,type:'booking_cancelled'});
