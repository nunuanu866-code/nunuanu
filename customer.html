<!DOCTYPE html>
<html lang="ko">
<head>

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1A1A2E 0%, #2D2D44 100%);
      color: #fff;
      min-height: 100vh;
      overflow-x: hidden;
    }
    .container {
      max-width: 480px;
      margin: 0 auto;
      padding: 20px;
      min-height: 100vh;
    }
    .header {
      text-align: center;
      padding: 40px 0 30px;
    }
    .logo {
      font-size: 48px;
      margin-bottom: 10px;
    }
    .title {
      font-size: 28px;
      font-weight: 700;
      color: #C9A84C;
      margin-bottom: 8px;
    }
    .subtitle {
      font-size: 14px;
      color: #999;
    }
    .card {
      background: rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 20px;
      backdrop-filter: blur(10px);
    }
    .btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary {
      background: linear-gradient(135deg, #C9A84C 0%, #D4B560 100%);
      color: #1A1A2E;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(201,168,76,0.3);
    }
    .btn-secondary {
      background: rgba(255,255,255,0.1);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.2);
    }
    .input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.05);
      color: #fff;
      font-size: 16px;
      margin-bottom: 12px;
    }
    .input::placeholder {
      color: rgba(255,255,255,0.5);
    }
    .label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #C9A84C;
      margin-bottom: 8px;
    }
    .section-title {
      font-size: 18px;
      font-weight: 700;
      color: #C9A84C;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .time-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 20px;
    }
    .time-slot {
      padding: 12px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.05);
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 14px;
    }
    .time-slot:hover {
      background: rgba(201,168,76,0.2);
      border-color: #C9A84C;
    }
    .time-slot.selected {
      background: #C9A84C;
      color: #1A1A2E;
      border-color: #C9A84C;
      font-weight: 600;
    }
    .time-slot.disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }
    .service-option {
      padding: 16px;
      border-radius: 12px;
      border: 2px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.05);
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 12px;
    }
    .service-option:hover {
      border-color: #C9A84C;
      background: rgba(201,168,76,0.1);
    }
    .service-option.selected {
      border-color: #C9A84C;
      background: rgba(201,168,76,0.2);
    }
    .service-name {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .service-duration {
      font-size: 13px;
      color: #999;
    }
    .staff-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-bottom: 20px;
    }
    .staff-card {
      padding: 16px;
      border-radius: 12px;
      border: 2px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.05);
      cursor: pointer;
      text-align: center;
      transition: all 0.2s;
    }
    .staff-card:hover {
      border-color: #C9A84C;
      background: rgba(201,168,76,0.1);
    }
    .staff-card.selected {
      border-color: #C9A84C;
      background: rgba(201,168,76,0.2);
    }
    .staff-icon {
      font-size: 32px;
      margin-bottom: 8px;
    }
    .staff-name {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .staff-role {
      font-size: 12px;
      color: #999;
    }
    .calendar {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
      margin-bottom: 20px;
    }
    .calendar-day {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.05);
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
    }
    .calendar-day:hover:not(.disabled) {
      background: rgba(201,168,76,0.2);
      border-color: #C9A84C;
    }
    .calendar-day.selected {
      background: #C9A84C;
      color: #1A1A2E;
      font-weight: 700;
    }
    .calendar-day.disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }
    .calendar-day.today {
      border-color: #C9A84C;
    }
    .summary-box {
      background: rgba(201,168,76,0.1);
      border: 1px solid #C9A84C;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
    }
    .summary-item {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .summary-item:last-child {
      border-bottom: none;
    }
    .summary-label {
      color: #999;
      font-size: 14px;
    }
    .summary-value {
      color: #fff;
      font-weight: 600;
      font-size: 14px;
    }
    .loading {
      text-align: center;
      padding: 40px;
      color: #C9A84C;
    }
    .error {
      background: rgba(255,59,48,0.1);
      border: 1px solid rgba(255,59,48,0.5);
      color: #ff3b30;
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 12px;
      font-size: 14px;
    }
    .success {
      background: rgba(52,199,89,0.1);
      border: 1px solid rgba(52,199,89,0.5);
      color: #34c759;
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 12px;
      font-size: 14px;
    }
    .step-indicator {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 30px;
    }
    .step-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      transition: all 0.3s;
    }
    .step-dot.active {
      width: 32px;
      border-radius: 5px;
      background: #C9A84C;
    }
    @media (max-width: 375px) {
      .time-grid { grid-template-columns: repeat(2, 1fr); }
      .staff-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;
    const { createClient } = supabase;

    // Supabase 클라이언트
    const supabaseClient = createClient(
      'https://lwllncasntzevgidsdro.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx3bGxuY2FzbnR6ZXZnaWRzZHJvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDc4ODczMTcsImV4cCI6MjA2MzQ2MzMxN30.sb_publishable_vr-2EUl7GP1ulBbDw5unMA_PVab-v46'
    );

    // 날짜 포맷 헬퍼
    const formatDate = (date) => {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, '0');
      const d = String(date.getDate()).padStart(2, '0');
      return `${y}-${m}-${d}`;
    };

    const formatTime = (date) => {
      const h = String(date.getHours()).padStart(2, '0');
      const m = String(date.getMinutes()).padStart(2, '0');
      return `${h}:${m}`;
    };

    const parseDateTime = (dateStr, timeStr) => {
      return new Date(`${dateStr}T${timeStr}:00`);
    };

    function CustomerApp() {
      const [step, setStep] = useState(1); // 1: 서비스선택, 2: 날짜/시간, 3: 고객정보, 4: 완료
      const [selectedService, setSelectedService] = useState('');
      const [selectedStaff, setSelectedStaff] = useState(null);
      const [selectedHairStaff, setSelectedHairStaff] = useState(null); // 헤어 스텝
      const [selectedMakeupStaff, setSelectedMakeupStaff] = useState(null); // 메이크업 스텝
      const [selectedDate, setSelectedDate] = useState('');
      const [selectedTime, setSelectedTime] = useState('');
      const [customerName, setCustomerName] = useState('');
      const [customerPhone, setCustomerPhone] = useState('');
      const [memo, setMemo] = useState('');
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState('');
      const [success, setSuccess] = useState(false);
      const [staffList, setStaffList] = useState([]);
      const [bookings, setBookings] = useState([]);

      // 스텝 데이터 로드
      useEffect(() => {
        loadStaff();
        loadBookings();
      }, []);

      const loadStaff = async () => {
        try {
          const { data, error } = await supabaseClient
            .from('staff')
            .select('*')
            .order('name');
          if (error) throw error;
          setStaffList(data || []);
        } catch (err) {
          console.error('스텝 로드 실패:', err);
        }
      };

      const loadBookings = async () => {
        try {
          const { data, error } = await supabaseClient
            .from('bookings')
            .select('*')
            .in('status', ['pending', 'confirmed']);
          if (error) throw error;
          setBookings(data || []);
        } catch (err) {
          console.error('예약 로드 실패:', err);
        }
      };

      // 서비스 옵션
      const services = [
        { id: 'hair', name: '헤어 스타일링', duration: 40, icon: '💇‍♀️', hairDur: 40, makeupDur: 0 },
        { id: 'makeup', name: '메이크업', duration: 60, icon: '💄', hairDur: 0, makeupDur: 60 },
        { id: 'both', name: '헤어 + 메이크업', duration: 100, icon: '✨', hairDur: 40, makeupDur: 60 }
      ];

      // 가능한 날짜 (오늘부터 30일)
      const availableDates = useMemo(() => {
        const dates = [];
        const today = new Date();
        for (let i = 0; i < 30; i++) {
          const date = new Date(today);
          date.setDate(today.getDate() + i);
          dates.push(formatDate(date));
        }
        return dates;
      }, []);

      // 가능한 시간대 (04:00 ~ 20:00, 10분 단위)
      const availableTimes = useMemo(() => {
        if (!selectedDate) return [];

        const service = services.find(s => s.id === selectedService);
        if (!service) return [];

        const times = [];
        const start = 4 * 60; // 04:00 (분)
        const end = 20 * 60; // 20:00 (분)

        for (let min = start; min < end; min += 10) {
          const h = Math.floor(min / 60);
          const m = min % 60;
          const timeStr = `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;

          let isBooked = false;

          // 헤어+메이크업인 경우 두 스텝 모두 확인
          if (selectedService === 'both' && selectedHairStaff && selectedMakeupStaff) {
            const checkHairConflict = bookings.some(booking => {
              if (booking.staff_id !== selectedHairStaff.id) return false;
              if (booking.booking_date !== selectedDate) return false;
              const bookingStart = new Date(`${booking.booking_date}T${booking.start_time}`);
              const bookingEnd = new Date(`${booking.booking_date}T${booking.end_time}`);
              const checkTime = new Date(`${selectedDate}T${timeStr}`);
              const checkEnd = new Date(checkTime.getTime() + service.hairDur * 60000);
              return (checkTime < bookingEnd && checkEnd > bookingStart);
            });

            const hairEndMin = min + service.hairDur;
            const makeupEndMin = hairEndMin + service.makeupDur;

            const checkMakeupConflict = bookings.some(booking => {
              if (booking.staff_id !== selectedMakeupStaff.id) return false;
              if (booking.booking_date !== selectedDate) return false;
              const bookingStart = new Date(`${booking.booking_date}T${booking.start_time}`);
              const bookingEnd = new Date(`${booking.booking_date}T${booking.end_time}`);
              const makeupStartH = Math.floor(hairEndMin / 60);
              const makeupStartM = hairEndMin % 60;
              const makeupStartTime = new Date(`${selectedDate}T${String(makeupStartH).padStart(2, '0')}:${String(makeupStartM).padStart(2, '0')}`);
              const makeupEndH = Math.floor(makeupEndMin / 60);
              const makeupEndM = makeupEndMin % 60;
              const makeupEndTime = new Date(`${selectedDate}T${String(makeupEndH).padStart(2, '0')}:${String(makeupEndM).padStart(2, '0')}`);
              return (makeupStartTime < bookingEnd && makeupEndTime > bookingStart);
            });

            isBooked = checkHairConflict || checkMakeupConflict;
          } else if (selectedStaff) {
            // 단일 서비스인 경우
            isBooked = bookings.some(booking => {
              if (booking.staff_id !== selectedStaff.id) return false;
              if (booking.booking_date !== selectedDate) return false;
              const bookingStart = new Date(`${booking.booking_date}T${booking.start_time}`);
              const bookingEnd = new Date(`${booking.booking_date}T${booking.end_time}`);
              const checkTime = new Date(`${selectedDate}T${timeStr}`);
              const checkEnd = new Date(checkTime.getTime() + service.duration * 60000);
              return (checkTime < bookingEnd && checkEnd > bookingStart);
            });
          }

          times.push({ time: timeStr, disabled: isBooked });
        }

        return times;
      }, [selectedDate, selectedService, selectedStaff, selectedHairStaff, selectedMakeupStaff, bookings, services]);

      // 스텝 1: 서비스 선택
      const renderServiceSelection = () => (
        <div className="card">
          <div className="section-title">
            <span>💆‍♀️</span>
            <span>어떤 서비스를 원하시나요?</span>
          </div>

          {services.map(service => (
            <div
              key={service.id}
              className={`service-option ${selectedService === service.id ? 'selected' : ''}`}
              onClick={() => setSelectedService(service.id)}
            >
              <div className="service-name">
                {service.icon} {service.name}
              </div>
              <div className="service-duration">
                소요시간 약 {service.duration}분
              </div>
            </div>
          ))}

          {/* 헤어 + 메이크업 선택 시 */}
          {selectedService === 'both' && (
            <>
              <div style={{ marginTop: '24px' }}>
                <div className="section-title">
                  <span>💇‍♀️</span>
                  <span>헤어 담당 디자이너를 선택하세요</span>
                </div>

                <div className="staff-grid">
                  {staffList.filter(s => s.role === 'hair').map(staff => (
                    <div
                      key={staff.id}
                      className={`staff-card ${selectedHairStaff?.id === staff.id ? 'selected' : ''}`}
                      onClick={() => setSelectedHairStaff(staff)}
                    >
                      <div className="staff-icon">
                        {staff.part === 'hair' ? '💇‍♀️' : '💄'}
                      </div>
                      <div className="staff-name">{staff.name}</div>
                      <div className="staff-role">
                        {staff.role === 'admin' ? '원장' : '디자이너'}
                      </div>
                    </div>
                  ))}
                </div>
              </div>

              <div style={{ marginTop: '24px' }}>
                <div className="section-title">
                  <span>💄</span>
                  <span>메이크업 담당 디자이너를 선택하세요</span>
                </div>

                <div className="staff-grid">
                  {staffList.filter(s => s.role === 'makeup').map(staff => (
                    <div
                      key={staff.id}
                      className={`staff-card ${selectedMakeupStaff?.id === staff.id ? 'selected' : ''}`}
                      onClick={() => setSelectedMakeupStaff(staff)}
                    >
                      <div className="staff-icon">
                        {staff.part === 'makeup' ? '💄' : '💇‍♀️'}
                      </div>
                      <div className="staff-name">{staff.name}</div>
                      <div className="staff-role">
                        {staff.role === 'admin' ? '원장' : '디자이너'}
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            </>
          )}

          {/* 헤어 또는 메이크업만 선택 시 */}
          {selectedService && selectedService !== 'both' && (
            <div style={{ marginTop: '24px' }}>
              <div className="section-title">
                <span>👩‍💼</span>
                <span>담당 디자이너를 선택하세요</span>
              </div>

              <div className="staff-grid">
                {staffList.map(staff => (
                  <div
                    key={staff.id}
                    className={`staff-card ${selectedStaff?.id === staff.id ? 'selected' : ''}`}
                    onClick={() => setSelectedStaff(staff)}
                  >
                    <div className="staff-icon">
                      {staff.part === 'hair' ? '💇‍♀️' : '💄'}
                    </div>
                    <div className="staff-name">{staff.name}</div>
                    <div className="staff-role">
                      {staff.role === 'admin' ? '원장' : '디자이너'}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}

          <button
            className="btn btn-primary"
            onClick={() => {
              if (!selectedService) {
                setError('서비스를 선택해주세요');
                return;
              }
              if (selectedService === 'both') {
                if (!selectedHairStaff || !selectedMakeupStaff) {
                  setError('헤어와 메이크업 담당자를 모두 선택해주세요');
                  return;
                }
              } else {
                if (!selectedStaff) {
                  setError('담당 디자이너를 선택해주세요');
                  return;
                }
              }
              setError('');
              setStep(2);
            }}
          >
            다음 단계
          </button>
        </div>
      );

      // 스텝 2: 날짜/시간 선택
      const renderDateTimeSelection = () => (
        <div className="card">
          <div className="section-title">
            <span>📅</span>
            <span>예약 날짜를 선택하세요</span>
          </div>

          <div className="calendar">
            {availableDates.slice(0, 14).map(date => {
              const d = new Date(date);
              const day = d.getDate();
              const isToday = formatDate(new Date()) === date;

              return (
                <div
                  key={date}
                  className={`calendar-day ${selectedDate === date ? 'selected' : ''} ${isToday ? 'today' : ''}`}
                  onClick={() => {
                    setSelectedDate(date);
                    setSelectedTime('');
                  }}
                >
                  {day}
                </div>
              );
            })}
          </div>

          {selectedDate && (
            <>
              <div className="section-title" style={{ marginTop: '24px' }}>
                <span>🕐</span>
                <span>시간을 선택하세요</span>
              </div>

              <div className="time-grid">
                {availableTimes.filter((_, i) => i % 3 === 0).map(({ time, disabled }) => (
                  <div
                    key={time}
                    className={`time-slot ${selectedTime === time ? 'selected' : ''} ${disabled ? 'disabled' : ''}`}
                    onClick={() => !disabled && setSelectedTime(time)}
                  >
                    {time}
                  </div>
                ))}
              </div>
            </>
          )}

          <div style={{ display: 'flex', gap: '12px', marginTop: '24px' }}>
            <button
              className="btn btn-secondary"
              onClick={() => setStep(1)}
            >
              이전
            </button>
            <button
              className="btn btn-primary"
              onClick={() => {
                if (!selectedDate || !selectedTime) {
                  setError('날짜와 시간을 선택해주세요');
                  return;
                }
                setError('');
                setStep(3);
              }}
            >
              다음 단계
            </button>
          </div>
        </div>
      );

      // 스텝 3: 고객정보 입력
      const renderCustomerInfo = () => {
        const service = services.find(s => s.id === selectedService);

        return (
          <div className="card">
            <div className="section-title">
              <span>✍️</span>
              <span>고객 정보를 입력하세요</span>
            </div>

            <div className="summary-box">
              <div className="summary-item">
                <span className="summary-label">서비스</span>
                <span className="summary-value">{service?.name}</span>
              </div>
              <div className="summary-item">
                <span className="summary-label">담당</span>
                <span className="summary-value">
                  {selectedService === 'both'
                    ? `헤어: ${selectedHairStaff?.name}, 메이크업: ${selectedMakeupStaff?.name}`
                    : selectedStaff?.name}
                </span>
              </div>
              <div className="summary-item">
                <span className="summary-label">날짜</span>
                <span className="summary-value">{selectedDate}</span>
              </div>
              <div className="summary-item">
                <span className="summary-label">시간</span>
                <span className="summary-value">{selectedTime}</span>
              </div>
              <div className="summary-item">
                <span className="summary-label">소요시간</span>
                <span className="summary-value">약 {service?.duration}분</span>
              </div>
            </div>

            <label className="label">이름 *</label>
            <input
              type="text"
              className="input"
              placeholder="홍길동"
              value={customerName}
              onChange={(e) => setCustomerName(e.target.value)}
            />

            <label className="label">연락처 *</label>
            <input
              type="tel"
              className="input"
              placeholder="010-1234-5678"
              value={customerPhone}
              onChange={(e) => setCustomerPhone(e.target.value)}
            />

            <label className="label">요청사항 (선택)</label>
            <input
              type="text"
              className="input"
              placeholder="특별히 원하시는 스타일이나 요청사항을 적어주세요"
              value={memo}
              onChange={(e) => setMemo(e.target.value)}
            />

            {error && <div className="error">{error}</div>}

            <div style={{ display: 'flex', gap: '12px', marginTop: '24px' }}>
              <button
                className="btn btn-secondary"
                onClick={() => setStep(2)}
              >
                이전
              </button>
              <button
                className="btn btn-primary"
                onClick={handleSubmit}
                disabled={loading}
              >
                {loading ? '예약 요청 중...' : '예약 요청하기'}
              </button>
            </div>
          </div>
        );
      };

      // 예약 제출
      const handleSubmit = async () => {
        if (!customerName.trim() || !customerPhone.trim()) {
          setError('이름과 연락처를 입력해주세요');
          return;
        }

        setLoading(true);
        setError('');

        try {
          const service = services.find(s => s.id === selectedService);
          const startTime = parseDateTime(selectedDate, selectedTime);
          const endTime = new Date(startTime.getTime() + service.duration * 60000);

          // 고객 정보 찾기 또는 생성
          let customerId;
          const { data: existingCustomer } = await supabaseClient
            .from('customers')
            .select('id')
            .eq('phone', customerPhone)
            .single();

          if (existingCustomer) {
            customerId = existingCustomer.id;
          } else {
            const { data: newCustomer, error: customerError } = await supabaseClient
              .from('customers')
              .insert([{ name: customerName, phone: customerPhone }])
              .select()
              .single();

            if (customerError) throw customerError;
            customerId = newCustomer.id;
          }

          // 예약 생성 데이터 준비
          const bookingData = {
            customer_id: customerId,
            service_type: selectedService,
            booking_date: selectedDate,
            start_time: formatTime(startTime),
            end_time: formatTime(endTime),
            status: 'pending',
            customer_memo: memo || null
          };

          // 헤어+메이크업인 경우 staff_sequence 추가
          if (selectedService === 'both' && selectedHairStaff && selectedMakeupStaff) {
            bookingData.staff_sequence = JSON.stringify([
              { staffId: selectedHairStaff.id, dur: service.hairDur },
              { staffId: selectedMakeupStaff.id, dur: service.makeupDur }
            ]);
            bookingData.requested_staff_id = selectedHairStaff.id; // 첫 번째 스텝을 대표로
          } else {
            // 단일 서비스인 경우
            bookingData.requested_staff_id = selectedStaff.id;
          }

          // 예약 생성
          const { error: bookingError } = await supabaseClient
            .from('bookings')
            .insert([bookingData]);

          if (bookingError) throw bookingError;

          setSuccess(true);
          setStep(4);
        } catch (err) {
          console.error('예약 실패:', err);
          setError('예약 요청에 실패했습니다. 다시 시도해주세요.');
        } finally {
          setLoading(false);
        }
      };

      // 스텝 4: 완료
      const renderSuccess = () => (
        <div className="card">
          <div style={{ textAlign: 'center', padding: '40px 20px' }}>
            <div style={{ fontSize: '64px', marginBottom: '20px' }}>✅</div>
            <h2 style={{ fontSize: '24px', marginBottom: '12px', color: '#C9A84C' }}>
              예약 요청이 완료되었습니다!
            </h2>
            <p style={{ color: '#999', fontSize: '14px', lineHeight: '1.6' }}>
              관리자 확인 후 예약이 확정되면<br/>
              연락처로 알림을 보내드립니다.
            </p>
          </div>

          <div className="summary-box">
            <div className="summary-item">
              <span className="summary-label">이름</span>
              <span className="summary-value">{customerName}</span>
            </div>
            <div className="summary-item">
              <span className="summary-label">연락처</span>
              <span className="summary-value">{customerPhone}</span>
            </div>
            <div className="summary-item">
              <span className="summary-label">날짜</span>
              <span className="summary-value">{selectedDate}</span>
            </div>
            <div className="summary-item">
              <span className="summary-label">시간</span>
              <span className="summary-value">{selectedTime}</span>
            </div>
          </div>

          <button
            className="btn btn-primary"
            onClick={() => {
              setStep(1);
              setSelectedService('');
              setSelectedStaff(null);
              setSelectedHairStaff(null);
              setSelectedMakeupStaff(null);
              setSelectedDate('');
              setSelectedTime('');
              setCustomerName('');
              setCustomerPhone('');
              setMemo('');
              setSuccess(false);
            }}
          >
            처음으로 돌아가기
          </button>
        </div>
      );

      return (
        <div className="container">
          <div className="header">
            <div className="logo">💇‍♀️</div>
            <h1 className="title">누누아누</h1>
            <p className="subtitle">청담 여성 전용 헤어·메이크업 살롱</p>
          </div>

          {step < 4 && (
            <div className="step-indicator">
              <div className={`step-dot ${step >= 1 ? 'active' : ''}`}></div>
              <div className={`step-dot ${step >= 2 ? 'active' : ''}`}></div>
              <div className={`step-dot ${step >= 3 ? 'active' : ''}`}></div>
            </div>
          )}

          {step === 1 && renderServiceSelection()}
          {step === 2 && renderDateTimeSelection()}
          {step === 3 && renderCustomerInfo()}
          {step === 4 && renderSuccess()}
        </div>
      );
    }

    // React 앱 마운트
    ReactDOM.render(<CustomerApp />, document.getElementById('root'));
    console.log('🚀 누누아누 고객 예약 페이지 v1.0.0 (2026-06-07)');
  </script>
</body>
</html>
